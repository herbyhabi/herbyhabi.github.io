<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASCVD评估</title>
    <script src="../assets/vendor/tailwind-browser@4.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background:
                radial-gradient(circle at 82% 2%, rgba(181, 213, 255, 0.8) 0 110px, transparent 220px),
                linear-gradient(180deg, #d9ebff 0%, #f4faff 28%, #f7fbff 68%, #ffffff 100%);
            -webkit-font-smoothing: antialiased;
        }

        .page-card {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(123, 147, 176, 0.14);
            box-shadow: 0 12px 32px rgba(60, 101, 145, 0.12);
            backdrop-filter: blur(12px);
        }

        .chip input:checked + span {
            border-color: #2f7af6;
            background: #eaf3ff;
            color: #1d5fd7;
            box-shadow: inset 0 0 0 1px rgba(47, 122, 246, 0.16);
        }

        .input-shell:focus-within {
            border-color: rgba(47, 122, 246, 0.7);
            box-shadow: 0 0 0 3px rgba(47, 122, 246, 0.1);
        }
    </style>
    <script src="../components/mobile/mobile-title-bar.js" defer></script>
    <script src="../components/mobile/mobile-search.js"></script>
</head>
<body class="min-h-screen text-slate-900 antialiased">
    <mobile-title-bar title="ASCVD评估"></mobile-title-bar>
    <script>
        customElements.whenDefined('mobile-title-bar').then(function bindMobileTitleBar() {
            const titleBar = document.querySelector('mobile-title-bar');
            if (!titleBar) return;
            titleBar.onBack = function () {
                history.back();
            };
        });
    </script>

    <main class="space-y-3 p-3 pb-28">
        <section class="page-card rounded-2xl p-4">
            <div class="mb-3 flex items-center justify-between">
                <h2 class="text-sm font-black">核心指标</h2>
            </div>

            <div class="space-y-4">
                <div>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="block">
                            <span class="text-xs font-bold text-slate-500">LDL-C</span>
                            <div class="input-shell mt-1 flex h-11 items-center rounded-xl border border-slate-200 bg-slate-50 px-3">
                                <input class="w-full bg-transparent text-sm font-bold outline-none" type="number" step="0.01" placeholder="请输入">
                                <span class="text-[11px] font-bold text-slate-400">mmol/L</span>
                            </div>
                        </label>
                        <label class="block">
                            <span class="text-xs font-bold text-slate-500">TC</span>
                            <div class="input-shell mt-1 flex h-11 items-center rounded-xl border border-slate-200 bg-slate-50 px-3">
                                <input class="w-full bg-transparent text-sm font-bold outline-none" type="number" step="0.01" placeholder="请输入">
                                <span class="text-[11px] font-bold text-slate-400">mmol/L</span>
                            </div>
                        </label>
                        <label class="block">
                            <span class="text-xs font-bold text-slate-500">HDL-C</span>
                            <div class="input-shell mt-1 flex h-11 items-center rounded-xl border border-slate-200 bg-slate-50 px-3">
                                <input class="w-full bg-transparent text-sm font-bold outline-none" type="number" step="0.01" placeholder="请输入">
                                <span class="text-[11px] font-bold text-slate-400">mmol/L</span>
                            </div>
                        </label>
                        <label class="block">
                            <span class="text-xs font-bold text-slate-500">TG</span>
                            <div class="input-shell mt-1 flex h-11 items-center rounded-xl border border-slate-200 bg-slate-50 px-3">
                                <input class="w-full bg-transparent text-sm font-bold outline-none" type="number" step="0.01" placeholder="请输入">
                                <span class="text-[11px] font-bold text-slate-400">mmol/L</span>
                            </div>
                        </label>
                        <label class="block">
                            <span class="text-xs font-bold text-slate-500">收缩压</span>
                            <div class="input-shell mt-1 flex h-11 items-center rounded-xl border border-slate-200 bg-slate-50 px-3">
                                <input id="sbpInput" class="w-full bg-transparent text-sm font-bold outline-none" type="number" placeholder="请输入">
                                <span class="text-[11px] font-bold text-slate-400">mmHg</span>
                            </div>
                        </label>
                        <label class="block">
                            <span class="text-xs font-bold text-slate-500">舒张压</span>
                            <div class="input-shell mt-1 flex h-11 items-center rounded-xl border border-slate-200 bg-slate-50 px-3">
                                <input id="dbpInput" class="w-full bg-transparent text-sm font-bold outline-none" type="number" placeholder="请输入">
                                <span class="text-[11px] font-bold text-slate-400">mmHg</span>
                            </div>
                        </label>
                    </div>
                    <div class="mt-3 grid grid-cols-2 gap-3">
                        <label class="block">
                            <span class="text-xs font-bold text-slate-500">血压水平分级</span>
                            <div class="input-shell mt-1 flex h-11 items-center rounded-xl border border-slate-200 bg-slate-50 px-3">
                                <select id="bpStage" class="w-full appearance-none bg-transparent text-sm font-bold text-slate-700 outline-none">
                                    <option value="">请选择</option>
                                    <option value="1级高血压">1级高血压</option>
                                    <option value="2级高血压">2级高血压</option>
                                    <option value="3级高血压">3级高血压</option>
                                </select>
                                <i class="fa-solid fa-chevron-down text-[11px] text-slate-400"></i>
                            </div>
                        </label>
                    </div>
                </div>
            </div>
        </section>

        <section class="page-card rounded-2xl p-4">
            <h2 class="text-sm font-black">ASCVD疾病史</h2>
            <div class="mt-3 grid grid-cols-2 gap-2" data-countable>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">血运重建术后</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">缺血性心肌病</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">缺血性脑卒中</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">短暂缺血发作（TIA）</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">外周动脉粥样硬化</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">急性冠脉综合征</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">稳定性冠心病</span></label>
            </div>
            <textarea class="mt-3 min-h-20 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-semibold leading-6 outline-none focus:border-blue-400" placeholder="请输入其他疾病史"></textarea>
        </section>

        <section class="page-card rounded-2xl p-4">
            <h2 class="text-sm font-black">严重ASCVD事件</h2>
            <div class="mt-3 grid grid-cols-1 gap-2" data-countable>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">既往心肌梗死病史</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">缺血性脑卒中史</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">有症状的周围血管病变，既往接受过血运重建或截肢</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">1年内发生急性冠脉综合征（ACS）</span></label>
            </div>
        </section>

        <section class="page-card rounded-2xl p-4">
            <h2 class="text-sm font-black">危险因素</h2>
            <div class="mt-3 grid grid-cols-1 gap-2" data-countable>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">男性≥45岁或女性≥55岁</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">吸烟</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">低高密度脂蛋白胆固醇（HDL-C＜1.0mmol/L）</span></label>
            </div>
        </section>

        <section class="page-card rounded-2xl p-4">
            <h2 class="text-sm font-black">高危险因素</h2>
            <div class="mt-3 grid grid-cols-1 gap-2" data-countable>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">早发冠心病（男＜55岁，女＜65岁）</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">家族性高胆固醇血症或基线LDL-C≥4.9mmol/L</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">既往有冠脉搭桥术（CABG）或冠脉介入手术史</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">糖尿病</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">高血压</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">慢性肾病（CKD）3-4期</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">吸烟</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">LDL-C≤1.8mmol/L，再次发生严重的ASCVD事件</span></label>
            </div>
        </section>

        <section class="page-card rounded-2xl p-4">
            <h2 class="text-sm font-black">高危人群</h2>
            <div class="mt-3 grid grid-cols-1 gap-2" data-countable>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">糖尿病（≥40岁）</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">LDL-C≥4.9mmol/L或TC≥7.2mmol/L</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">收缩压≥180mmHg或舒张压≥110mmHg</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">重度吸烟（吸烟≥30支/d）</span></label>
                <label class="chip"><input class="hidden" type="checkbox" onchange="updateSelectedCount()"><span class="block rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600">高血压伴靶器官损害或CKD分期≥3期</span></label>
            </div>
        </section>
    </main>

    <footer class="fixed inset-x-0 bottom-0 z-30 border-t border-slate-200/70 bg-white/92 px-3 pb-[calc(12px+env(safe-area-inset-bottom,0px))] pt-3 backdrop-blur">
        <div class="flex gap-3">
            <button class="h-12 flex-1 rounded-xl border border-slate-200 bg-white text-sm font-black text-slate-600" type="button" onclick="resetAssessment()">重置</button>
            <button class="h-12 flex-[2] rounded-xl bg-gradient-to-r from-blue-500 to-blue-600 text-sm font-black text-white shadow-lg shadow-blue-500/20" type="button" onclick="saveAssessment()">完成评估</button>
        </div>
    </footer>

    <div id="toast" class="pointer-events-none fixed left-1/2 top-1/2 z-50 -translate-x-1/2 -translate-y-1/2 rounded-lg bg-slate-900/85 px-5 py-3 text-sm font-bold text-white opacity-0 transition-opacity">已保存评估</div>

    <script>
        function updateSelectedCount() {
            const checked = document.querySelectorAll('[data-countable] input[type="checkbox"]:checked').length;
            const selectedCount = document.getElementById('selectedCount');
            if (selectedCount) {
                selectedCount.textContent = checked;
            }
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 1500);
        }

        function saveAssessment() {
            showToast('已保存评估');
        }

        function resetAssessment() {
            document.querySelectorAll('input').forEach(input => {
                if (input.type === 'checkbox') {
                    input.checked = false;
                } else {
                    input.value = '';
                }
            });
            document.querySelectorAll('select').forEach(select => select.value = '');
            document.querySelectorAll('textarea').forEach(textarea => textarea.value = '');
            updateSelectedCount();
            showToast('已重置');
        }
    </script>
</body>
</html>
