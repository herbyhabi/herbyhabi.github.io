<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的</title>
    <script src="../assets/vendor/tailwind-browser@4.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../components/mobile/mobile-title-bar.js" defer></script>
    <script src="../components/mobile/mobile-button.js"></script>
    <script src="../components/shared/status-tag.js"></script>
    <script src="../modules/medical-staff-tabbar.js" defer></script>
    <style>
        /* 页面基础重置：保持 H5 滚动模型与移动端点击体验 */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            min-width: 320px;
            background: #F8FAFC;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: #F8FAFC;
            color: #1D2129;
            font-family: system-ui, "PingFang SC", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        button {
            font: inherit;
        }

        /* 头像浮层：参考图中头像压在个人信息面板上方的视觉层次 */
        .profile-panel {
            margin-top: 56px;
            padding-top: 48px;
        }

        .profile-avatar {
            top: -48px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Toast 与确认弹层：仅保留必要反馈，不打断主流程结构 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            z-index: 1000;
            max-width: calc(100% - 64px);
            padding: 10px 18px;
            border-radius: 8px;
            transform: translate(-50%, -50%);
            background: rgba(29, 33, 41, 0.88);
            color: #FFFFFF;
            font-size: 14px;
            line-height: 1.4;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .toast.show {
            opacity: 1;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.42);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>

<body>
    <!-- 页面容器：遵循 390px 设计稿、最大 768px、纵向滚动与底部安全区 -->
    <div class="mx-auto min-h-screen w-full min-w-[320px] max-w-[768px] bg-[#F8FAFC] pb-[calc(160px+env(safe-area-inset-bottom))]">
        <div class="toast" id="toast"></div>

        <!-- 顶部标题栏：复用移动端通用组件，保留浏览器滚动模型 -->
        <mobile-title-bar title="我的主页" show-back="false" safe-area="true" theme="transparent"></mobile-title-bar>

        <!-- 主内容：参考图样式聚焦个人身份与资料入口，避免信息碎片化 -->
        <main class="flex w-full flex-col gap-3 px-4 pb-4 pt-6">
            <!-- 医生身份面板：头像居中，姓名与登录工号纵向展示 -->
            <section class="profile-panel relative w-full rounded-[28px] bg-white px-4 pb-7 text-center shadow-[0_2px_8px_rgba(29,33,41,0.03)]">
                <button class="profile-avatar absolute flex h-24 w-24 items-center justify-center rounded-full border-[6px] border-[#F8FAFC] bg-[#EAF1FF] text-[#2F6BFF] shadow-[0_2px_8px_rgba(29,33,41,0.04)] active:opacity-80" type="button" onclick="goToPersonalInfo()" aria-label="编辑个人资料">
                    <i class="fas fa-user-md text-[46px]"></i>
                </button>
                <div class="mt-3 flex flex-col items-center gap-2">
                    <div class="flex max-w-full items-center justify-center gap-2">
                        <h1 class="min-w-0 truncate text-[22px] font-semibold leading-8 text-[#1D2129]">张梁平</h1>
                        <!-- 用户类型标识：复用通用状态标签组件，支持机构管理员、医生、护士等身份 -->
                        <status-tag color="blue" size="medium" label="医生"></status-tag>
                    </div>
                    <p class="text-[15px] leading-6 text-[#86909C]">全科医学科 · 浙江省杭州市西湖区社区卫生服务中心</p>
                </div>
            </section>

            <!-- 个人资料入口：对应参考图中的“我的健康画像”入口 -->
            <button class="flex min-h-[50px] w-full items-center justify-between gap-3 rounded-[24px] bg-white px-5 text-left shadow-[0_2px_8px_rgba(29,33,41,0.03)] active:opacity-80" type="button" onclick="goToPersonalInfo()">
                <span class="flex min-w-0 items-center gap-3">
                    <span class="truncate text-[17px] font-medium leading-6 text-[#1D2129]">个人资料</span>
                </span>
                <i class="fas fa-chevron-right shrink-0 text-base text-[#C9CDD4]"></i>
            </button>
        </main>

        <!-- 固定退出按钮：位于底部导航栏上方，使用移动端通用按钮组件渲染 -->
        <div class="fixed bottom-[calc(64px+env(safe-area-inset-bottom))] left-1/2 z-[90] w-full min-w-[320px] max-w-[768px] -translate-x-1/2 bg-[#F8FAFC]/95 px-4 py-3" style="backdrop-filter: blur(8px);">
            <div id="logoutButton"></div>
        </div>

        <!-- 底部导航：固定区域已由组件处理 safe-area，页面底部预留滚动空间 -->
        <medical-staff-tabbar active="profile" message-badge="12"></medical-staff-tabbar>

        <!-- 退出确认弹层：风险操作二次确认 -->
        <div class="modal-overlay" id="logoutModal" onclick="closeLogoutModal()">
            <div class="w-full max-w-[300px] overflow-hidden rounded-xl bg-white" onclick="event.stopPropagation()">
                <div class="px-6 pb-2 pt-6 text-center text-[17px] font-semibold leading-6 text-[#1D2129]">提示</div>
                <div class="px-6 pb-6 text-center text-sm leading-6 text-[#4E5969]">确定要退出登录吗？</div>
                <div class="grid grid-cols-2 border-t border-[#ECEEF2]">
                    <button class="min-h-12 border-r border-[#ECEEF2] text-base font-medium text-[#4E5969] active:bg-[#F8FAFC]" type="button" onclick="closeLogoutModal()">取消</button>
                    <button class="min-h-12 text-base font-medium text-[#2F6BFF] active:bg-[#F2F6FF]" type="button" onclick="confirmLogout()">确定</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 固定退出按钮：使用通用按钮组件，保持项目按钮样式一致
        MobileButton.render('#logoutButton', {
            text: '退出登录',
            type: 'weak',
            size: 'large',
            block: true,
            round: true,
            icon: 'fas fa-right-from-bracket',
            onClick: logout
        });

        // 轻提示：保留给后续操作反馈使用
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        // 个人资料入口：沿用原页面跳转路径
        function goToPersonalInfo() {
            window.location.href = 'medical-staff-personal-info.html';
        }

        // 退出登录：先展示确认弹层，避免误触
        function logout() {
            document.getElementById('logoutModal').classList.add('show');
        }

        // 关闭退出确认弹层
        function closeLogoutModal() {
            document.getElementById('logoutModal').classList.remove('show');
        }

        // 确认退出：清理本地登录态并返回登录页
        function confirmLogout() {
            closeLogoutModal();
            localStorage.removeItem('userInfo');
            localStorage.removeItem('token');
            sessionStorage.clear();
            window.location.href = 'medical-staff-login.html';
        }
    </script>
</body>

</html>
