<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2F6BFF;
            --success: #07C160;
            --danger: #F53F3F;
            --page-bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --border: #E5E6EB;
            --divider: #ECEEF2;
            --text-main: #1D2129;
            --text-sub: #4E5969;
            --text-light: #86909C;
            --shadow-card: 0 2px 10px rgba(0, 0, 0, 0.04);
        }

        html {
            min-width: 320px;
            background: var(--page-bg);
        }

        body {
            min-height: 100vh;
            background: var(--page-bg);
            color: var(--text-main);
            font-family: system-ui, "PingFang SC", sans-serif;
            -webkit-font-smoothing: antialiased;
            padding-bottom: calc(96px + env(safe-area-inset-bottom, 0px));
        }

        button {
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        mobile-title-bar {
            --mobile-title-bar-height: 48px;
            --mobile-title-bar-bg: #FFFFFF;
            --mobile-title-bar-color: #1D2129;
            --mobile-title-bar-shadow: none;
            --mobile-title-bar-border: #E5E6EB;
            --mobile-title-bar-title-size: 18px;
            padding-top: env(safe-area-inset-top, 0px) !important;
            border-bottom: 1px solid var(--border) !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }

        mobile-title-bar::before {
            display: none !important;
        }

        mobile-title-bar .mobile-title-bar__title {
            font-weight: 600 !important;
        }

        mobile-title-bar .mobile-title-bar__back {
            color: var(--text-main) !important;
        }

        .page {
            width: 100%;
            min-width: 320px;
            max-width: 768px;
            min-height: 100vh;
            margin: 0 auto;
            background: var(--page-bg);
        }

        .content {
            width: 100%;
            padding: 16px 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            width: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-card);
        }

        .user-card {
            min-height: 120px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 0;
            cursor: pointer;
            text-align: left;
            color: inherit;
        }

        .user-card:active,
        .modal-btn:active {
            opacity: 0.82;
        }

        .user-avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #EAF1FF;
            color: var(--primary);
            font-size: 50px;
        }

        .user-info {
            min-width: 0;
            flex: 1;
        }

        .user-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .user-name {
            color: var(--text-main);
            font-size: 19px;
            line-height: 1.3;
            font-weight: 600;
        }

        .user-type {
            min-height: 22px;
            display: inline-flex;
            align-items: center;
            padding: 0 8px;
            border-radius: 4px;
            background: #EAF1FF;
            color: var(--primary);
            font-size: 12px;
            line-height: 1;
            font-weight: 500;
        }

        .user-org {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            margin-bottom: 4px;
            color: var(--text-sub);
            font-size: 13px;
            line-height: 1.45;
        }

        .user-org i {
            flex-shrink: 0;
            margin-top: 2px;
            color: var(--primary);
            font-size: 14px;
        }

        .user-account {
            color: var(--text-light);
            font-size: 13px;
            line-height: 1.45;
        }

        .user-card-arrow {
            flex-shrink: 0;
            color: var(--text-light);
            font-size: 14px;
        }

        .logout-section {
            padding-top: 4px;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            z-index: 1000;
            max-width: calc(100% - 64px);
            padding: 10px 18px;
            border-radius: 8px;
            transform: translate(-50%, -50%);
            background: rgba(29, 33, 41, 0.88);
            color: #FFFFFF;
            font-size: 14px;
            line-height: 1.4;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .toast.show {
            opacity: 1;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.45);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            width: 100%;
            max-width: 300px;
            overflow: hidden;
            border-radius: 16px;
            background: #FFFFFF;
        }

        .modal-title {
            padding: 24px 24px 8px;
            color: var(--text-main);
            text-align: center;
            font-size: 17px;
            line-height: 1.35;
            font-weight: 600;
        }

        .modal-msg {
            padding: 0 24px 24px;
            color: var(--text-sub);
            text-align: center;
            font-size: 14px;
            line-height: 1.5;
        }

        .modal-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            border-top: 1px solid var(--divider);
        }

        .modal-btn {
            min-height: 48px;
            border: 0;
            background: #FFFFFF;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-btn.cancel {
            color: var(--text-sub);
            border-right: 1px solid var(--divider);
        }

        .modal-btn.confirm {
            color: var(--primary);
        }
    </style>
    <script src="../components/mobile/mobile-title-bar.js" defer></script>
    <script src="../components/mobile/mobile-button.js"></script>
    <script src="../components/mobile/mobile-search.js"></script>
    <script src="../modules/medical-staff-tabbar.js" defer></script>
</head>
<body>
    <div class="page">
        <div class="toast" id="toast"></div>

        <mobile-title-bar title="我的" back="false"></mobile-title-bar>

        <main class="content">
            <button class="card user-card" type="button" onclick="goToPersonalInfo()">
                <div class="user-avatar">
                    <i class="fas fa-user-md"></i>
                </div>
                <div class="user-info">
                    <div class="user-name-row">
                        <span class="user-name">张大头</span>
                        <span class="user-type">医生</span>
                    </div>
                    <div class="user-org">
                        <i class="fas fa-hospital"></i>
                        <span>浙江省杭州市西湖区社区卫生服务中心</span>
                    </div>
                    <div class="user-account">当前账号：623130</div>
                </div>
                <i class="fas fa-chevron-right user-card-arrow"></i>
            </button>

            <div class="logout-section">
                <div id="logoutButton"></div>
            </div>
        </main>

        <medical-staff-tabbar active="profile" message-badge="12"></medical-staff-tabbar>

        <div class="modal-overlay" id="logoutModal" onclick="closeLogoutModal()">
            <div class="modal-box" onclick="event.stopPropagation()">
                <div class="modal-title">提示</div>
                <div class="modal-msg">确定要退出登录吗？</div>
                <div class="modal-actions">
                    <button class="modal-btn cancel" type="button" onclick="closeLogoutModal()">取消</button>
                    <button class="modal-btn confirm" type="button" onclick="confirmLogout()">确定</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        MobileButton.render('#logoutButton', {
            text: '退出登录',
            type: 'weak',
            size: 'large',
            block: true,
            round: true,
            icon: 'fas fa-sign-out-alt',
            onClick: logout
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        function goToPersonalInfo() {
            window.location.href = 'medical-staff-personal-info.html';
        }

        function logout() {
            document.getElementById('logoutModal').classList.add('show');
        }

        function closeLogoutModal() {
            document.getElementById('logoutModal').classList.remove('show');
        }

        function confirmLogout() {
            closeLogoutModal();
            localStorage.removeItem('userInfo');
            localStorage.removeItem('token');
            sessionStorage.clear();
            window.location.href = 'medical-staff-login.html';
        }
    </script>
</body>
</html>
