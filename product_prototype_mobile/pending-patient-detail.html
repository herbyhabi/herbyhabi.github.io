<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>待管详情</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@arco-design/mobile-react/dist/arco.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --arcoblue-6: #165DFF;
            --arcoblue-1: #E8F3FF;
            --green-6: #00B42A;
            --green-1: #E8FFEA;
            --orange-6: #FF7D00;
            --orange-1: #FFF7E8;
            --red-6: #F53F3F;
            --red-1: #FFECE8;
            --pink-6: #F5319D;
            --pink-1: #FFE8F1;
            --text-1: #1D2129;
            --text-2: #4E5969;
            --text-3: #86909C;
            --text-4: #C9CDD4;
            --bg-1: #F2F3F5;
            --bg-2: #FFFFFF;
            --border: #E5E6EB;
            --radius-small: 4px;
            --radius-medium: 8px;
            --radius-large: 12px;
            --radius-xlarge: 20px;
            --font-size-caption: 12px;
            --font-size-body-1: 14px;
            --font-size-body-2: 15px;
            --font-size-title-1: 16px;
            --font-size-title-2: 18px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-1);
            color: var(--text-1);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, var(--arcoblue-6) 0%, #4080FF 100%);
            padding: 44px 16px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: var(--radius-medium);
            transition: background 0.2s;
        }

        .back-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .navbar-title {
            flex: 1;
            font-size: var(--font-size-title-2);
            font-weight: 600;
            color: white;
        }

        /* 患者信息概览 */
        .patient-overview {
            background: var(--bg-2);
            margin: 12px 16px;
            border-radius: var(--radius-large);
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .overview-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .patient-basic {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .patient-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--arcoblue-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--arcoblue-6);
        }

        .patient-avatar.female {
            background: var(--pink-1);
            color: var(--pink-6);
        }

        .patient-meta h2 {
            font-size: var(--font-size-title-1);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .patient-meta .meta-tags {
            display: flex;
            gap: 8px;
            font-size: var(--font-size-caption);
            color: var(--text-3);
        }

        .phone-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 14px;
            background: var(--green-1);
            color: var(--green-6);
            border: none;
            border-radius: var(--radius-medium);
            font-size: var(--font-size-caption);
            cursor: pointer;
            transition: all 0.2s;
        }

        .phone-btn:active {
            background: var(--green-6);
            color: white;
        }

        .overview-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            font-size: var(--font-size-caption);
            color: var(--text-3);
        }

        .detail-value {
            font-size: var(--font-size-body-1);
            color: var(--text-1);
            font-family: 'SF Mono', monospace;
        }

        .detail-value.full-width {
            grid-column: span 2;
        }

        .overview-actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-medium);
            background: var(--bg-2);
            font-size: var(--font-size-body-1);
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn.primary {
            background: var(--arcoblue-6);
            border-color: var(--arcoblue-6);
            color: white;
        }

        .action-btn:active {
            opacity: 0.8;
        }

        /* 待管信息卡 */
        .section-title {
            font-size: var(--font-size-body-1);
            font-weight: 600;
            color: var(--text-2);
            margin: 20px 16px 12px;
            padding-left: 12px;
            border-left: 3px solid var(--arcoblue-6);
        }

        .disease-card {
            background: var(--bg-2);
            margin: 0 16px 12px;
            border-radius: var(--radius-large);
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .disease-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--arcoblue-1);
        }

        .disease-name {
            font-size: var(--font-size-title-1);
            font-weight: 600;
            color: var(--arcoblue-6);
        }

        .transfer-date {
            font-size: var(--font-size-caption);
            color: var(--text-3);
        }

        .disease-body {
            padding: 16px;
        }

        .info-section {
            margin-bottom: 16px;
        }

        .info-section:last-child {
            margin-bottom: 0;
        }

        .info-section-title {
            font-size: var(--font-size-caption);
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-section-title i {
            color: var(--arcoblue-6);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            background: var(--bg-1);
            padding: 12px;
            border-radius: var(--radius-medium);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .info-label {
            font-size: var(--font-size-caption);
            color: var(--text-3);
        }

        .info-value {
            font-size: var(--font-size-body-1);
            color: var(--text-1);
        }

        /* 诊断指标 */
        .indicator-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .indicator-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--bg-1);
            border-radius: var(--radius-medium);
        }

        .indicator-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: var(--radius-small);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .indicator-checkbox.checked {
            background: var(--arcoblue-6);
            border-color: var(--arcoblue-6);
            color: white;
        }

        .indicator-checkbox i {
            font-size: 10px;
        }

        .indicator-name {
            flex: 1;
            font-size: var(--font-size-body-1);
            color: var(--text-1);
        }

        .indicator-value {
            font-size: var(--font-size-caption);
            color: var(--text-3);
            font-family: 'SF Mono', monospace;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(29, 33, 41, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-medium);
            font-size: var(--font-size-body-1);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        /* 预约弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-2);
            border-radius: 24px 24px 0 0;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: var(--font-size-title-1);
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-3);
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: var(--font-size-caption);
            color: var(--text-3);
            margin-bottom: 8px;
            display: block;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-medium);
            font-size: var(--font-size-body-1);
            background: var(--bg-2);
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--arcoblue-6);
        }

        .form-textarea {
            min-height: 80px;
            resize: none;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: var(--radius-medium);
            font-size: var(--font-size-body-1);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn.cancel {
            background: var(--bg-1);
            border: 1px solid var(--border);
            color: var(--text-2);
        }

        .modal-btn.confirm {
            background: var(--arcoblue-6);
            border: 1px solid var(--arcoblue-6);
            color: white;
        }

        .modal-btn:active {
            opacity: 0.8;
        }

        /* 预约类型切换 */
        .type-tabs {
            display: flex;
            gap: 12px;
        }

        .type-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--border);
            border-radius: var(--radius-medium);
            font-size: var(--font-size-body-1);
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .type-tab.active {
            background: var(--arcoblue-6);
            border-color: var(--arcoblue-6);
            color: white;
        }

        .type-tab:active {
            opacity: 0.8;
        }

        .required {
            color: var(--red-6);
        }

        .form-select:disabled {
            background: var(--bg-1);
            color: var(--text-4);
            cursor: not-allowed;
        }

                    <i class="fas fa-times"></i>
                </div>
            </div>
            <!-- 预约类型 -->
            <div class="form-group">
                <label class="form-label">预约类型 <span class="required">*</span></label>
                <div class="type-tabs" id="appointmentType">
                    <div class="type-tab active" data-type="visit" onclick="selectAppointmentType('visit')">就诊预约</div>
                    <div class="type-tab" data-type="referral" onclick="selectAppointmentType('referral')">转诊预约</div>
                </div>
            </div>
            <!-- 预约日期时间 -->
            <div class="form-group">
                <label class="form-label">预约日期 <span class="required">*</span></label>
                <input type="datetime-local" class="form-input" id="appointmentDatetime">
            </div>
            <!-- 预约机构 -->
            <div class="form-group">
                <label class="form-label">预约机构 <span class="required">*</span></label>
                <select class="form-select" id="appointmentOrg" onchange="onOrgChange()">
                    <option value="">请选择机构</option>
                </select>
            </div>
            <!-- 预约科室 -->
            <div class="form-group">
                <label class="form-label">预约科室 <span class="required">*</span></label>
                <select class="form-select" id="appointmentDept" disabled>
                    <option value="">请先选择预约机构</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeAppointmentModal()">取消</button>
                <button class="modal-btn confirm" onclick="confirmAppointment()">确认预约</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const patientId = getUrlParam('id') || 1;

        // 模拟患者详细数据
        const patientDetailData = {
            1: {
                id: 1,
                name: '王建国',
                gender: 'male',
                age: 68,
                phone: '13800138001',
                idCard: '310101195601011234',
                grid: '第一网格',
                address: '浙江省台州市临海市大洋街道幸福社区1号楼201室',
                diseases: [
                    {
                        name: '高血压',
                        transferDate: '2024-01-15',
                        diagnosis: {
                            date: '2024-01-10',
                            diagnosis: '原发性高血压3级',
                            institution: '幸福社区卫生服务中心'
                        },
                        indicators: [
                            { name: '收缩压≥140mmHg', checked: true, value: '145mmHg' },
                            { name: '舒张压≥90mmHg', checked: true, value: '95mmHg' },
                            { name: '高血压病史', checked: true, value: '5年' },
                            { name: '靶器官损害', checked: false, value: '-' }
                        ]
                    },
                    {
                        name: '糖尿病',
                        transferDate: '2024-02-20',
                        diagnosis: {
                            date: '2024-02-18',
                            diagnosis: '2型糖尿病',
                            institution: '幸福社区卫生服务中心'
                        },
                        indicators: [
                            { name: '空腹血糖≥7.0mmol/L', checked: true, value: '8.2mmol/L' },
                            { name: '餐后2h血糖≥11.1mmol/L', checked: true, value: '13.5mmol/L' },
                            { name: '糖化血红蛋白≥6.5%', checked: true, value: '7.8%' },
                            { name: '糖尿病症状', checked: true, value: '多饮多尿' }
                        ]
                    }
                ]
            },
            2: {
                id: 2,
                name: '李秀英',
                gender: 'female',
                age: 72,
                phone: '13900139002',
                idCard: '310101195201025678',
                grid: '第二网格',
                address: '幸福社区2号楼305室',
                diseases: [
                    {
                        name: '高血压',
                        transferDate: '2024-03-10',
                        diagnosis: {
                            date: '2024-03-05',
                            diagnosis: '原发性高血压2级',
                            institution: '幸福社区卫生服务中心'
                        },
                        indicators: [
                            { name: '收缩压≥140mmHg', checked: true, value: '150mmHg' },
                            { name: '舒张压≥90mmHg', checked: false, value: '85mmHg' },
                            { name: '高血压病史', checked: true, value: '3年' },
                            { name: '靶器官损害', checked: false, value: '-' }
                        ]
                    },
                    {
                        name: '冠心病',
                        transferDate: '2024-03-15',
                        diagnosis: {
                            date: '2024-03-12',
                            diagnosis: '冠状动脉粥样硬化性心脏病',
                            institution: '市第一人民医院'
                        },
                        indicators: [
                            { name: '心绞痛症状', checked: true, value: '劳累型' },
                            { name: '心电图异常', checked: true, value: 'ST段压低' },
                            { name: '冠脉CTA狭窄', checked: true, value: '左前降支50%' }
                        ]
                    }
                ]
            }
        };

        // 初始化
        window.addEventListener('load', () => {
            const patient = patientDetailData[patientId] || patientDetailData[1];
            renderPatientOverview(patient);
            renderDiseaseCards(patient.diseases);
        });

        // 渲染患者概览
        function renderPatientOverview(patient) {
            const container = document.getElementById('patientOverview');
            const avatarClass = patient.gender === 'female' ? 'female' : '';
            const genderText = patient.gender === 'female' ? '女' : '男';
            const avatarIcon = patient.gender === 'female' ? 'fa-female' : 'fa-male';
            
            container.innerHTML = `
                <div class="overview-header">
                    <div class="patient-basic">
                        <div class="patient-avatar ${avatarClass}">
                            <i class="fas ${avatarIcon}"></i>
                        </div>
                        <div class="patient-meta">
                            <h2>${patient.name}</h2>
                            <div class="meta-tags">
                                <span>${genderText}</span>
                                <span>·</span>
                                <span>${patient.age}岁</span>
                            </div>
                        </div>
                    </div>
                    <button class="phone-btn" onclick="callPatient('${patient.phone}', '${patient.name}')">
                        <i class="fas fa-phone"></i>
                        <span>呼叫</span>
                    </button>
                </div>
                <div class="overview-details">
                    <div class="detail-item">
                        <span class="detail-label">联系电话</span>
                        <span class="detail-value">${patient.phone}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">身份证号</span>
                        <span class="detail-value">${patient.idCard}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">归属网格</span>
                        <span class="detail-value">${patient.grid}</span>
                    </div>
                    <div class="detail-item full-width">
                        <span class="detail-label">居住地址</span>
                        <span class="detail-value">${patient.address}</span>
                    </div>
                    
                </div>
                <div class="overview-actions">
                    <button class="action-btn" onclick="viewHealthProfile(${patient.id})">
                        <i class="fas fa-user-circle"></i>
                        <span>画像</span>
                    </button>
                    <button class="action-btn primary" onclick="showAppointmentModal()">
                        <i class="fas fa-calendar-plus"></i>
                        <span>预约</span>
                    </button>
                    <button class="action-btn" onclick="sendMessage(${patient.id})">
                        <i class="fas fa-comment-dots"></i>
                        <span>消息</span>
                    </button>
                </div>
            `;
        }

        // 渲染待管信息卡
        function renderDiseaseCards(diseases) {
            const container = document.getElementById('diseaseCards');
            
            // 按转入日期倒序排序
            const sortedDiseases = [...diseases].sort((a, b) => {
                return new Date(b.transferDate) - new Date(a.transferDate);
            });
            
            let html = '';
            sortedDiseases.forEach(disease => {
                let sectionsHtml = '';
                
                // 确诊信息
                if (disease.diagnosis) {
                    sectionsHtml += `
                        <div class="info-section">
                            <div class="info-section-title">
                                <i class="fas fa-stethoscope"></i>
                                确诊信息
                            </div>
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">确诊日期</span>
                                    <span class="info-value">${disease.diagnosis.date}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">确诊机构</span>
                                    <span class="info-value">${disease.diagnosis.institution}</span>
                                </div>
                                <div class="info-item" style="grid-column: span 2;">
                                    <span class="info-label">确诊诊断</span>
                                    <span class="info-value">${disease.diagnosis.diagnosis}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                // 诊断指标
                if (disease.indicators && disease.indicators.length > 0) {
                    const indicatorsHtml = disease.indicators.map(ind => `
                        <div class="indicator-item">
                            <div class="indicator-checkbox ${ind.checked ? 'checked' : ''}">
                                ${ind.checked ? '<i class="fas fa-check"></i>' : ''}
                            </div>
                            <span class="indicator-name">${ind.name}</span>
                        </div>
                    `).join('');
                    
                    sectionsHtml += `
                        <div class="info-section">
                            <div class="info-section-title">
                                <i class="fas fa-clipboard-check"></i>
                                诊断指标
                            </div>
                            <div class="indicator-list">
                                ${indicatorsHtml}
                            </div>
                        </div>
                    `;
                }
                
                html += `
                    <div class="disease-card">
                        <div class="disease-header">
                            <span class="disease-name">${disease.name}</span>
                            <span class="transfer-date">转入日期：${disease.transferDate}</span>
                        </div>
                        <div class="disease-body">
                            ${sectionsHtml}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // 呼叫患者
        function callPatient(phone, name) {
            showToast(`正在呼叫 ${name}`);
            // window.location.href = `tel:${phone}`;
        }

        // 查看健康画像
        function viewHealthProfile(id) {
            window.location.href = `patient-health-profile.html?id=${id}`;
        }

        // 发送消息
        function sendMessage(id) {
            window.location.href = `patient-direct-message.html?id=${id}`;
        }

        // 显示预约弹窗
        function showAppointmentModal() {
            document.getElementById('appointmentModal').classList.add('show');
            // 初始化默认值
            initAppointmentForm();
        }

        // 关闭预约弹窗
        function closeAppointmentModal() {
            document.getElementById('appointmentModal').classList.remove('show');
        }

        // 当前用户所属机构信息（模拟数据）
        const currentUserOrg = {
            id: 'org001',
            name: '幸福社区卫生服务中心',
            parentId: 'org002',
            parentName: '市第一人民医院'
        };

        // 机构数据
        const orgData = {
            'org001': {
                name: '幸福社区卫生服务中心',
                departments: ['全科门诊', '中医科', '预防保健科', '慢病管理科']
            },
            'org002': {
                name: '市第一人民医院',
                departments: ['心内科', '内分泌科', '神经内科', '呼吸内科', '消化内科', '肾内科', '骨科', '普外科']
            }
        };

        // 当前预约类型
        let currentAppointmentType = 'visit';

        // 初始化预约表单
        function initAppointmentForm() {
            // 默认就诊预约
            currentAppointmentType = 'visit';
            updateTypeTabs();
            
            // 设置默认日期时间为明天8:00
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(8, 0, 0, 0);
            const datetimeStr = tomorrow.toISOString().slice(0, 16);
            document.getElementById('appointmentDatetime').value = datetimeStr;
            
            // 设置默认机构
            updateOrgSelect();
        }

        // 选择预约类型
        function selectAppointmentType(type) {
            currentAppointmentType = type;
            updateTypeTabs();
            updateOrgSelect();
            // 清空科室选择
            document.getElementById('appointmentDept').innerHTML = '<option value="">请先选择预约机构</option>';
            document.getElementById('appointmentDept').disabled = true;
        }

        // 更新类型标签状态
        function updateTypeTabs() {
            const tabs = document.querySelectorAll('.type-tab');
            tabs.forEach(tab => {
                if (tab.dataset.type === currentAppointmentType) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
        }

        // 更新机构下拉框
        function updateOrgSelect() {
            const orgSelect = document.getElementById('appointmentOrg');
            const deptSelect = document.getElementById('appointmentDept');
            
            if (currentAppointmentType === 'visit') {
                // 就诊预约：默认当前用户所属机构
                orgSelect.innerHTML = `<option value="${currentUserOrg.id}">${currentUserOrg.name}</option>`;
                orgSelect.value = currentUserOrg.id;
            } else {
                // 转诊预约：默认上级机构
                orgSelect.innerHTML = `<option value="${currentUserOrg.parentId}">${currentUserOrg.parentName}</option>`;
                orgSelect.value = currentUserOrg.parentId;
            }
            
            // 加载科室列表
            const orgId = orgSelect.value;
            const org = orgData[orgId];
            if (org && org.departments) {
                let html = '<option value="">请选择科室</option>';
                org.departments.forEach(dept => {
                    html += `<option value="${dept}">${dept}</option>`;
                });
                deptSelect.innerHTML = html;
                deptSelect.disabled = false;
            }
        }

        // 机构变更
        function onOrgChange() {
            const orgId = document.getElementById('appointmentOrg').value;
            const deptSelect = document.getElementById('appointmentDept');
            
            if (!orgId) {
                deptSelect.innerHTML = '<option value="">请先选择预约机构</option>';
                deptSelect.disabled = true;
                return;
            }
            
            // 根据机构加载科室
            const org = orgData[orgId];
            if (org && org.departments) {
                let html = '<option value="">请选择科室</option>';
                org.departments.forEach(dept => {
                    html += `<option value="${dept}">${dept}</option>`;
                });
                deptSelect.innerHTML = html;
                deptSelect.disabled = false;
            }
        }

        // 确认预约
        function confirmAppointment() {
            const datetime = document.getElementById('appointmentDatetime').value;
            const orgId = document.getElementById('appointmentOrg').value;
            const dept = document.getElementById('appointmentDept').value;
            
            if (!datetime) {
                showToast('请选择预约日期');
                return;
            }
            if (!orgId) {
                showToast('请选择预约机构');
                return;
            }
            if (!dept) {
                showToast('请选择预约科室');
                return;
            }
            
            const orgName = orgData[orgId]?.name || '';
            const typeText = currentAppointmentType === 'visit' ? '就诊预约' : '转诊预约';
            
            showToast(`${typeText}成功！\n机构：${orgName}\n科室：${dept}`);
            closeAppointmentModal();
        }

        // 返回
        function goBack() {
            window.history.back();
        }

        // Toast提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 点击遮罩关闭弹窗
        document.getElementById('appointmentModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('appointmentModal')) {
                closeAppointmentModal();
            }
        });
    </script>
</body>
</html>
