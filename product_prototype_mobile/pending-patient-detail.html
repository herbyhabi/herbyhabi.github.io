<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>待管详情</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --arcoblue-6: #165DFF;
            --arcoblue-1: #E8F3FF;
            --text-1: #1D2129;
            --text-2: #4E5969;
            --text-3: #86909C;
            --bg-1: #F8FAFC;
            --bg-2: #FFFFFF;
            --border: #E5E6EB;
            --radius-small: 4px;
            --radius-medium: 8px;
            --font-size-caption: 12px;
            --font-size-body-1: 14px;
            --font-size-title-1: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-1);
            color: var(--text-1);
            min-height: 100vh;
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }

        /* 待管信息卡 */
        .section-title {
            font-size: var(--font-size-body-1);
            font-weight: 600;
            color: var(--text-2);
            margin: 20px 16px 12px;
            padding-left: 12px;
            border-left: 3px solid var(--arcoblue-6);
        }

        .disease-card {
            background: var(--bg-2);
            margin: 0 16px 12px;
            border: 1px solid rgba(123, 147, 176, 0.14);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(60, 101, 145, 0.12);
            backdrop-filter: blur(12px);
        }

        .disease-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--arcoblue-1);
        }

        .disease-name {
            font-size: var(--font-size-title-1);
            font-weight: 600;
            color: var(--arcoblue-6);
        }

        .transfer-date {
            font-size: var(--font-size-caption);
            color: var(--text-3);
        }

        .disease-body {
            padding: 16px;
        }

        .info-section {
            margin-bottom: 16px;
        }

        .info-section:last-child {
            margin-bottom: 0;
        }

        .info-section-title {
            font-size: var(--font-size-caption);
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-section-title i {
            color: var(--arcoblue-6);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            background: rgba(247, 248, 250, 0.86);
            padding: 12px;
            border-radius: var(--radius-medium);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .info-label {
            font-size: var(--font-size-caption);
            color: var(--text-3);
        }

        .info-value {
            font-size: var(--font-size-body-1);
            color: var(--text-1);
        }

        /* 诊断指标 */
        .indicator-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .indicator-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(247, 248, 250, 0.86);
            border-radius: var(--radius-medium);
        }

        .indicator-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: var(--radius-small);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .indicator-checkbox.checked {
            background: var(--arcoblue-6);
            border-color: var(--arcoblue-6);
            color: white;
        }

        .indicator-checkbox i {
            font-size: 10px;
        }

        .indicator-name {
            flex: 1;
            min-width: 0;
            font-size: var(--font-size-body-1);
            color: var(--text-1);
            line-height: 1.4;
        }
    </style>
    <script src="../components/mobile/mobile-title-bar.js" defer></script>
</head>
<body>
    <!-- 导航栏 -->
    <mobile-title-bar id="pageTitleBar" title="待管详情"></mobile-title-bar>
    <script>
        customElements.whenDefined('mobile-title-bar').then(function bindMobileTitleBar() {
            const titleBar = document.querySelector('mobile-title-bar');
            if (!titleBar) return;
            titleBar.onBack = goBack;
        });
    </script>

    <!-- 待管信息卡 -->
    <div class="section-title" id="pendingInfoTitle">待管信息</div>
    <div id="diseaseCards">
        <!-- 动态生成 -->
    </div>

    <script>
        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const patientId = getUrlParam('id') || 1;

        // 模拟患者详细数据
        const patientDetailData = {
            1: {
                name: '王建国',
                diseases: [
                    {
                        name: '高血压',
                        transferDate: '2024-01-15',
                        diagnosis: {
                            date: '2024-01-10',
                            diagnosis: '原发性高血压3级',
                            institution: '幸福社区卫生服务中心'
                        },
                        indicators: [
                            { name: '收缩压≥140mmHg', checked: true },
                            { name: '舒张压≥90mmHg', checked: true },
                            { name: '高血压病史', checked: true },
                            { name: '靶器官损害', checked: false }
                        ]
                    },
                    {
                        name: '糖尿病',
                        transferDate: '2024-02-20',
                        diagnosis: {
                            date: '2024-02-18',
                            diagnosis: '2型糖尿病',
                            institution: '幸福社区卫生服务中心'
                        },
                        indicators: [
                            { name: '空腹血糖≥7.0mmol/L', checked: true },
                            { name: '餐后2h血糖≥11.1mmol/L', checked: true },
                            { name: '糖化血红蛋白≥6.5%', checked: true },
                            { name: '糖尿病症状', checked: true }
                        ]
                    }
                ]
            },
            2: {
                name: '李秀英',
                diseases: [
                    {
                        name: '高血压',
                        transferDate: '2024-03-10',
                        diagnosis: {
                            date: '2024-03-05',
                            diagnosis: '原发性高血压2级',
                            institution: '幸福社区卫生服务中心'
                        },
                        indicators: [
                            { name: '收缩压≥140mmHg', checked: true },
                            { name: '舒张压≥90mmHg', checked: false },
                            { name: '高血压病史', checked: true },
                            { name: '靶器官损害', checked: false }
                        ]
                    },
                    {
                        name: '冠心病',
                        transferDate: '2024-03-15',
                        diagnosis: {
                            date: '2024-03-12',
                            diagnosis: '冠状动脉粥样硬化性心脏病',
                            institution: '市第一人民医院'
                        },
                        indicators: [
                            { name: '心绞痛症状', checked: true },
                            { name: '心电图异常', checked: true },
                            { name: '冠脉CTA狭窄', checked: true }
                        ]
                    }
                ]
            },
            3: {
                name: '张大山',
                diseases: [
                    {
                        name: '糖尿病',
                        transferDate: '2024-04-08',
                        diagnosis: {
                            date: '2024-04-02',
                            diagnosis: '2型糖尿病',
                            institution: '幸福社区卫生服务中心'
                        },
                        indicators: [
                            { name: '空腹血糖≥7.0mmol/L', checked: true },
                            { name: '餐后2h血糖≥11.1mmol/L', checked: true },
                            { name: '糖化血红蛋白≥6.5%', checked: false }
                        ]
                    },
                    {
                        name: '血脂异常',
                        transferDate: '2024-04-03',
                        diagnosis: {
                            date: '2024-03-28',
                            diagnosis: '混合型高脂血症',
                            institution: '幸福社区卫生服务中心'
                        },
                        indicators: [
                            { name: '总胆固醇升高', checked: true },
                            { name: '甘油三酯升高', checked: true },
                            { name: '低密度脂蛋白升高', checked: true }
                        ]
                    }
                ]
            },
            4: {
                name: '陈美丽',
                diseases: [
                    {
                        name: '高血压',
                        transferDate: '2024-04-16',
                        diagnosis: {
                            date: '2024-04-12',
                            diagnosis: '原发性高血压2级',
                            institution: '幸福社区卫生服务中心'
                        },
                        indicators: [
                            { name: '收缩压≥140mmHg', checked: true },
                            { name: '舒张压≥90mmHg', checked: true },
                            { name: '高血压家族史', checked: true },
                            { name: '靶器官损害', checked: false }
                        ]
                    }
                ]
            },
            5: {
                name: '刘志强',
                diseases: [
                    {
                        name: '高血压',
                        transferDate: '2024-05-06',
                        diagnosis: {
                            date: '2024-04-30',
                            diagnosis: '原发性高血压3级',
                            institution: '幸福社区卫生服务中心'
                        },
                        indicators: [
                            { name: '收缩压≥140mmHg', checked: true },
                            { name: '舒张压≥90mmHg', checked: true },
                            { name: '高血压病史', checked: true }
                        ]
                    },
                    {
                        name: '糖尿病',
                        transferDate: '2024-05-02',
                        diagnosis: {
                            date: '2024-04-28',
                            diagnosis: '2型糖尿病',
                            institution: '幸福社区卫生服务中心'
                        },
                        indicators: [
                            { name: '空腹血糖≥7.0mmol/L', checked: true },
                            { name: '餐后2h血糖≥11.1mmol/L', checked: true },
                            { name: '糖化血红蛋白≥6.5%', checked: true }
                        ]
                    },
                    {
                        name: '冠心病',
                        transferDate: '2024-04-25',
                        diagnosis: {
                            date: '2024-04-20',
                            diagnosis: '冠状动脉粥样硬化性心脏病',
                            institution: '市第一人民医院'
                        },
                        indicators: [
                            { name: '心绞痛症状', checked: true },
                            { name: '心电图异常', checked: true },
                            { name: '冠脉CTA狭窄', checked: true }
                        ]
                    }
                ]
            }
        };

        // 初始化
        window.addEventListener('load', () => {
            const patient = patientDetailData[patientId] || patientDetailData[1];
            updatePendingInfoTitle(patient);
            renderDiseaseCards(patient.diseases);
        });

        // 更新待管信息表头
        function updatePendingInfoTitle(patient) {
            document.getElementById('pendingInfoTitle').textContent = `${patient.name}的待管信息`;
        }

        // 渲染待管信息卡
        function renderDiseaseCards(diseases) {
            const container = document.getElementById('diseaseCards');
            
            // 按转入日期倒序排序
            const sortedDiseases = [...diseases].sort((a, b) => {
                return new Date(b.transferDate) - new Date(a.transferDate);
            });
            
            let html = '';
            sortedDiseases.forEach(disease => {
                let sectionsHtml = '';
                
                // 确诊信息
                if (disease.diagnosis) {
                    sectionsHtml += `
                        <div class="info-section">
                            <div class="info-section-title">
                                <i class="fas fa-stethoscope"></i>
                                确诊信息
                            </div>
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">确诊日期</span>
                                    <span class="info-value">${disease.diagnosis.date}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">确诊机构</span>
                                    <span class="info-value">${disease.diagnosis.institution}</span>
                                </div>
                                <div class="info-item" style="grid-column: span 2;">
                                    <span class="info-label">确诊诊断</span>
                                    <span class="info-value">${disease.diagnosis.diagnosis}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                // 诊断指标
                if (disease.indicators && disease.indicators.length > 0) {
                    const indicatorsHtml = disease.indicators.map(ind => `
                        <div class="indicator-item">
                            <div class="indicator-checkbox ${ind.checked ? 'checked' : ''}">
                                ${ind.checked ? '<i class="fas fa-check"></i>' : ''}
                            </div>
                            <span class="indicator-name">${ind.name}</span>
                        </div>
                    `).join('');
                    
                    sectionsHtml += `
                        <div class="info-section">
                            <div class="info-section-title">
                                <i class="fas fa-clipboard-check"></i>
                                诊断指标
                            </div>
                            <div class="indicator-list">
                                ${indicatorsHtml}
                            </div>
                        </div>
                    `;
                }
                
                html += `
                    <div class="disease-card">
                        <div class="disease-header">
                            <span class="disease-name">${disease.name}</span>
                            <span class="transfer-date">转入日期：${disease.transferDate}</span>
                        </div>
                        <div class="disease-body">
                            ${sectionsHtml}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // 返回
        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
