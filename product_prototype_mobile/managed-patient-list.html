<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的患者</title>
    <script src="../assets/vendor/tailwind-browser@4.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --arcoblue-6: #165DFF;
            --arcoblue-1: #E8F3FF;
            --text-1: #1D2129;
            --text-2: #4E5969;
            --text-3: #86909C;
            --text-4: #C9CDD4;
            --bg-1: #F8FAFC;
            --bg-2: #FFFFFF;
            --border: #E5E6EB;
            --radius-medium: 8px;
            --radius-large: 12px;
            --radius-xlarge: 20px;
            --font-size-caption: 12px;
            --font-size-body-1: 14px;
            --font-size-title-1: 16px;
            --font-size-title-2: 18px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-1);
            min-height: 100vh;
            padding-bottom: 70px;
        }

        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, var(--arcoblue-6) 0%, #4080FF 100%);
            padding: 8px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 16px;
            position: relative;
        }

        .navbar-title {
            font-size: var(--font-size-title-2);
            font-weight: 600;
            color: white;
        }

        .back-btn {
            position: absolute;
            left: 0;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        /* 通用页签区域 */
        .tabs-section {
            padding: 12px 16px 0;
        }

        /* 搜索区域 */
        .search-section {
            background: var(--bg-2);
            padding: 12px 16px;
        }

        /* 筛选标签 */
        .filter-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .filter-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-xlarge);
            font-size: var(--font-size-caption);
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tag.active {
            background: var(--arcoblue-1);
            border-color: var(--arcoblue-6);
            color: var(--arcoblue-6);
        }

        .filter-tag i {
            font-size: 10px;
        }

        /* 页面容器 */
        .page-container {
            display: none;
        }

        .page-container.active {
            display: block;
        }

        /* 患者列表 */
        .patient-list {
            padding: 12px 16px;
            display: grid;
            gap: 12px;
        }

        .patient-card-body {
            padding: 12px 16px 4px;
        }

        .patient-list .grouped-info-card {
            position: relative;
        }

        .patient-list .grouped-info-card__title {
            padding-left: 18px;
        }

        .patient-card-items {
            display: grid;
            gap: 2px;
        }

        .phone-btn {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0;
            background: #E8FFEA;
            color: #00B42A;
            border: none;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
        }

        .patient-call-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 2;
            border-radius: 50% !important;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            font-size: var(--font-size-body-1);
        }

        .detail-label {
            flex: 0 0 auto;
            color: var(--text-3);
            min-width: 60px;
            line-height: 26px;
        }

        .detail-value {
            min-width: 0;
            flex: 1;
            color: var(--text-2);
            line-height: 26px;
            word-break: break-all;
        }

        /* 在管病种标签：左侧病种圆标 + 右侧状态胶囊 */
        .manage-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            padding-top: 1px;
        }

        .manage-tag {
            display: inline-flex;
            align-items: center;
            min-width: 42px;
            height: 20px;
            border-radius: 999px;
            background: #f3f6ff;
            color: #5a78d8;
            font-size: 13px;
            font-weight: 800;
            line-height: 1;
            overflow: hidden;
            letter-spacing: 0;
        }

        .manage-tag__icon {
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex: 0 0 auto;
            border-radius: 50%;
            background: #5a84ff;
            color: #ffffff;
        }

        .manage-tag__level {
            min-width: 18px;
            padding: 0 6px 0 4px;
            color: currentColor;
            text-align: center;
        }

        .manage-tag.high-risk {
            background: #ffeef0;
            color: #ff6b7c;
        }

        .manage-tag.disease-hypertension {
            background: #ffe7ec;
            color: #ff6f82;
        }

        .manage-tag.disease-hypertension .manage-tag__icon {
            background: #ff6578;
        }

        .manage-tag.disease-diabetes {
            background: #ede8ff;
            color: #9b85df;
        }

        .manage-tag.disease-diabetes .manage-tag__icon {
            background: #8a6be8;
        }

        .manage-tag.disease-heart {
            background: #e9f1ff;
            color: #5a84ff;
        }

        .manage-tag.disease-heart .manage-tag__icon {
            background: #4f7dff;
        }

        .manage-tag.disease-stroke {
            background: #edf6ff;
            color: #5f89db;
        }

        .manage-tag.disease-stroke .manage-tag__icon {
            background: #5f8cff;
        }

        .manage-tag.disease-kidney {
            background: #eef8fb;
            color: #42a5b9;
        }

        .manage-tag.disease-kidney .manage-tag__icon {
            background: #38a8bd;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .empty-icon i {
            font-size: 36px;
            color: var(--text-4);
        }

        .empty-text {
            font-size: var(--font-size-body-1);
            color: var(--text-3);
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        /* 首页风格统一覆盖 */
        body {
            color: #333333;
            background: #f8fafc !important;
            -webkit-font-smoothing: antialiased;
        }

        .navbar {
            position: sticky;
            top: 0;
            overflow: hidden;
            background: rgba(217, 235, 255, 0.82) !important;
            border-bottom: 1px solid rgba(118, 140, 165, 0.12);
            box-shadow: 0 10px 26px rgba(60, 101, 145, 0.08);
            backdrop-filter: blur(14px);
        }

        .navbar::before {
            content: "";
            position: absolute;
            top: -58px;
            right: -34px;
            width: 170px;
            height: 150px;
            border-radius: 34px;
            background: linear-gradient(135deg, rgba(67, 142, 255, 0.2), rgba(255, 255, 255, 0.06));
            transform: rotate(-12deg);
            pointer-events: none;
        }

        .navbar-content,
        .navbar-title,
        .back-btn,
        .search-btn,
        .navbar-count {
            position: relative;
            z-index: 1;
        }

        .navbar-title,
        .back-btn,
        .search-btn,
        .navbar-count {
            color: #0f1f33 !important;
        }

        .navbar-title {
            font-weight: 800 !important;
        }

        .search-section,
        .page-container,
        .session-list,
        .system-list {
            background: transparent !important;
        }

        .user-card,
        .org-card,
        .menu-list,
        .info-card,
        .detail-card,
        .record-card,
        .task-card,
        .anomaly-card,
        .form-card,
        .card,
        .section-card,
        .profile-card,
        .health-card,
        .content-card,
        .result-item,
        .empty-icon,
        .modal-content {
            background: rgba(255, 255, 255, 0.92) !important;
            border: 1px solid rgba(123, 147, 176, 0.14) !important;
            border-radius: 16px !important;
            box-shadow: 0 12px 32px rgba(60, 101, 145, 0.12) !important;
            backdrop-filter: blur(12px);
        }

        .session-item,
        .system-item,
        .menu-item,
        .list-item,
        .record-item,
        .info-row {
            border-color: rgba(119, 140, 166, 0.18) !important;
        }
        input,
        select,
        textarea {
            border-color: rgba(122, 150, 184, 0.13) !important;
            box-shadow: inset 0 0 0 1px rgba(122, 150, 184, 0.08);
        }

        .submit-btn,
        .filter-btn.confirm,
        .modal-btn.confirm,
        .login-btn,
        .code-btn:not(:disabled) {
            background: linear-gradient(145deg, #4b9bff, #2f7af6) !important;
            color: #fff !important;
            border: 0 !important;
            box-shadow: 0 8px 16px rgba(45, 101, 170, 0.13);
        }

        .filter-btn.reset,
        .modal-btn.cancel,
        .popup-option,
        .phone-btn {
            border-color: rgba(123, 147, 176, 0.14) !important;
        }

        .toast,
        .arco-toast {
            background: rgba(12, 20, 34, 0.82) !important;
            border-radius: 8px !important;
        }

        /* 首页风格补充覆盖 */
        .info-section,
        .info-list,
        .app-section,
        .form-section,
        .form-item,
        .filter-section,
        .disease-card,
        .indicator-item,
        .quick-action-item {
            background: rgba(255, 255, 255, 0.92) !important;
            border: 1px solid rgba(123, 147, 176, 0.14) !important;
            border-radius: 16px !important;
            box-shadow: 0 12px 32px rgba(60, 101, 145, 0.12) !important;
            backdrop-filter: blur(12px);
        }

        .patient-list,
        .task-list,
        .record-list,
        .search-results {
            position: relative;
            z-index: 1;
        }

        .submit-btn,
        .code-btn,
        .filter-btn,
        .modal-btn,
        .phone-btn {
            border-radius: 10px !important;
            font-weight: 700;
        }

        /* 全局顶部与查询框统一 */
        .navbar {
            position: sticky !important;
            top: 0 !important;
            min-height: 52px;
            padding: 8px 16px !important;
            z-index: 100 !important;
        }

        .navbar-content {
            position: relative !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            min-height: 36px;
            padding-bottom: 0 !important;
        }

        .navbar-content .back-btn {
            position: absolute !important;
            left: 0 !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            margin: 0 !important;
            z-index: 2 !important;
        }

        .navbar>.back-btn {
            position: absolute !important;
            left: 16px !important;
            bottom: 12px !important;
            margin: 0 !important;
            z-index: 2 !important;
        }

        .navbar-title,
        .navbar-content .navbar-title,
        .navbar>.navbar-title {
            position: absolute !important;
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%) !important;
            width: calc(100% - 128px) !important;
            margin: 0 !important;
            padding: 0 !important;
            text-align: center !important;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            z-index: 1 !important;
        }

        .navbar>.navbar-title {
            top: auto !important;
            bottom: 19px !important;
            transform: translateX(-50%) !important;
        }

        .search-btn,
        .navbar-count {
            position: absolute !important;
            right: 0 !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            margin: 0 !important;
            z-index: 2 !important;
        }

        .navbar>.search-btn,
        .navbar>.navbar-count {
            right: 16px !important;
            top: auto !important;
            bottom: 12px !important;
            transform: none !important;
        }

        .search-section,
        .filter-section,
        .search-header {
            background: transparent !important;
        }
    </style>
    <script src="../components/mobile/mobile-title-bar.js" defer></script>
    <script src="../components/mobile/mobile-tabs.js"></script>
    <script src="../components/mobile/mobile-search.js"></script>
    <script src="../components/mobile/grouped-info-card.js"></script>
</head>

<body>
    <!-- Toast 容器 -->
    <div class="toast" id="toast"></div>

    <!-- 导航栏 -->
    <mobile-title-bar title="我的患者" back-action="goBack()"></mobile-title-bar>

    <!-- 页签 -->
    <div class="tabs-section">
        <mobile-tabs id="managedPatientTabs"></mobile-tabs>
    </div>

    <!-- 搜索区域 -->
    <div class="search-section">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜索姓名、手机号、身份证" oninput="handleSearch()">
        </div>
        <div class="filter-tags">
            <div class="filter-tag active" onclick="toggleFilter(this, 'all')">全部</div>
            <div class="filter-tag" onclick="toggleFilter(this, 'hypertension')">高血压</div>
            <div class="filter-tag" onclick="toggleFilter(this, 'diabetes')">糖尿病</div>
            <div class="filter-tag" onclick="toggleFilter(this, 'heart')">冠心病</div>
        </div>
    </div>

    <!-- 在管患者页 -->
    <div class="page-container active" id="managedPage">
        <div class="patient-list" id="managedList"></div>
    </div>

    <!-- 在管高危页 -->
    <div class="page-container" id="highRiskPage">
        <div class="patient-list" id="highRiskList"></div>
    </div>

    <script>
        // Toast 提示函数
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        // 在管患者数据
        const managedPatients = [
            { id: 1, name: '王建国', gender: '男', age: 68, phone: '13812341234', idCard: '330326195601011234', diseases: [{ name: '高血压', level: '一级' }, { name: '糖尿病', level: '强化' }] },
            { id: 2, name: '李秀英', gender: '女', age: 72, phone: '13912345678', idCard: '330326195201025678', diseases: [{ name: '高血压', level: '二级' }] },
            { id: 3, name: '张大山', gender: '男', age: 65, phone: '13712349012', idCard: '330326195801019012', diseases: [{ name: '糖尿病', level: '常规' }] },
            { id: 4, name: '陈美丽', gender: '女', age: 58, phone: '13612343456', idCard: '330326196601023456', diseases: [{ name: '高血压', level: '一级' }, { name: '冠心病', level: '常规' }] }
        ];

        // 在管高危数据
        const highRiskPatients = [
            { id: 5, name: '刘志强', gender: '男', age: 70, phone: '13512347890', idCard: '330326195401017890', diseases: [{ name: '高血压', level: '高危' }, { name: '脑卒中', level: '高危' }] },
            { id: 6, name: '赵淑芬', gender: '女', age: 75, phone: '13312342468', idCard: '330326194901023456', diseases: [{ name: '糖尿病', level: '高危' }, { name: '肾病', level: '高危' }] },
            { id: 7, name: '孙大伟', gender: '男', age: 62, phone: '13212341357', idCard: '330326196201015678', diseases: [{ name: '冠心病', level: '高危' }] }
        ];

        // 当前筛选条件
        let currentFilter = 'all';
        let searchKeyword = '';

        // 初始化
        document.addEventListener('DOMContentLoaded', function () {
            const urlParams = new URLSearchParams(window.location.search);
            const defaultTab = urlParams.get('tab') || 'managed';

            initManagedPatientTabs();
            renderManagedPatients();
            renderHighRiskPatients();
            switchTab(defaultTab);
        });

        // 渲染在管患者
        function renderManagedPatients() {
            const filtered = filterPatients(managedPatients);
            const container = document.getElementById('managedList');
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = renderEmptyState();
            } else {
                filtered.forEach(p => renderPatientCard(container, p, false));
            }
        }

        // 渲染在管高危
        function renderHighRiskPatients() {
            const filtered = filterPatients(highRiskPatients);
            const container = document.getElementById('highRiskList');
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = renderEmptyState();
            } else {
                filtered.forEach(p => renderPatientCard(container, p, true));
            }
        }

        // 筛选患者
        function filterPatients(patients) {
            return patients.filter(p => {
                // 关键词搜索
                const matchKeyword = !searchKeyword ||
                    p.name.includes(searchKeyword) ||
                    p.phone.includes(searchKeyword) ||
                    p.idCard.includes(searchKeyword);

                // 病种筛选
                let matchFilter = true;
                if (currentFilter !== 'all') {
                    const diseaseMap = {
                        'hypertension': '高血压',
                        'diabetes': '糖尿病',
                        'heart': '冠心病'
                    };
                    const targetDisease = diseaseMap[currentFilter];
                    matchFilter = p.diseases.some(d => d.name === targetDisease);
                }

                return matchKeyword && matchFilter;
            });
        }

        // 渲染空状态
        function renderEmptyState() {
            return `
                <div class="empty-state">
                    <div class="empty-icon">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="empty-text">未找到匹配的患者</div>
                </div>
            `;
        }

        // 渲染患者卡片
        function renderPatientCard(container, patient, isHighRisk) {
            const diseaseTags = patient.diseases.map(d => {
                const tagClass = `manage-tag ${getDiseaseBadgeClass(d.name)} ${isHighRisk ? 'high-risk' : ''}`.trim();
                return `
                    <span class="${tagClass}" title="${d.name} · ${d.level}">
                        <span class="manage-tag__icon">${getDiseaseBadgeText(d.name)}</span>
                        <span class="manage-tag__level">${getDiseaseLevelText(d.level)}</span>
                    </span>
                `;
            }).join('');

            const card = GroupedInfoCard.render(container, {
                title: patient.name,
                status:{
                    label:'男·70岁',
                    size:'small',
                    color:'default'
                },
                keyword: searchKeyword,
                highlightFields: ['title'],
                showDivider: true,
                actions: [
                    {
                        label: '健康画像',
                        icon: 'fas fa-user-circle',
                        onClick: () => viewProfile(patient.id)
                    },
                    {
                        label: '预随访',
                        icon: 'fas fa-clipboard-check',
                        primary: true,
                        onClick: () => preFollowup(patient.id)
                    }
                ]
            });
            const callButton = document.createElement('button');
            callButton.className = 'phone-btn patient-call-btn';
            callButton.type = 'button';
            callButton.setAttribute('aria-label', `呼叫${patient.name}`);
            callButton.innerHTML = '<i class="fas fa-phone"></i>';
            callButton.addEventListener('click', () => callPatient(patient.phone, patient.name));
            card.appendChild(callButton);

            const content = document.createElement('div');
            content.className = 'patient-card-body';
            content.innerHTML = `
                <div class="patient-card-items">
                    <div class="detail-item">
                        <span class="detail-label">证件号码</span>
                        <span class="detail-value">${patient.idCard}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">联系电话</span>
                        <span class="detail-value">${patient.phone}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">在管病种</span>
                        <span class="detail-value">
                            <span class="manage-tags">${diseaseTags}</span>
                        </span>
                    </div>
                </div>
            `;
            const actions = card.querySelector('.grouped-info-card__actions');
            card.insertBefore(content, actions);
        }

        // 根据病种生成圆形短标文字
        function getDiseaseBadgeText(diseaseName) {
            const badgeTextMap = {
                '高血压': '高',
                '糖尿病': '糖',
                '冠心病': '冠',
                '脑卒中': '脑',
                '肾病': '肾'
            };
            return badgeTextMap[diseaseName] || diseaseName.slice(0, 1);
        }

        // 根据病种分级生成胶囊右侧短标
        function getDiseaseLevelText(level) {
            const levelTextMap = {
                '一级': '1',
                '二级': '2',
                '三级': '3',
                '高危': '危',
                '常规': '常',
                '强化': '强'
            };
            return levelTextMap[level] || level;
        }

        // 根据病种生成不同颜色的圆形标识
        function getDiseaseBadgeClass(diseaseName) {
            const badgeClassMap = {
                '高血压': 'disease-hypertension',
                '糖尿病': 'disease-diabetes',
                '冠心病': 'disease-heart',
                '脑卒中': 'disease-stroke',
                '肾病': 'disease-kidney'
            };
            return badgeClassMap[diseaseName] || '';
        }

        // 初始化通用页签组件
        function initManagedPatientTabs() {
            const tabs = document.getElementById('managedPatientTabs');
            tabs.tabs = [
                { label: '在管患者', value: 'managed', count: managedPatients.length },
                { label: '在管高危', value: 'high-risk', count: highRiskPatients.length }
            ];
            tabs.addEventListener('change', (event) => {
                switchTab(event.detail.value);
            });
        }

        // 切换页签
        function switchTab(tab) {
            const currentTab = tab === 'high-risk' ? 'high-risk' : 'managed';
            document.getElementById('managedPatientTabs').value = currentTab;

            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active'));
            document.getElementById(currentTab === 'managed' ? 'managedPage' : 'highRiskPage').classList.add('active');
        }

        // 搜索处理
        function handleSearch() {
            searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
            renderManagedPatients();
            renderHighRiskPatients();
        }

        // 切换筛选标签
        function toggleFilter(element, filter) {
            document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            currentFilter = filter;
            renderManagedPatients();
            renderHighRiskPatients();
        }

        // 拨打电话
        function callPatient(phone, name) {
            showToast(`正在呼叫 ${name}: ${phone}`);
        }

        // 查看健康画像
        function viewProfile(patientId) {
            window.location.href = `patient-health-profile.html?id=${patientId}`;
        }

        // 预随访
        function preFollowup(patientId) {
            window.location.href = `patient-pre-follow-up.html?id=${patientId}`;
        }

        // 返回上一页
        function goBack() {
            window.history.back();
        }
    </script>
</body>

</html>
