<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消息中心</title>
    <script src="../assets/vendor/tailwind-browser@4.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Web Component 变量与少量状态样式，主体布局与视觉使用 Tailwind 实现 */
        mobile-title-bar {
            --mobile-title-bar-height: 48px;
            --mobile-title-bar-bg: #FFFFFF;
            --mobile-title-bar-color: #1D2129;
            --mobile-title-bar-border: #E5E6EB;
            --mobile-title-bar-max-width: 768px;
        }

        .tab-item.active {
            color: #2F6BFF;
            font-weight: 600;
        }

        .tab-item.active::after {
            content: "";
            position: absolute;
            right: 30%;
            bottom: 0;
            left: 30%;
            height: 3px;
            border-radius: 999px;
            background: #2F6BFF;
        }

        .message-row.unread .message-title::before {
            content: "";
            display: inline-block;
            width: 7px;
            height: 7px;
            margin-right: 7px;
            border-radius: 50%;
            background: #F53F3F;
            vertical-align: 1px;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
    <script src="../components/mobile/mobile-title-bar.js" defer></script>
    <script src="../components/mobile/mobile-search.js"></script>
    <script src="../modules/medical-staff-tabbar.js" defer></script>
</head>

<body class="mx-auto min-h-screen w-full min-w-[320px] max-w-[768px] bg-[#F8FAFC] text-[#1D2129] antialiased [font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe_UI','PingFang_SC',sans-serif]">
    <!-- 页面提示容器 -->
    <div class="toast pointer-events-none fixed left-1/2 top-1/2 z-[1000] max-w-[calc(100%-64px)] -translate-x-1/2 -translate-y-1/2 rounded-lg bg-black/75 px-4 py-2.5 text-sm text-white opacity-0 transition-opacity" id="toast"></div>

    <!-- 顶部标题栏 -->
    <mobile-title-bar title="消息中心" show-back="false" safe-area="true" border="true"></mobile-title-bar>

    <!-- 消息类型页签 -->
    <nav class="sticky top-[calc(48px+env(safe-area-inset-top,0px))] z-[80] flex w-full border-b border-[#ECEEF2] bg-white px-4" aria-label="消息类型">
        <button class="tab-item active relative min-h-11 flex-1 cursor-pointer border-0 bg-transparent text-sm font-medium text-[#4E5969]" type="button" data-tab="sessions" onclick="switchTab('sessions')">会话</button>
        <button class="tab-item relative min-h-11 flex-1 cursor-pointer border-0 bg-transparent text-sm font-medium text-[#4E5969]" type="button" data-tab="system" onclick="switchTab('system')">系统消息</button>
    </nav>

    <!-- 会话列表页面：参考微信会话列表，搜索后直接替换为居民结果列表 -->
    <main class="pb-[calc(88px+env(safe-area-inset-bottom,0px))]" id="sessionsPage">
        <section class="bg-[#F8FAFC] px-4 pb-2 pt-3" aria-label="搜索居民">
            <label class="mobile-search" for="searchInput">
                <i class="fas fa-search" aria-hidden="true"></i>
                <input type="search" id="searchInput" placeholder="搜索姓名、电话、身份证" oninput="handleSearch()">
            </label>
        </section>
        <section class="overflow-hidden bg-white" id="sessionList" aria-label="会话列表"></section>
        <section class="hidden overflow-hidden bg-white" id="searchResults" aria-label="搜索结果"></section>
    </main>

    <!-- 系统消息页面：系统分类同样使用会话列表结构展示 -->
    <main class="hidden pb-[calc(88px+env(safe-area-inset-bottom,0px))]" id="systemPage">
        <section class="overflow-hidden bg-white" id="systemList" aria-label="系统消息分类"></section>
    </main>

    <!-- 系统消息详情页面：按时间流展示分类内消息 -->
    <main class="hidden pb-[calc(88px+env(safe-area-inset-bottom,0px))]" id="systemDetailPage">
        <div class="flex min-h-12 items-center bg-[#F8FAFC] px-4 py-1">
            <button class="inline-flex min-h-10 items-center gap-1.5 border-0 bg-transparent text-sm font-medium text-[#2F6BFF]" type="button" onclick="backToSystemList()">
                <i class="fas fa-chevron-left" aria-hidden="true"></i>
                <span>返回系统消息</span>
            </button>
        </div>
        <section class="bg-white" id="sysDetailList" aria-label="系统消息详情"></section>
    </main>

    <!-- 医护端底部导航栏：模块内部已处理 fixed 与底部安全区 -->
    <medical-staff-tabbar active="message" message-badge="12"></medical-staff-tabbar>

    <script>
        // Toast：用于轻量提示，当前页面保留能力便于后续扩展。
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        // 居民基础数据：用于搜索并进入单人会话。
        const residents = [
            { id: 1, name: '王建国', idCard: '330326195601011234', phone: '138****1234', disease: '高血压' },
            { id: 2, name: '李秀英', idCard: '330326195201025678', phone: '139****5678', disease: '2型糖尿病' },
            { id: 3, name: '张大山', idCard: '330326195801019012', phone: '137****9012', disease: '高血压合并糖尿病' },
            { id: 4, name: '陈美丽', idCard: '330326196601023456', phone: '136****3456', disease: '高血压' },
            { id: 5, name: '刘志强', idCard: '330326195401017890', phone: '135****7890', disease: '血脂异常' }
        ];

        // 会话数据：高频医患沟通内容，按微信会话列表的信息层级展示。
        let sessions = [
            { id: 1, residentId: 1, name: '王建国', idCard: '330326195601011234', lastMessage: '医生，我今天早上血压 152/94 mmHg，需要加药吗？', lastTime: '10:30', unread: 2 },
            { id: 2, residentId: 2, name: '李秀英', idCard: '330326195201025678', lastMessage: '空腹血糖 6.8 mmol/L，饮食按您说的调整了。', lastTime: '09:12', unread: 0 },
            { id: 3, residentId: 3, name: '张大山', idCard: '330326195801019012', lastMessage: '明天上午我去社区卫生服务中心复查。', lastTime: '昨天', unread: 1 },
            { id: 4, residentId: 4, name: '陈美丽', idCard: '330326196601023456', lastMessage: '这两天头晕，家里测血压最高 158/98 mmHg。', lastTime: '周二', unread: 3 }
        ];

        // 系统消息分类：任务、公告、预警按业务域聚合，避免单条卡片堆叠。
        const systemCategories = [
            {
                id: 'alert',
                name: '任务提醒',
                icon: 'clipboard-list',
                tone: 'danger',
                messages: [
                    { id: 1, title: '随访任务提醒', content: '您有3位患者本周需要完成随访，请及时处理。', time: '10:00', read: false, detail: '以下患者本周需要完成随访：\n\n1. 王建国 - 高血压随访（逾期1天）\n2. 李秀英 - 糖尿病随访（截止周五）\n3. 张大山 - 高血压合并糖尿病随访（截止周日）\n\n请尽快安排随访，确保患者健康管理连续性。' },
                    { id: 2, title: '体检结果待确认', content: '2位患者的体检结果已出，请及时确认并反馈。', time: '昨天', read: false, detail: '以下患者的体检结果已出，请及时确认并反馈：\n\n1. 刘志强 - 年度体检（血压 146/90 mmHg，低密度脂蛋白胆固醇 3.7 mmol/L）\n2. 陈美丽 - 季度检查（空腹血糖 5.9 mmol/L，血压 138/86 mmHg）\n\n请登录系统查看详细报告。' },
                    { id: 3, title: '待管患者提醒', content: '新增5位待管患者，请尽快完成纳管评估。', time: '周一', read: true, detail: '本周新增5位待管患者：\n\n1. 周小明 - 高血压\n2. 吴芳芳 - 2型糖尿病\n3. 孙大伟 - 高血压合并糖尿病\n4. 马丽华 - 2型糖尿病\n5. 赵国强 - 高血压\n\n请尽快完成患者评估和纳管工作。' }
                ]
            },
            {
                id: 'notice',
                name: '系统公告',
                icon: 'bell',
                tone: 'warning',
                messages: [
                    { id: 4, title: '系统维护通知', content: '2026年5月18日 02:00-04:00 进行系统升级。', time: '昨天', read: false, detail: '尊敬的用户：\n\n为提升系统稳定性和使用体验，我们将于2026年5月18日 02:00-04:00 进行系统维护升级。\n\n维护期间系统将暂停服务，请您提前做好工作安排。给您带来的不便，敬请谅解。\n\n如有疑问，请联系技术支持。' },
                    { id: 5, title: '培训通知', content: '基层医生慢病管理培训将于2026年5月20日举行。', time: '周一', read: true, detail: '培训主题：基层医生慢性病管理能力提升培训\n\n时间：2026年5月20日 14:00-17:00\n地点：西湖区社区卫生服务中心三楼会议室\n\n培训内容：\n1. 高血压规范化管理\n2. 糖尿病规范化管理\n3. 慢病患者健康教育技巧\n\n请各位医生提前安排好工作，准时参加。' },
                    { id: 6, title: '端午节值班安排', content: '端午节值班安排已发布，请查看并确认。', time: '上周', read: true, detail: '2026年端午节值班安排：\n\n5月30日：张医生\n5月31日：李医生\n6月1日：王医生\n\n值班要求：\n1. 保持电话畅通\n2. 关注系统异常预警\n3. 及时处理紧急随访\n\n如需调班请提前报备。' }
                ]
            },
            {
                id: 'info',
                name: '健康预警',
                icon: 'heart-pulse',
                tone: 'success',
                messages: [
                    { id: 7, title: '患者异常预警', content: '陈美丽血压连续3天偏高，建议今日联系。', time: '昨天', read: true, detail: '患者信息：陈美丽\n身份证：330326196601023456\n\n异常详情：\n该患者近3天血压监测数据如下：\n5月12日 08:00 - 158/98 mmHg\n5月13日 08:30 - 162/100 mmHg\n5月14日 07:45 - 155/95 mmHg\n\n连续3天收缩压≥150 mmHg，舒张压≥95 mmHg，超出管理阈值。\n\n建议：\n1. 及时联系患者了解用药和症状\n2. 评估是否需要调整用药方案\n3. 建议患者来院复查' },
                    { id: 8, title: '月度报表已生成', content: '2026年4月慢病管理月度报表已生成。', time: '上周', read: true, detail: '2026年4月慢病管理月度报表\n\n管辖患者总数：352人\n\n高血压管理：\n在管人数：187人\n规范随访率：92.3%\n血压达标率：78.5%\n\n糖尿病管理：\n在管人数：165人\n规范随访率：89.7%\n血糖达标率：72.1%\n\n新增纳管：12人\n转出/死亡：3人\n\n详细数据请登录管理后台查看。' }
                ]
            }
        ];

        // 页面初始化：渲染会话列表和系统消息分类。
        document.addEventListener('DOMContentLoaded', function () {
            renderSessions();
            renderSystemMessages();
        });

        // 身份证脱敏：保留业务识别所需的前后位。
        function formatIdCard(idCard) {
            if (!idCard || idCard.length < 10) return '';
            return idCard.substring(0, 4) + '…' + idCard.substring(idCard.length - 4);
        }

        // 头像文字：使用姓名末字，贴近微信列表的识别效率。
        function getAvatarText(name) {
            return name ? name.slice(-1) : '患';
        }

        // Tailwind 类组合：统一会话列表的结构和状态，避免页面级 CSS 重复。
        const itemClass = 'flex min-h-[72px] cursor-pointer active:bg-[#F2F6FF]';
        const avatarBaseClass = 'relative m-[12px_12px_12px_16px] flex h-12 w-12 flex-[0_0_48px] items-center justify-center rounded-lg text-lg font-semibold';
        const avatarToneClass = {
            primary: 'bg-[#EAF1FF] text-[#2F6BFF]',
            danger: 'bg-[#FFECEC] text-[#F53F3F]',
            warning: 'bg-[#FFF4E8] text-[#FF8A34]',
            success: 'bg-[#E8FFF1] text-[#07C160]'
        };
        const listBodyClass = 'relative min-w-0 flex-1 py-3 pr-4';
        const listRowClass = 'flex min-w-0 items-center justify-between gap-2';
        const listTitleClass = 'min-w-0 truncate text-base font-medium leading-[22px] text-[#1D2129]';
        const listMetaClass = 'flex-none text-xs leading-[18px] text-[#86909C]';
        const listSubtitleClass = 'min-w-0 truncate text-[13px] leading-5 text-[#86909C]';
        const patientTagClass = 'ml-1 text-xs font-normal text-[#86909C]';
        const badgeClass = 'inline-flex h-[18px] min-w-[18px] flex-none items-center justify-center rounded-full bg-[#F53F3F] px-1.5 text-[10px] font-semibold leading-[18px] text-white';

        // 渲染会话列表：标题、时间、摘要、未读数保持同一信息平面。
        function renderSessions() {
            const container = document.getElementById('sessionList');
            if (sessions.length === 0) {
                container.innerHTML = renderEmpty('fa-comment-slash', '暂无会话');
                return;
            }

            container.innerHTML = sessions.map(session => `
                <article class="${itemClass}" onclick="goToChat(${session.residentId}, '${session.name}')">
                    <div class="${avatarBaseClass} ${avatarToneClass.primary}" aria-hidden="true">${getAvatarText(session.name)}</div>
                    <div class="${listBodyClass}">
                        <div class="${listRowClass}">
                            <h2 class="${listTitleClass}">${session.name}<span class="${patientTagClass}">${formatIdCard(session.idCard)}</span></h2>
                            <span class="${listMetaClass}">${session.lastTime}</span>
                        </div>
                        <div class="${listRowClass}">
                            <p class="${listSubtitleClass}">${session.lastMessage}</p>
                            ${session.unread > 0 ? `<span class="${badgeClass}">${session.unread}</span>` : ''}
                        </div>
                    </div>
                </article>
            `).join('');
        }

        // 渲染系统消息分类：分类即会话，未读数挂在图标右上角。
        function renderSystemMessages() {
            const container = document.getElementById('systemList');
            if (systemCategories.length === 0) {
                container.innerHTML = renderEmpty('fa-bell-slash', '暂无系统消息');
                return;
            }

            container.innerHTML = systemCategories.map(category => {
                const unreadCount = category.messages.filter(message => !message.read).length;
                const latestMessage = category.messages[0];
                return `
                    <article class="${itemClass}" onclick="openCategory('${category.id}')">
                        <div class="${avatarBaseClass} ${avatarToneClass[category.tone]}" aria-hidden="true">
                            <i class="fas fa-${category.icon}"></i>
                            ${unreadCount > 0 ? `<span class="${badgeClass} absolute -right-1.5 -top-1.5">${unreadCount}</span>` : ''}
                        </div>
                        <div class="${listBodyClass}">
                            <div class="${listRowClass}">
                                <h2 class="${listTitleClass}">${category.name}</h2>
                                <span class="${listMetaClass}">${latestMessage.time}</span>
                            </div>
                            <div class="${listRowClass}">
                                <p class="${listSubtitleClass}">${latestMessage.content}</p>
                                <i class="fas fa-chevron-right ml-2 flex-none text-xs text-[#C9CDD4]" aria-hidden="true"></i>
                            </div>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // 打开系统分类详情：进入同页详情流，减少跳转链路。
        function openCategory(categoryId) {
            const category = systemCategories.find(item => item.id === categoryId);
            if (!category) return;

            const listContainer = document.getElementById('sysDetailList');
            listContainer.innerHTML = category.messages.map(message => `
                <article class="message-row ${!message.read ? 'unread' : ''} cursor-pointer border-b border-[#ECEEF2] px-4 py-3.5 last:border-b-0" onclick="viewSystemMessage('${category.id}', ${message.id})">
                    <div class="${listRowClass}">
                        <h2 class="message-title min-w-0 truncate text-[15px] font-semibold leading-[22px] text-[#1D2129]">${message.title}</h2>
                        <span class="${listMetaClass}">${message.time}</span>
                    </div>
                    <p class="mt-1 text-[13px] leading-5 text-[#4E5969]">${message.content}</p>
                    <div class="mt-1.5 text-xs leading-[18px] text-[#86909C]">点击查看详情</div>
                </article>
            `).join('');

            document.getElementById('systemPage').classList.add('hidden');
            document.getElementById('systemDetailPage').classList.remove('hidden');
        }

        // 返回系统消息分类列表。
        function backToSystemList() {
            document.getElementById('systemDetailPage').classList.add('hidden');
            document.getElementById('systemPage').classList.remove('hidden');
        }

        // 页签切换：同步清空详情态，保证再次进入系统消息时回到分类列表。
        function switchTab(tab) {
            document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

            ['sessionsPage', 'systemPage', 'systemDetailPage'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            if (tab === 'sessions') {
                document.getElementById('sessionsPage').classList.remove('hidden');
            } else {
                document.getElementById('systemPage').classList.remove('hidden');
            }
        }

        // 搜索处理：结果使用同一列表结构，避免搜索态卡片化。
        function handleSearch() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultsContainer = document.getElementById('searchResults');
            const sessionList = document.getElementById('sessionList');

            if (!keyword) {
                resultsContainer.classList.add('hidden');
                sessionList.classList.remove('hidden');
                return;
            }

            const results = residents.filter(resident =>
                resident.name.toLowerCase().includes(keyword) ||
                resident.phone.toLowerCase().includes(keyword) ||
                resident.idCard.toLowerCase().includes(keyword)
            );

            sessionList.classList.add('hidden');
            resultsContainer.classList.remove('hidden');

            if (results.length === 0) {
                resultsContainer.innerHTML = renderEmpty('fa-search', '未找到相关居民');
                return;
            }

            resultsContainer.innerHTML = results.map(resident => `
                <article class="${itemClass}" onclick="goToChat(${resident.id}, '${resident.name}')">
                    <div class="${avatarBaseClass} ${avatarToneClass.primary}" aria-hidden="true">${getAvatarText(resident.name)}</div>
                    <div class="${listBodyClass}">
                        <div class="${listRowClass}">
                            <h2 class="${listTitleClass}">${resident.name}<span class="${patientTagClass}">${resident.disease}</span></h2>
                            <span class="${listMetaClass}">${resident.phone}</span>
                        </div>
                        <p class="${listSubtitleClass}">身份证：${formatIdCard(resident.idCard)} · 点击发起会话</p>
                    </div>
                </article>
            `).join('');
        }

        // 查看系统消息详情：阅读后刷新未读状态，并用轻量弹窗展示全文。
        function viewSystemMessage(categoryId, messageId) {
            const category = systemCategories.find(item => item.id === categoryId);
            if (!category) return;
            const message = category.messages.find(item => item.id === messageId);
            if (!message) return;

            message.read = true;
            openCategory(categoryId);
            renderSystemMessages();

            const overlay = document.createElement('div');
            overlay.className = 'system-message-overlay fixed inset-0 z-[1000] flex items-center justify-center bg-black/40 p-6 pt-[calc(24px+env(safe-area-inset-top,0px))] pb-[calc(24px+env(safe-area-inset-bottom,0px))]';
            overlay.innerHTML = `
                <section class="w-full max-w-[340px] overflow-hidden rounded-xl bg-white" role="dialog" aria-modal="true" aria-label="${message.title}">
                    <div class="flex items-center gap-3 px-[18px] pb-3 pt-[18px]">
                        <div class="${avatarBaseClass} ${avatarToneClass[category.tone]} !m-0" aria-hidden="true">
                            <i class="fas fa-${category.icon}"></i>
                        </div>
                        <div class="min-w-0 flex-1">
                            <h2 class="${listTitleClass}">${message.title}</h2>
                            <p class="${listMetaClass}">${message.time}</p>
                        </div>
                    </div>
                    <div class="max-h-[50vh] overflow-y-auto px-[18px] pb-[18px] text-sm leading-7 text-[#4E5969]">${message.detail.replace(/\n/g, '<br>')}</div>
                    <button class="block min-h-12 w-full border-0 border-t border-[#ECEEF2] bg-white text-sm font-semibold text-[#2F6BFF]" type="button" onclick="this.closest('.system-message-overlay').remove()">我知道了</button>
                </section>
            `;
            overlay.addEventListener('click', function (event) {
                if (event.target === overlay) overlay.remove();
            });
            document.body.appendChild(overlay);
        }

        // 空状态模板：统一列表为空和搜索无结果的反馈。
        function renderEmpty(icon, text) {
            return `
                <div class="flex min-h-[220px] flex-col items-center justify-center text-sm text-[#86909C]">
                    <i class="fas ${icon} mb-2.5 text-[28px] text-[#C9CDD4]" aria-hidden="true"></i>
                    <span>${text}</span>
                </div>
            `;
        }

        // 进入患者聊天页面：沿用原有聊天页地址和参数。
        function goToChat(residentId, name) {
            window.location.href = `patient-chat-session.html?residentId=${residentId}&name=${encodeURIComponent(name)}`;
        }
    </script>
