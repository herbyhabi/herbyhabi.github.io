<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消息中心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --arcoblue-6: #165DFF;
            --arcoblue-1: #E8F3FF;
            --text-1: #1D2129;
            --text-2: #4E5969;
            --text-3: #86909C;
            --text-4: #C9CDD4;
            --bg-1: #F2F3F5;
            --bg-2: #FFFFFF;
            --border: #E5E6EB;
            --radius-medium: 8px;
            --radius-large: 12px;
            --radius-xlarge: 20px;
            --font-size-caption: 12px;
            --font-size-body-1: 14px;
            --font-size-title-1: 16px;
            --font-size-title-2: 18px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-2);
            min-height: 100vh;
            padding-bottom: calc(86px + env(safe-area-inset-bottom, 0px));
        }

        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, var(--arcoblue-6) 0%, #4080FF 100%);
            padding: 8px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 16px;
        }

        .navbar-title {
            font-size: var(--font-size-title-2);
            font-weight: 600;
            color: white;
        }

        .search-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        /* 页签 */
        .tabs {
            display: flex;
            background: var(--bg-2);
            border-bottom: 1px solid var(--border);
        }

        .tab-item {
            flex: 1;
            padding: 14px 0;
            text-align: center;
            font-size: var(--font-size-body-1);
            color: var(--text-2);
            cursor: pointer;
            position: relative;
        }

        .tab-item.active {
            color: var(--arcoblue-6);
            font-weight: 600;
        }

        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: var(--arcoblue-6);
            border-radius: 2px;
        }

        /* 页面容器 */
        .page-container {
            display: none;
        }

        .page-container.active {
            display: block;
        }

        /* 内联搜索框 */
        .inline-search {
            padding: 12px 16px 8px;
        }

        /* 搜索页面 */
        .search-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-1);
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.3s;
        }

        .search-page.show {
            transform: translateY(0);
        }

        .search-header {
            background: var(--bg-2);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .cancel-btn {
            font-size: var(--font-size-body-1);
            color: var(--arcoblue-6);
            cursor: pointer;
        }

        /* 搜索结果 */
        .search-results {
            padding: 12px 16px;
        }

        .result-item {
            background: var(--bg-2);
            padding: 16px;
            border-radius: var(--radius-large);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .result-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--arcoblue-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--arcoblue-6);
        }

        .result-info {
            flex: 1;
        }

        .result-name {
            font-size: var(--font-size-title-1);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .result-meta {
            font-size: var(--font-size-caption);
            color: var(--text-3);
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .empty-icon i {
            font-size: 36px;
            color: var(--text-4);
        }

        .empty-text {
            font-size: var(--font-size-body-1);
            color: var(--text-3);
        }

        /* 会话列表 - 简洁列表样式 */
        .session-list {
            background: var(--bg-2);
        }

        .session-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            background: var(--bg-2);
        }

        .session-item:last-child {
            border-bottom: none;
        }

        .session-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--arcoblue-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--arcoblue-6);
            flex-shrink: 0;
            margin-right: 12px;
        }

        .session-info {
            flex: 1;
            min-width: 0;
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .session-name {
            font-size: var(--font-size-body-1);
            font-weight: 500;
            color: var(--text-1);
        }

        .session-idcard {
            font-size: var(--font-size-caption);
            color: var(--text-3);
            font-weight: normal;
            margin-left: 4px;
        }

        .session-time {
            font-size: var(--font-size-caption);
            color: var(--text-3);
            flex-shrink: 0;
            margin-left: 8px;
        }

        .session-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-preview {
            font-size: var(--font-size-caption);
            color: var(--text-3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .unread-badge {
            min-width: 18px;
            height: 18px;
            background: var(--arcoblue-6);
            color: white;
            font-size: 10px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            flex-shrink: 0;
            margin-left: 8px;
        }

        /* 系统消息列表 */
        .system-list {
            background: var(--bg-2);
        }

        .system-item {
            display: flex;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .system-item:last-child {
            border-bottom: none;
        }

        .system-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            margin-right: 12px;
        }

        .system-icon.notice {
            background: #FFF7E8;
            color: #FF7D00;
        }

        .system-icon.alert {
            background: #FFECE8;
            color: #F53F3F;
        }

        .system-icon.info {
            background: #E8FFFB;
            color: #00B42A;
        }

        .system-info {
            flex: 1;
            min-width: 0;
        }

        .system-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .system-title {
            font-size: var(--font-size-body-1);
            font-weight: 500;
            color: var(--text-1);
        }

        .system-time {
            font-size: var(--font-size-caption);
            color: var(--text-3);
        }

        .system-content {
            font-size: var(--font-size-caption);
            color: var(--text-3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 底部导航 */
        .tabbar {
            position: fixed;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            z-index: 100;
            width: 100%;
            min-height: calc(72px + env(safe-area-inset-bottom, 0px));
            padding: 8px 14px calc(8px + env(safe-area-inset-bottom, 0px));
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            background: rgba(255, 255, 255, 0.96);
            border-top: 1px solid rgba(118, 140, 165, 0.16);
            box-shadow: 0 -10px 28px rgba(55, 83, 116, 0.08);
            backdrop-filter: blur(14px);
        }

        .tabbar-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            border: 0;
            background: transparent;
            color: #8c8f94;
            font: 500 12px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            cursor: pointer;
        }

        .tabbar-item i {
            font-size: 22px;
        }

        .tabbar-item.active {
            color: var(--arcoblue-6);
            font-weight: 700;
        }

        .tabbar-badge {
            position: absolute;
            top: 1px;
            right: calc(50% - 26px);
            min-width: 20px;
            height: 20px;
            border-radius: 999px;
            background: #ff3749;
            color: #fff;
            border: 2px solid #fff;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            font-weight: 800;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        /* 系统消息未读小圆点 */
        .system-icon {
            position: relative;
        }

        .system-unread-dot {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #F53F3F;
        }

        .system-unread-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            background: #F53F3F;
            color: #fff;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            font-weight: 800;
        }

        .system-arrow {
            color: var(--text-4);
            font-size: 14px;
            flex-shrink: 0;
            margin-left: 8px;
        }

        /* 系统消息分类详情页 */
        .sys-detail-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            min-height: 44px;
        }

        .sys-detail-header .back-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-1);
            font-size: 16px;
            cursor: pointer;
            padding: 8px 0;
        }

        .sys-detail-header .back-btn span {
            font-size: 15px;
        }

        .sys-detail-list {
            padding: 8px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 消息卡片 */
        .msg-card {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(123, 147, 176, 0.14);
            border-radius: 14px;
            padding: 16px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(60, 101, 145, 0.08);
            backdrop-filter: blur(12px);
            transition: transform 0.15s;
        }

        .msg-card:active {
            transform: scale(0.98);
        }

        .msg-card.unread {
            border-color: rgba(47, 122, 246, 0.3);
        }

        .msg-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .msg-card-title {
            font-size: var(--font-size-body-1);
            font-weight: 600;
            color: var(--text-1);
            flex: 1;
        }

        .msg-card.unread .msg-card-title {
            font-weight: 700;
            color: #1a3a6b;
        }

        .msg-card-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2f7af6;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .msg-card-body {
            font-size: var(--font-size-caption);
            color: var(--text-2);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .msg-card-footer {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: var(--font-size-caption);
            color: var(--text-3);
        }

        .msg-card-footer i {
            font-size: 11px;
        }

        /* 系统消息详情弹窗 */
        .sys-msg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .sys-msg-box {
            width: 100%;
            max-width: 340px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(60, 101, 145, 0.2);
            backdrop-filter: blur(12px);
            overflow: hidden;
        }

        .sys-msg-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 24px 20px 16px;
        }

        .sys-msg-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .sys-msg-icon.notice {
            background: #FFF7E8;
            color: #FF7D00;
        }

        .sys-msg-icon.alert {
            background: #FFECE8;
            color: #F53F3F;
        }

        .sys-msg-icon.info {
            background: #E8FFFB;
            color: #00B42A;
        }

        .sys-msg-titles {
            flex: 1;
        }

        .sys-msg-name {
            font-size: 17px;
            font-weight: 700;
            color: #1d2129;
            margin-bottom: 2px;
        }

        .sys-msg-time {
            font-size: 12px;
            color: #86909C;
        }

        .sys-msg-body {
            padding: 0 20px 20px;
            font-size: 14px;
            color: #4e5969;
            line-height: 1.7;
            max-height: 50vh;
            overflow-y: auto;
        }

        .sys-msg-close {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-top: 1px solid rgba(119, 140, 166, 0.18);
            background: transparent;
            color: #2f7af6;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
        }

        .sys-msg-close:active {
            background: rgba(47, 122, 246, 0.06);
        }

        /* 首页风格统一覆盖 */
        body {
            color: #0f1f33;
            background:
                radial-gradient(circle at 82% 2%, rgba(181, 213, 255, 0.8) 0 110px, transparent 220px),
                linear-gradient(180deg, #d9ebff 0%, #f4faff 28%, #f7fbff 68%, #ffffff 100%) !important;
            -webkit-font-smoothing: antialiased;
        }

        .navbar {
            position: sticky;
            top: 0;
            overflow: hidden;
            background: rgba(217, 235, 255, 0.82) !important;
            border-bottom: 1px solid rgba(118, 140, 165, 0.12);
            box-shadow: 0 10px 26px rgba(60, 101, 145, 0.08);
            backdrop-filter: blur(14px);
        }

        .navbar::before {
            content: "";
            position: absolute;
            top: -58px;
            right: -34px;
            width: 170px;
            height: 150px;
            border-radius: 34px;
            background: linear-gradient(135deg, rgba(67, 142, 255, 0.2), rgba(255, 255, 255, 0.06));
            transform: rotate(-12deg);
            pointer-events: none;
        }

        .navbar-content,
        .navbar-title,
        .back-btn,
        .search-btn,
        .navbar-count {
            position: relative;
            z-index: 1;
        }

        .navbar-title,
        .back-btn,
        .search-btn,
        .navbar-count {
            color: #0f1f33 !important;
        }

        .navbar-title {
            font-weight: 800 !important;
        }

        .tabs,
        .search-section,
        .stats-bar,
        .page-container,
        .session-list,
        .system-list {
            background: transparent !important;
        }

        .tab-item.active {
            color: #2f7af6 !important;
        }

        .tab-item.active::after {
            background: #2f7af6 !important;
        }

        .patient-card,
        .user-card,
        .org-card,
        .menu-list,
        .info-card,
        .detail-card,
        .record-card,
        .task-card,
        .anomaly-card,
        .form-card,
        .card,
        .section-card,
        .profile-card,
        .health-card,
        .content-card,
        .result-item,
        .empty-icon,
        .modal-content {
            background: rgba(255, 255, 255, 0.92) !important;
            border: 1px solid rgba(123, 147, 176, 0.14) !important;
            border-radius: 16px !important;
            box-shadow: 0 12px 32px rgba(60, 101, 145, 0.12) !important;
            backdrop-filter: blur(12px);
        }

        .session-item,
        .system-item,
        .menu-item,
        .list-item,
        .record-item,
        .info-row {
            border-color: rgba(119, 140, 166, 0.18) !important;
        }
        input,
        select,
        textarea {
            border-color: rgba(122, 150, 184, 0.13) !important;
            box-shadow: inset 0 0 0 1px rgba(122, 150, 184, 0.08);
        }

        .action-btn.primary,
        .submit-btn,
        .filter-btn.confirm,
        .modal-btn.confirm,
        .login-btn,
        .code-btn:not(:disabled) {
            background: linear-gradient(145deg, #4b9bff, #2f7af6) !important;
            color: #fff !important;
            border: 0 !important;
            box-shadow: 0 8px 16px rgba(45, 101, 170, 0.13);
        }

        .action-btn,
        .filter-btn.reset,
        .modal-btn.cancel,
        .popup-option,
        .phone-btn,
        .call-btn {
            border-color: rgba(123, 147, 176, 0.14) !important;
        }

        .toast,
        .arco-toast {
            background: rgba(12, 20, 34, 0.82) !important;
            border-radius: 8px !important;
        }

        /* 首页风格补充覆盖 */
        .info-section,
        .info-list,
        .app-section,
        .form-section,
        .form-item,
        .filter-section,
        .disease-card,
        .indicator-item,
        .quick-action-item {
            background: rgba(255, 255, 255, 0.92) !important;
            border: 1px solid rgba(123, 147, 176, 0.14) !important;
            border-radius: 16px !important;
            box-shadow: 0 12px 32px rgba(60, 101, 145, 0.12) !important;
            backdrop-filter: blur(12px);
        }

        .patient-list,
        .task-list,
        .record-list,
        .search-results {
            position: relative;
            z-index: 1;
        }

        .action-btn,
        .submit-btn,
        .code-btn,
        .filter-btn,
        .modal-btn,
        .phone-btn,
        .call-btn {
            border-radius: 10px !important;
            font-weight: 700;
        }

        .navbar+.tabs,
        .tabs {
            border-bottom-color: rgba(118, 140, 165, 0.16) !important;
            backdrop-filter: blur(10px);
        }


        /* 全局顶部与查询框统一 */
        .navbar {
            position: sticky !important;
            top: 0 !important;
            min-height: 52px;
            padding: 8px 16px !important;
            z-index: 100 !important;
        }

        .navbar-title {
            flex: 1;
            font-size: var(--font-size-title-2);
            font-weight: 600;
            color: white;
        }

        .navbar-content {
            position: relative !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            min-height: 36px;
            padding-bottom: 0 !important;
        }

        .navbar-content .back-btn {
            position: absolute !important;
            left: 0 !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            margin: 0 !important;
            z-index: 2 !important;
        }

        .navbar>.back-btn {
            position: absolute !important;
            left: 16px !important;
            bottom: 12px !important;
            margin: 0 !important;
            z-index: 2 !important;
        }

        .navbar-title,
        .navbar-content .navbar-title,
        .navbar>.navbar-title {
            position: absolute !important;
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%) !important;
            width: calc(100% - 128px) !important;
            margin: 0 !important;
            padding: 0 !important;
            text-align: center !important;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            z-index: 1 !important;
        }

        .navbar>.navbar-title {
            top: auto !important;
            bottom: 19px !important;
            transform: translateX(-50%) !important;
        }

        .search-btn,
        .navbar-count {
            position: absolute !important;
            right: 0 !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            margin: 0 !important;
            z-index: 2 !important;
        }

        .navbar>.search-btn,
        .navbar>.navbar-count {
            right: 16px !important;
            top: auto !important;
            bottom: 12px !important;
            transform: none !important;
        }

        .search-section,
        .filter-section,
        .search-header {
            background: transparent !important;
        }
    </style>
    <script src="../components/mobile/mobile-title-bar.js" defer></script>
    <script src="../components/mobile/mobile-search.js"></script>
</head>

<body>
    <!-- Toast 容器 -->
    <div class="toast" id="toast"></div>
    <!-- 导航栏 -->
    <mobile-title-bar title="消息中心" back="false"></mobile-title-bar>

    <!-- 页签 -->
    <div class="tabs">
        <div class="tab-item active" data-tab="sessions" onclick="switchTab('sessions')">会话列表</div>
        <div class="tab-item" data-tab="system" onclick="switchTab('system')">系统消息（草稿）</div>
    </div>

    <!-- 会话列表页 -->
    <div class="page-container active" id="sessionsPage">
        <div class="inline-search">
            <div class="search-input-wrapper">
                <i class="fas fa-search" style="color: var(--text-3);"></i>
                <input type="text" id="searchInput" placeholder="搜索姓名、电话、身份证" oninput="handleSearch()">
            </div>
        </div>
        <div class="session-list" id="sessionList"></div>
        <div class="search-results" id="searchResults" style="display:none;"></div>
    </div>

    <!-- 系统消息页 -->
    <div class="page-container" id="systemPage">
        <div class="system-list" id="systemList"></div>
    </div>

    <!-- 系统消息分类详情页 -->
    <div class="page-container" id="systemDetailPage">
        <div class="sys-detail-header">
            <div class="back-btn" onclick="backToSystemList()">
                <i class="fas fa-chevron-left"></i>
                <span>返回</span>
            </div>
        </div>
        <div class="sys-detail-list" id="sysDetailList"></div>
    </div>

    <!-- 底部导航 -->
    <nav class="tabbar">
        <button class="tabbar-item" type="button" onclick="goToPage('home')">
            <i class="fas fa-house"></i>
            <span>首页</span>
        </button>
        <button class="tabbar-item active" type="button" onclick="goToPage('message')">
            <i class="fas fa-comment-dots"></i>
            <span>消息</span>
            <span class="tabbar-badge">12</span>
        </button>
        <button class="tabbar-item" type="button" onclick="goToPage('profile')">
            <i class="fas fa-user"></i>
            <span>我的</span>
        </button>
    </nav>

    <script>
        // Toast 提示函数
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        // 居民数据
        const residents = [
            { id: 1, name: '王建国', idCard: '330326195601011234', phone: '138****1234' },
            { id: 2, name: '李秀英', idCard: '330326195201025678', phone: '139****5678' },
            { id: 3, name: '张大山', idCard: '330326195801019012', phone: '137****9012' },
            { id: 4, name: '陈美丽', idCard: '330326196601023456', phone: '136****3456' },
            { id: 5, name: '刘志强', idCard: '330326195401017890', phone: '135****7890' }
        ];

        // 会话数据（包含身份证信息）
        let sessions = [
            { id: 1, residentId: 1, name: '王建国', idCard: '330326195601011234', lastMessage: '医生，我的血压最近有点高', lastTime: '10:30', unread: 2 },
            { id: 2, residentId: 2, name: '李秀英', idCard: '330326195201025678', lastMessage: '好的，谢谢医生', lastTime: '昨天', unread: 0 },
            { id: 3, residentId: 3, name: '张大山', idCard: '330326195801019012', lastMessage: '明天我去医院复查', lastTime: '周一', unread: 1 }
        ];

        // 系统消息分类及数据
        const systemCategories = [
            {
                id: 'alert',
                name: '任务提醒',
                icon: 'exclamation-triangle',
                colorClass: 'alert',
                messages: [
                    { id: 1, title: '随访任务提醒', content: '您有3位患者本周需要完成随访，请及时处理', time: '10:00', read: false, detail: '以下患者本周需要完成随访：\n\n1. 王建国 - 高血压随访（逾期1天）\n2. 李秀英 - 糖尿病随访（截止周五）\n3. 张大山 - 高血压随访（截止周日）\n\n请尽快安排随访，确保患者健康管理连续性。' },
                    { id: 2, title: '体检结果待确认', content: '2位患者的体检结果已出，请及时确认', time: '昨天', read: false, detail: '以下患者的体检结果已出，请及时确认并反馈：\n\n1. 刘志强 - 年度体检（血压偏高、血脂异常）\n2. 陈美丽 - 季度检查（血糖控制良好）\n\n请登录系统查看详细报告。' },
                    { id: 3, title: '待管患者提醒', content: '新增5位待管患者，请尽快完成纳管', time: '周一', read: true, detail: '本周新增5位待管患者：\n\n1. 周小明 - 高血压\n2. 吴芳芳 - 糖尿病\n3. 孙大伟 - 高血压合并糖尿病\n4. 马丽华 - 糖尿病\n5. 赵国强 - 高血压\n\n请尽快完成患者评估和纳管工作。' }
                ]
            },
            {
                id: 'notice',
                name: '系统公告',
                icon: 'bell',
                colorClass: 'notice',
                messages: [
                    { id: 4, title: '系统维护通知', content: '2026年5月18日凌晨2:00-4:00进行系统升级', time: '昨天', read: false, detail: '尊敬的用户：\n\n为提升系统稳定性和使用体验，我们将于2026年5月18日（周一）凌晨2:00-4:00进行系统维护升级。\n\n维护期间系统将暂停服务，请您提前做好工作安排。给您带来的不便，敬请谅解。\n\n如有疑问，请联系技术支持。' },
                    { id: 5, title: '培训通知', content: '基层医生慢病管理培训将于5月20日举行，请准时参加', time: '周一', read: true, detail: '培训主题：基层医生慢性病管理能力提升培训\n\n时间：2026年5月20日（周三）14:00-17:00\n地点：西湖区社区卫生服务中心三楼会议室\n\n培训内容：\n1. 高血压规范化管理（14:00-15:00）\n2. 糖尿病规范化管理（15:10-16:10）\n3. 慢病患者健康教育技巧（16:20-17:00）\n\n主讲人：市疾控中心 慢病科主任\n\n请各位医生提前安排好工作，准时参加。' },
                    { id: 6, title: '节假日值班安排', content: '端午节值班安排已发布，请查看', time: '上周', read: true, detail: '2026年端午节值班安排：\n\n5月30日（周五）：张医生\n5月31日（周六）：李医生\n6月1日（周日）：王医生\n\n值班要求：\n1. 保持电话畅通\n2. 关注系统异常预警\n3. 及时处理紧急随访\n\n如需调班请提前报备。' }
                ]
            },
            {
                id: 'info',
                name: '健康预警',
                icon: 'info-circle',
                colorClass: 'info',
                messages: [
                    { id: 7, title: '患者异常预警', content: '患者陈美丽血压连续3天偏高，建议关注', time: '昨天', read: true, detail: '患者信息：陈美丽\n身份证：330326196601023456\n\n异常详情：\n该患者近3天血压监测数据如下：\n• 5月12日 08:00 - 158/98 mmHg\n• 5月13日 08:30 - 162/100 mmHg\n• 5月14日 07:45 - 155/95 mmHg\n\n连续3天收缩压≥150mmHg，舒张压≥95mmHg，超出正常范围。\n\n建议：\n1. 及时联系患者了解用药情况\n2. 评估是否需要调整用药方案\n3. 建议患者来院复查' },
                    { id: 8, title: '月度报表已生成', content: '您4月份的慢病管理月度报表已生成，请查看', time: '上周', read: true, detail: '2026年4月慢病管理月度报表\n\n管辖患者总数：352人\n\n高血压管理：\n• 在管人数：187人\n• 规范随访率：92.3%\n• 血压达标率：78.5%\n\n糖尿病管理：\n• 在管人数：165人\n• 规范随访率：89.7%\n• 血糖达标率：72.1%\n\n新增纳管：12人\n转出/死亡：3人\n\n详细数据请登录管理后台查看。' }
                ]
            }
        ];

        // 当前页签
        let currentTab = 'sessions';

        // 初始化
        document.addEventListener('DOMContentLoaded', function () {
            renderSessions();
            renderSystemMessages();
        });

        // 格式化身份证显示（前4位+...+后6位）
        function formatIdCard(idCard) {
            if (!idCard || idCard.length < 10) return '';
            return idCard.substring(0, 4) + '…' + idCard.substring(idCard.length - 4);
        }

        // 渲染会话列表
        function renderSessions() {
            const container = document.getElementById('sessionList');
            if (sessions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-comment-slash"></i>
                        </div>
                        <div class="empty-text">暂无会话</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = sessions.map(session => `
                <div class="session-item" onclick="goToChat(${session.residentId}, '${session.name}')">
                    <div class="session-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="session-info">
                        <div class="session-header">
                            <span class="session-name">${session.name} <span class="session-idcard">${formatIdCard(session.idCard)}</span></span>
                            <span class="session-time">${session.lastTime}</span>
                        </div>
                        <div class="session-bottom">
                            <span class="session-preview">${session.lastMessage}</span>
                            ${session.unread > 0 ? `<span class="unread-badge">${session.unread}</span>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 渲染系统消息分类列表
        function renderSystemMessages() {
            const container = document.getElementById('systemList');
            if (systemCategories.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-bell-slash"></i>
                        </div>
                        <div class="empty-text">暂无系统消息</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = systemCategories.map(cat => {
                const unreadCount = cat.messages.filter(m => !m.read).length;
                const latestMsg = cat.messages[0];
                return `
                    <div class="system-item" onclick="openCategory('${cat.id}')">
                        <div class="system-icon ${cat.colorClass}">
                            <i class="fas fa-${cat.icon}"></i>
                            ${unreadCount > 0 ? `<span class="system-unread-badge">${unreadCount}</span>` : ''}
                        </div>
                        <div class="system-info">
                            <div class="system-header">
                                <span class="system-title">${cat.name}</span>
                                <span class="system-time">${latestMsg.time}</span>
                            </div>
                            <div class="system-content">${latestMsg.content}</div>
                        </div>
                        <i class="fas fa-chevron-right system-arrow"></i>
                    </div>
                `;
            }).join('');
        }

        // 打开分类详情
        function openCategory(catId) {
            const cat = systemCategories.find(c => c.id === catId);
            if (!cat) return;

            const listContainer = document.getElementById('sysDetailList');

            listContainer.innerHTML = cat.messages.map(msg => `
                <div class="msg-card ${!msg.read ? 'unread' : ''}" onclick="viewSystemMessage('${cat.id}', ${msg.id})">
                    <div class="msg-card-header">
                        <span class="msg-card-title">${msg.title}</span>
                        ${!msg.read ? '<span class="msg-card-dot"></span>' : ''}
                    </div>
                    <div class="msg-card-body">${msg.content}</div>
                    <div class="msg-card-footer">
                        <i class="fas fa-clock"></i>
                        <span>${msg.time}</span>
                    </div>
                </div>
            `).join('');

            // 切换页面
            document.getElementById('systemPage').classList.remove('active');
            document.getElementById('systemDetailPage').classList.add('active');
        }

        // 返回系统消息分类列表
        function backToSystemList() {
            document.getElementById('systemDetailPage').classList.remove('active');
            document.getElementById('systemPage').classList.add('active');
        }

        // 切换页签
        function switchTab(tab) {
            currentTab = tab;
            // 更新页签状态
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

            // 切换页面显示
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active'));
            document.getElementById(tab === 'sessions' ? 'sessionsPage' : 'systemPage').classList.add('active');
        }

        // 搜索处理
        function handleSearch() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultsContainer = document.getElementById('searchResults');
            const sessionList = document.getElementById('sessionList');

            if (!keyword) {
                resultsContainer.style.display = 'none';
                sessionList.style.display = '';
                return;
            }

            const results = residents.filter(r =>
                r.name.includes(keyword) ||
                r.phone.includes(keyword) ||
                r.idCard.includes(keyword)
            );

            sessionList.style.display = 'none';
            resultsContainer.style.display = '';

            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-search"></i>
                        </div>
                        <div class="empty-text">未找到相关居民</div>
                    </div>
                `;
                return;
            }

            resultsContainer.innerHTML = results.map(r => `
                <div class="result-item" onclick="goToChat(${r.id}, '${r.name}')">
                    <div class="result-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="result-info">
                        <div class="result-name">${r.name}</div>
                        <div class="result-meta">身份证：${r.idCard} &nbsp;|&nbsp; 电话：${r.phone}</div>
                    </div>
                </div>
            `).join('');
        }

        // 查看系统消息详情
        function viewSystemMessage(catId, msgId) {
            const cat = systemCategories.find(c => c.id === catId);
            if (!cat) return;
            const msg = cat.messages.find(m => m.id === msgId);
            if (!msg) return;

            // 标记为已读
            msg.read = true;
            // 刷新分类详情列表
            openCategory(catId);
            // 刷新分类列表（更新未读数）
            renderSystemMessages();

            // 显示详情弹窗
            const overlay = document.createElement('div');
            overlay.className = 'sys-msg-overlay';
            overlay.innerHTML = `
                <div class="sys-msg-box">
                    <div class="sys-msg-header">
                        <div class="sys-msg-icon ${cat.colorClass}">
                            <i class="fas fa-${cat.icon}"></i>
                        </div>
                        <div class="sys-msg-titles">
                            <div class="sys-msg-name">${msg.title}</div>
                            <div class="sys-msg-time">${msg.time}</div>
                        </div>
                    </div>
                    <div class="sys-msg-body">${msg.detail.replace(/\n/g, '<br>')}</div>
                    <button class="sys-msg-close" onclick="this.closest('.sys-msg-overlay').remove()">我知道了</button>
                </div>
            `;
            overlay.addEventListener('click', function (e) {
                if (e.target === overlay) overlay.remove();
            });
            document.body.appendChild(overlay);
        }

        // 进入聊天页面
        function goToChat(residentId, name) {
            window.location.href = `patient-chat-session.html?residentId=${residentId}&name=${encodeURIComponent(name)}`;
        }

        // 底部导航跳转
        function goToPage(page) {
            if (page === 'home') {
                window.location.href = 'medical-staff-home.html';
            } else if (page === 'message') {
                // 当前页面
            } else if (page === 'profile') {
                window.location.href = 'medical-staff-profile.html';
            }
        }
    </script>
</body>

</html>
