<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消息中心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --arcoblue-6: #165DFF; --arcoblue-1: #E8F3FF;
            --text-1: #1D2129; --text-2: #4E5969; --text-3: #86909C; --text-4: #C9CDD4;
            --bg-1: #F2F3F5; --bg-2: #FFFFFF; --border: #E5E6EB;
            --radius-medium: 8px; --radius-large: 12px; --radius-xlarge: 20px;
            --font-size-caption: 12px; --font-size-body-1: 14px; --font-size-title-1: 16px; --font-size-title-2: 18px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: var(--bg-2); min-height: 100vh; padding-bottom: calc(86px + env(safe-area-inset-bottom, 0px)); }
        
        /* 导航栏 */
        .navbar { background: linear-gradient(135deg, var(--arcoblue-6) 0%, #4080FF 100%); padding: 44px 16px 0; position: sticky; top: 0; z-index: 100; }
        .navbar-content { display: flex; align-items: center; justify-content: space-between; padding-bottom: 16px; }
        .navbar-title { font-size: var(--font-size-title-2); font-weight: 600; color: white; }
        .search-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; cursor: pointer; }
        
        /* 页签 */
        .tabs { display: flex; background: var(--bg-2); border-bottom: 1px solid var(--border); }
        .tab-item { flex: 1; padding: 14px 0; text-align: center; font-size: var(--font-size-body-1); color: var(--text-2); cursor: pointer; position: relative; }
        .tab-item.active { color: var(--arcoblue-6); font-weight: 600; }
        .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background: var(--arcoblue-6); border-radius: 2px; }
        
        /* 页面容器 */
        .page-container { display: none; }
        .page-container.active { display: block; }
        
        /* 搜索页面 */
        .search-page { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-1); z-index: 200; transform: translateY(100%); transition: transform 0.3s; }
        .search-page.show { transform: translateY(0); }
        .search-header { background: var(--bg-2); padding: 44px 16px 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
        .search-input-wrapper { flex: 1; display: flex; align-items: center; gap: 8px; background: var(--bg-1); padding: 10px 14px; border-radius: var(--radius-xlarge); }
        .search-input-wrapper input { flex: 1; border: none; outline: none; background: transparent; font-size: var(--font-size-body-1); }
        .cancel-btn { font-size: var(--font-size-body-1); color: var(--arcoblue-6); cursor: pointer; }
        
        /* 搜索结果 */
        .search-results { padding: 12px 16px; }
        .result-item { background: var(--bg-2); padding: 16px; border-radius: var(--radius-large); margin-bottom: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .result-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--arcoblue-1); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--arcoblue-6); }
        .result-info { flex: 1; }
        .result-name { font-size: var(--font-size-title-1); font-weight: 600; margin-bottom: 4px; }
        .result-meta { font-size: var(--font-size-caption); color: var(--text-3); }
        
        /* 空状态 */
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; }
        .empty-icon { width: 80px; height: 80px; background: var(--bg-1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
        .empty-icon i { font-size: 36px; color: var(--text-4); }
        .empty-text { font-size: var(--font-size-body-1); color: var(--text-3); }
        
        /* 会话列表 - 简洁列表样式 */
        .session-list { background: var(--bg-2); }
        .session-item { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; background: var(--bg-2); }
        .session-item:last-child { border-bottom: none; }
        .session-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--arcoblue-1); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--arcoblue-6); flex-shrink: 0; margin-right: 12px; }
        .session-info { flex: 1; min-width: 0; }
        .session-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .session-name { font-size: var(--font-size-body-1); font-weight: 500; color: var(--text-1); }
        .session-idcard { font-size: var(--font-size-caption); color: var(--text-3); font-weight: normal; margin-left: 4px; }
        .session-time { font-size: var(--font-size-caption); color: var(--text-3); flex-shrink: 0; margin-left: 8px; }
        .session-bottom { display: flex; justify-content: space-between; align-items: center; }
        .session-preview { font-size: var(--font-size-caption); color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .unread-badge { min-width: 18px; height: 18px; background: var(--arcoblue-6); color: white; font-size: 10px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 5px; flex-shrink: 0; margin-left: 8px; }
        
        /* 系统消息列表 */
        .system-list { background: var(--bg-2); }
        .system-item { display: flex; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .system-item:last-child { border-bottom: none; }
        .system-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; margin-right: 12px; }
        .system-icon.notice { background: #FFF7E8; color: #FF7D00; }
        .system-icon.alert { background: #FFECE8; color: #F53F3F; }
        .system-icon.info { background: #E8FFFB; color: #00B42A; }
        .system-info { flex: 1; min-width: 0; }
        .system-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .system-title { font-size: var(--font-size-body-1); font-weight: 500; color: var(--text-1); }
        .system-time { font-size: var(--font-size-caption); color: var(--text-3); }
        .system-content { font-size: var(--font-size-caption); color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* 底部导航 */
        .tabbar { position: fixed; left: 50%; bottom: 0; transform: translateX(-50%); z-index: 100; width: 100%; min-height: calc(72px + env(safe-area-inset-bottom, 0px)); padding: 8px 14px calc(8px + env(safe-area-inset-bottom, 0px)); display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); background: rgba(255, 255, 255, 0.96); border-top: 1px solid rgba(118, 140, 165, 0.16); box-shadow: 0 -10px 28px rgba(55, 83, 116, 0.08); backdrop-filter: blur(14px); }
        .tabbar-item { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; border: 0; background: transparent; color: #8c8f94; font: 500 12px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; cursor: pointer; }
        .tabbar-item i { font-size: 22px; }
        .tabbar-item.active { color: var(--arcoblue-6); font-weight: 700; }
        .tabbar-badge { position: absolute; top: 1px; right: calc(50% - 26px); min-width: 20px; height: 20px; border-radius: 999px; background: #ff3749; color: #fff; border: 2px solid #fff; font-size: 12px; display: flex; align-items: center; justify-content: center; padding: 0 5px; font-weight: 800; }
        
        /* Toast 提示 */
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }

<body>
    <!-- Toast 容器 -->
    <div class="toast" id="toast"></div>
    <!-- 导航栏 -->
    <div class="navbar">
        <div class="navbar-content">
            <div class="navbar-title">消息中心</div>
            <div class="search-btn" id="searchBtn" onclick="openSearch()">
                <i class="fas fa-search"></i>
            </div>
        </div>
    </div>

    <!-- 页签 -->
    <div class="tabs">
        <div class="tab-item active" data-tab="sessions" onclick="switchTab('sessions')">会话列表</div>
        <div class="tab-item" data-tab="system" onclick="switchTab('system')">系统消息</div>
    </div>

    <!-- 会话列表页 -->
    <div class="page-container active" id="sessionsPage">
        <div class="session-list" id="sessionList"></div>
    </div>

    <!-- 系统消息页 -->
    <div class="page-container" id="systemPage">
        <div class="system-list" id="systemList"></div>
    </div>

    <!-- 搜索页面 -->
    <div class="search-page" id="searchPage">
        <div class="search-header">
            <div class="search-input-wrapper">
                <i class="fas fa-search" style="color: var(--text-3);"></i>
                <input type="text" id="searchInput" placeholder="姓名、电话、身份证" oninput="handleSearch()">
            </div>
            <div class="cancel-btn" onclick="closeSearch()">取消</div>
        </div>
        <div class="search-results" id="searchResults"></div>
    </div>

    <!-- 底部导航 -->
    <nav class="tabbar">
        <button class="tabbar-item" type="button" onclick="goToPage('home')">
            <i class="fas fa-house"></i>
            <span>首页</span>
        </button>
        <button class="tabbar-item active" type="button" onclick="goToPage('message')">
            <i class="fas fa-comment-dots"></i>
            <span>消息</span>
            <span class="tabbar-badge">12</span>
        </button>
        <button class="tabbar-item" type="button" onclick="goToPage('profile')">
            <i class="fas fa-user"></i>
            <span>我的</span>
        </button>
    </nav>

    <script>
        // Toast 提示函数
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        // 居民数据
        const residents = [
            { id: 1, name: '王建国', idCard: '330326195601011234', phone: '138****1234' },
            { id: 2, name: '李秀英', idCard: '330326195201025678', phone: '139****5678' },
            { id: 3, name: '张大山', idCard: '330326195801019012', phone: '137****9012' },
            { id: 4, name: '陈美丽', idCard: '330326196601023456', phone: '136****3456' },
            { id: 5, name: '刘志强', idCard: '330326195401017890', phone: '135****7890' }
        ];

        // 会话数据（包含身份证信息）
        let sessions = [
            { id: 1, residentId: 1, name: '王建国', idCard: '330326195601011234', lastMessage: '医生，我的血压最近有点高', lastTime: '10:30', unread: 2 },
            { id: 2, residentId: 2, name: '李秀英', idCard: '330326195201025678', lastMessage: '好的，谢谢医生', lastTime: '昨天', unread: 0 },
            { id: 3, residentId: 3, name: '张大山', idCard: '330326195801019012', lastMessage: '明天我去医院复查', lastTime: '周一', unread: 1 }
        ];

        // 系统消息数据（暂未开发，置空）
        const systemMessages = [];

        // 当前页签
        let currentTab = 'sessions';

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderSessions();
            renderSystemMessages();
        });

        // 格式化身份证显示（前4位+...+后6位）
        function formatIdCard(idCard) {
            if (!idCard || idCard.length < 10) return '';
            return idCard.substring(0, 4) + '…' + idCard.substring(idCard.length - 4);
        }

        // 渲染会话列表
        function renderSessions() {
            const container = document.getElementById('sessionList');
            if (sessions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-comment-slash"></i>
                        </div>
                        <div class="empty-text">暂无会话</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = sessions.map(session => `
                <div class="session-item" onclick="goToChat(${session.residentId}, '${session.name}')">
                    <div class="session-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="session-info">
                        <div class="session-header">
                            <span class="session-name">${session.name} <span class="session-idcard">${formatIdCard(session.idCard)}</span></span>
                            <span class="session-time">${session.lastTime}</span>
                        </div>
                        <div class="session-bottom">
                            <span class="session-preview">${session.lastMessage}</span>
                            ${session.unread > 0 ? `<span class="unread-badge">${session.unread}</span>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 渲染系统消息列表
        function renderSystemMessages() {
            const container = document.getElementById('systemList');
            if (systemMessages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-bell-slash"></i>
                        </div>
                        <div class="empty-text">暂无系统消息</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = systemMessages.map(msg => `
                <div class="system-item" onclick="viewSystemMessage(${msg.id})">
                    <div class="system-icon ${msg.type}">
                        <i class="fas fa-${msg.type === 'notice' ? 'bell' : msg.type === 'alert' ? 'exclamation-triangle' : 'info-circle'}"></i>
                    </div>
                    <div class="system-info">
                        <div class="system-header">
                            <span class="system-title">${msg.title}</span>
                            <span class="system-time">${msg.time}</span>
                        </div>
                        <div class="system-content">${msg.content}</div>
                    </div>
                </div>
            `).join('');
        }

        // 切换页签
        function switchTab(tab) {
            currentTab = tab;
            // 更新页签状态
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            
            // 切换页面显示
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active'));
            document.getElementById(tab === 'sessions' ? 'sessionsPage' : 'systemPage').classList.add('active');
            
            // 控制搜索按钮显示
            document.getElementById('searchBtn').style.display = tab === 'sessions' ? 'flex' : 'none';
        }

        // 打开搜索页面
        function openSearch() {
            document.getElementById('searchPage').classList.add('show');
            document.getElementById('searchInput').focus();
        }

        // 关闭搜索页面
        function closeSearch() {
            document.getElementById('searchPage').classList.remove('show');
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').innerHTML = '';
        }

        // 搜索处理
        function handleSearch() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultsContainer = document.getElementById('searchResults');
            
            if (!keyword) {
                resultsContainer.innerHTML = '';
                return;
            }

            const results = residents.filter(r => 
                r.name.includes(keyword) || 
                r.phone.includes(keyword) || 
                r.idCard.includes(keyword)
            );

            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-search"></i>
                        </div>
                        <div class="empty-text">未找到相关居民</div>
                    </div>
                `;
                return;
            }

            resultsContainer.innerHTML = results.map(r => `
                <div class="result-item" onclick="goToChat(${r.id}, '${r.name}')">
                    <div class="result-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="result-info">
                        <div class="result-name">${r.name}</div>
                        <div class="result-meta">身份证：${r.idCard} &nbsp;|&nbsp; 电话：${r.phone}</div>
                    </div>
                </div>
            `).join('');
        }

        // 查看系统消息
        function viewSystemMessage(id) {
            showToast('敬请期待');
        }

        // 进入聊天页面
        function goToChat(residentId, name) {
            window.location.href = `patient-chat-session.html?residentId=${residentId}&name=${encodeURIComponent(name)}`;
        }

        // 底部导航跳转
        function goToPage(page) {
            if (page === 'home') {
                window.location.href = 'medical-staff-home.html';
            } else if (page === 'message') {
                // 当前页面
            } else if (page === 'profile') {
                window.location.href = 'medical-staff-profile.html';
            }
        }
    </script>
</body>
</html>
