<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人资料</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2F6BFF;
            --success: #07C160;
            --page-bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --border: #E5E6EB;
            --divider: #ECEEF2;
            --text-main: #1D2129;
            --text-sub: #4E5969;
            --text-light: #86909C;
            --shadow-card: 0 2px 10px rgba(0, 0, 0, 0.04);
        }

        html {
            min-width: 320px;
            background: var(--page-bg);
        }

        body {
            min-height: 100vh;
            background: var(--page-bg);
            color: var(--text-main);
            font-family: system-ui, "PingFang SC", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        button {
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        .page {
            width: 100%;
            min-width: 320px;
            max-width: 768px;
            min-height: 100vh;
            margin: 0 auto;
            background: var(--page-bg);
        }

        .content {
            width: 100%;
            padding: 16px 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section {
            width: 100%;
        }

        .section-title {
            padding: 0 4px 8px;
            color: var(--text-light);
            font-size: 13px;
            line-height: 1.4;
            font-weight: 400;
        }

        .info-list,
        .app-card {
            width: 100%;
            overflow: hidden;
            border-radius: 16px;
            background: var(--card-bg);
            box-shadow: var(--shadow-card);
        }

        .field-host {
            width: 100%;
        }

        .info-list .field-host + .field-host .mobile-input-field {
            border-top: 1px solid var(--divider);
        }

        .info-list .mobile-input-field,
        .app-card .mobile-input-field {
            min-height: 56px;
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 0;
            background: #FFFFFF;
            color: inherit;
            font-family: system-ui, "PingFang SC", sans-serif;
        }

        .info-list .mobile-input-field__label,
        .app-card .mobile-input-field__label {
            width: 96px;
            flex-shrink: 0;
            color: var(--text-main);
            font-size: 14px;
            line-height: 1.45;
            font-weight: 400;
            padding-top: 0;
        }

        .info-list .mobile-input-field__content,
        .app-card .mobile-input-field__content {
            min-width: 0;
            flex: 1;
            text-align: right;
        }

        .mobile-input-display {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            border: 0;
            background: transparent;
            color: var(--text-sub);
            font-size: 14px;
            line-height: 1.45;
            text-align: right;
            font: inherit;
        }

        .mobile-input-display.is-action {
            cursor: pointer;
        }

        .mobile-input-display.is-action .mobile-input-display__value {
            color: var(--primary);
        }

        .mobile-input-display__icon {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #EAF1FF;
            color: var(--primary);
            font-size: 22px;
        }

        .mobile-input-display__value {
            min-width: 0;
            color: var(--text-sub);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mobile-input-display__value.is-placeholder {
            color: var(--text-light);
        }

        .mobile-input-display__arrow {
            flex-shrink: 0;
            color: var(--text-light);
            font-size: 14px;
        }

        .app-card .mobile-input-display__icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(7, 193, 96, 0.12);
            color: var(--success);
            font-size: 20px;
        }

        .mobile-input-display__value.binded {
            color: var(--success);
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            z-index: 1000;
            max-width: calc(100% - 64px);
            padding: 10px 18px;
            border-radius: 8px;
            transform: translate(-50%, -50%);
            background: rgba(29, 33, 41, 0.88);
            color: #FFFFFF;
            font-size: 14px;
            line-height: 1.4;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
    <script src="../components/mobile/mobile-title-bar.js" defer></script>
    <script src="../components/mobile/mobile-search.js"></script>
    <script src="../components/mobile/input/index.js"></script>
</head>

<body>
    <div class="page">
        <div class="toast" id="toast"></div>

        <mobile-title-bar title="个人资料"></mobile-title-bar>
    <script>
        customElements.whenDefined('mobile-title-bar').then(function bindMobileTitleBar() {
            const titleBar = document.querySelector('mobile-title-bar');
            if (!titleBar) return;
            titleBar.onBack = goBack;
        });
    </script>

        <main class="content">
            <section class="section">
                <div class="section-title">用户信息</div>
                <div class="info-list">
                    <div class="field-host" id="avatarField"></div>
                    <div class="field-host" id="nicknameField"></div>
                    <div class="field-host" id="phoneField"></div>
                </div>
            </section>

            <section class="section">
                <div class="section-title">账号绑定</div>
                <div class="app-card">
                    <div class="field-host" id="wechatField"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        function goBack() {
            window.history.back();
        }

        function goToBindPhone() {
            window.location.href = 'medical-staff-phone-binding.html';
        }

        let phoneDisplayField = null;
        let wechatDisplayField = null;

        function renderProfileFields() {
            if (!window.MobileInputComponents || !window.DisplayField) return;

            window.DisplayField.render(document.getElementById('avatarField'), {
                label: '头像',
                iconClass: 'fas fa-user-md'
            });
            window.DisplayField.render(document.getElementById('nicknameField'), {
                label: '昵称',
                value: '张医生'
            });
            phoneDisplayField = window.DisplayField.render(document.getElementById('phoneField'), {
                label: '手机号码',
                placeholder: '未绑定',
                action: goToBindPhone,
                arrow: true
            });
            wechatDisplayField = window.DisplayField.render(document.getElementById('wechatField'), {
                label: '企业微信',
                placeholder: '未绑定',
                action: handleWechatWork,
                arrow: true
            });

            const phone = localStorage.getItem('userPhone');
            if (phone) {
                phoneDisplayField.setValue(phone);
            }
        }

        function handleWechatWork() {
            if (!wechatDisplayField.value) {
                showToast('绑定成功');
                wechatDisplayField.setValue('张三');
                wechatDisplayField.valueElement.classList.add('binded');
            } else {
                showToast('已绑定：' + wechatDisplayField.value);
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            window.MobileInputComponents.ready.then(renderProfileFields);
        });
    </script>
</body>
</html>
