<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>异常详情</title>
    <script src="../assets/vendor/tailwind-browser@4.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@arco-design/mobile-react/dist/arco.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --arcoblue-6: #165DFF;
            --arcoblue-1: #E8F3FF;
            --green-6: #00B42A;
            --green-1: #E8FFEA;
            --orange-6: #FF7D00;
            --orange-1: #FFF7E8;
            --red-6: #F53F3F;
            --red-1: #FFECE8;
            --pink-6: #F5319D;
            --pink-1: #FFE8F1;
            --purple-6: #722ED1;
            --purple-1: #F9F0FF;
            --text-1: #1D2129;
            --text-2: #4E5969;
            --text-3: #86909C;
            --text-4: #C9CDD4;
            --bg-1: #F2F3F5;
            --bg-2: #FFFFFF;
            --border: #E5E6EB;
            --radius-small: 4px;
            --radius-medium: 8px;
            --radius-large: 12px;
            --font-size-caption: 12px;
            --font-size-body-1: 14px;
            --font-size-title-1: 16px;
            --font-size-title-2: 18px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-1);
            color: var(--text-1);
            min-height: 100vh;
            padding-bottom: 20px;
        }

        .navbar {
            background: linear-gradient(135deg, var(--arcoblue-6) 0%, #4080FF 100%);
            padding: 8px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: var(--radius-medium);
        }

        .navbar-title {
            flex: 1;
            font-size: var(--font-size-title-2);
            font-weight: 600;
            color: white;
        }

        .section-title {
            font-size: var(--font-size-body-1);
            font-weight: 600;
            color: var(--text-2);
            margin: 20px 16px 12px;
            padding-left: 12px;
            border-left: 3px solid var(--red-6);
        }

        .info-row {
            display: flex;
            gap: 8px;
            font-size: var(--font-size-body-1);
        }

        .info-label {
            color: var(--text-3);
            min-width: 80px;
        }

        .info-value {
            color: var(--text-1);
        }

        /* 首页风格统一覆盖 */
        body {
            color: #333333;
            background: #f8fafc !important;
            -webkit-font-smoothing: antialiased;
        }

        .navbar {
            position: sticky;
            top: 0;
            overflow: hidden;
            background: rgba(217, 235, 255, 0.82) !important;
            border-bottom: 1px solid rgba(118, 140, 165, 0.12);
            box-shadow: 0 10px 26px rgba(60, 101, 145, 0.08);
            backdrop-filter: blur(14px);
        }

        .navbar::before {
            content: "";
            position: absolute;
            top: -58px;
            right: -34px;
            width: 170px;
            height: 150px;
            border-radius: 34px;
            background: linear-gradient(135deg, rgba(67, 142, 255, 0.2), rgba(255, 255, 255, 0.06));
            transform: rotate(-12deg);
            pointer-events: none;
        }

        .navbar-content,
        .navbar-title,
        .back-btn,
        .search-btn,
        .navbar-count {
            position: relative;
            z-index: 1;
        }

        .navbar-title,
        .back-btn,
        .search-btn,
        .navbar-count {
            color: #0f1f33 !important;
        }

        .navbar-title {
            font-weight: 800 !important;
        }

        .tabs,
        .search-section,
        .stats-bar,
        .page-container,
        .session-list,
        .system-list {
            background: transparent !important;
        }

        .tab-item.active {
            color: #2f7af6 !important;
        }

        .tab-item.active::after {
            background: #2f7af6 !important;
        }

        .patient-card,
        .user-card,
        .org-card,
        .menu-list,
        .info-card,
        .detail-card,
        .record-card,
        .task-card,
        .form-card,
        .card,
        .section-card,
        .profile-card,
        .health-card,
        .content-card,
        .result-item,
        .empty-icon {
            background: rgba(255, 255, 255, 0.92) !important;
            border: 1px solid rgba(123, 147, 176, 0.14) !important;
            border-radius: 16px !important;
            box-shadow: 0 12px 32px rgba(60, 101, 145, 0.12) !important;
            backdrop-filter: blur(12px);
        }

        .session-item,
        .system-item,
        .menu-item,
        .list-item,
        .record-item,
        .info-row {
            border-color: rgba(119, 140, 166, 0.18) !important;
        }
        input,
        select,
        textarea {
            border-color: rgba(122, 150, 184, 0.13) !important;
            box-shadow: inset 0 0 0 1px rgba(122, 150, 184, 0.08);
        }

        .submit-btn,
        .filter-btn.confirm,
        .login-btn,
        .code-btn:not(:disabled) {
            background: linear-gradient(145deg, #4b9bff, #2f7af6) !important;
            color: #fff !important;
            border: 0 !important;
            box-shadow: 0 8px 16px rgba(45, 101, 170, 0.13);
        }

        .filter-btn.reset,
        .popup-option,
        .phone-btn,
        .call-btn {
            border-color: rgba(123, 147, 176, 0.14) !important;
        }

        .arco-toast {
            background: rgba(12, 20, 34, 0.82) !important;
            border-radius: 8px !important;
        }

        /* 首页风格补充覆盖 */
        .info-section,
        .info-list,
        .app-section,
        .form-section,
        .filter-section,
        .disease-card,
        .indicator-item,
        .quick-action-item {
            background: rgba(255, 255, 255, 0.92) !important;
            border: 1px solid rgba(123, 147, 176, 0.14) !important;
            border-radius: 16px !important;
            box-shadow: 0 12px 32px rgba(60, 101, 145, 0.12) !important;
            backdrop-filter: blur(12px);
        }

        .patient-list,
        .task-list,
        .record-list,
        .search-results {
            position: relative;
            z-index: 1;
        }

        .submit-btn,
        .code-btn,
        .filter-btn,
        .phone-btn,
        .call-btn {
            border-radius: 10px !important;
            font-weight: 700;
        }

        .navbar+.tabs,
        .tabs {
            border-bottom-color: rgba(118, 140, 165, 0.16) !important;
            backdrop-filter: blur(10px);
        }


        /* 全局顶部与查询框统一 */
        .navbar {
            position: sticky !important;
            top: 0 !important;
            min-height: 52px;
            padding: 8px 16px !important;
            z-index: 100 !important;
        }

        .navbar-content {
            position: relative !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            min-height: 36px;
            padding-bottom: 0 !important;
        }

        .navbar-content .back-btn {
            position: absolute !important;
            left: 0 !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            margin: 0 !important;
            z-index: 2 !important;
        }

        .navbar>.back-btn {
            position: absolute !important;
            left: 16px !important;
            bottom: 12px !important;
            margin: 0 !important;
            z-index: 2 !important;
        }

        .navbar-title,
        .navbar-content .navbar-title,
        .navbar>.navbar-title {
            position: absolute !important;
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%) !important;
            width: calc(100% - 128px) !important;
            margin: 0 !important;
            padding: 0 !important;
            text-align: center !important;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            z-index: 1 !important;
        }

        .navbar>.navbar-title {
            top: auto !important;
            bottom: 19px !important;
            transform: translateX(-50%) !important;
        }

        .search-btn,
        .navbar-count {
            position: absolute !important;
            right: 0 !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            margin: 0 !important;
            z-index: 2 !important;
        }

        .navbar>.search-btn,
        .navbar>.navbar-count {
            right: 16px !important;
            top: auto !important;
            bottom: 12px !important;
            transform: none !important;
        }

        .search-section,
        .filter-section,
        .search-header {
            background: transparent !important;
        }

        /* 异常详情列表样式：对齐附件中的分组展开卡片形态 */
        body {
            background: #f8fafc !important;
            color: #333333;
        }

        .section-title {
            margin: 20px 16px 12px;
            padding-left: 12px;
            border-left: 3px solid var(--arcoblue-6);
            color: var(--text-2);
            font-size: 14px;
            font-weight: 600;
            line-height: 20px;
        }

        #anomalyGroups {
            background: transparent;
        }

        .anomaly-group {
            margin: 0 16px 12px;
        }

        .anomaly-group:last-child {
            margin-bottom: 0;
        }

        .anomaly-type-card.grouped-info-card {
            overflow: hidden;
        }

        .anomaly-type-card > .grouped-info-card__header {
            min-height: 52px;
            padding: 13px 20px 11px;
        }

        .anomaly-type-card > .grouped-info-card__header .grouped-info-card__title {
            color: #333333;
            font-size: 16px;
            font-weight: 600;
            line-height: 22px;
        }

        .anomaly-type-card > .grouped-info-card__header .grouped-info-card__subtitle {
            color: var(--text-3);
            font-size: 14px;
            font-weight: 500;
        }

        .anomaly-type-card > .grouped-info-card__header .grouped-info-card__collapse-toggle {
            color: var(--text-3);
            font-size: 14px;
        }

        .anomaly-type-card > .grouped-info-card__body {
            display: block;
            margin-bottom: 16px;
        }

        .anomaly-type-card.grouped-info-card.is-collapsed > .grouped-info-card__body {
            display: none;
            margin-bottom: 0;
        }

        .anomaly-card-list {
            margin: 0 20px;
            padding: 0;
        }

        .anomaly-detail-item {
            padding: 13px 2px 14px;
        }

        .anomaly-detail-item + .anomaly-detail-item {
            border-top: 1px solid #eef1f5;
        }

        .anomaly-detail-header {
            display: flex;
            min-height: 24px;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 4px;
        }

        .anomaly-detail-title {
            min-width: 0;
            color: #333333;
            font-size: 15px;
            font-weight: 500;
            line-height: 21px;
            overflow-wrap: anywhere;
        }

        .info-row {
            display: grid;
            grid-template-columns: 88px minmax(0, 1fr);
            gap: 8px;
            border: 0 !important;
            font-size: 14px;
            line-height: 28px;
        }

        .info-label {
            min-width: 0;
            color: var(--text-2);
        }

        .info-value {
            color: #333333;
            font-weight: 500;
            word-break: break-word;
        }

        .anomaly-card-list status-tag {
            flex: 0 0 auto;
        }
    </style>
    <script src="../components/mobile/mobile-title-bar.js" defer></script>
    <script src="../components/mobile/mobile-search.js"></script>
    <script src="../components/shared/status-tag.js"></script>
    <script src="../components/mobile/grouped-info-card.js"></script>
</head>

<body>
    <mobile-title-bar title="异常详情" back-action="goBack()"></mobile-title-bar>

    <div class="section-title" id="anomalySectionTitle">异常信息</div>
    <div id="anomalyGroups"></div>

    <script>
        const mockPatients = [
            {
                id: 1, name: '王建国', gender: 'male', age: 68, phone: '13811111234',
                idCard: '310111111111111234', grid: '第一网格', address: '幸福社区1号楼201室',
                anomalies: [
                    // 体征异常 - 3条
                    { type: 'vital', category: '血压异常', indicator: '收缩压', value: '158mmHg', date: '2024-01-15', referral: true },
                    { type: 'vital', category: '血压异常', indicator: '舒张压', value: '102mmHg', date: '2024-01-15', referral: false },
                    { type: 'vital', category: '血糖异常', indicator: '空腹血糖', value: '9.8mmol/L', date: '2024-01-12', referral: true },
                    { type: 'vital', category: '血糖异常', indicator: '糖化血红蛋白', value: '8.5%', date: '2024-01-10', referral: false },
                    // 评估异常 - 2条
                    { type: 'assess', category: ' 其他评估异常 ', assessType: 'ASCVD评估', assessDate: '2024-01-10', result: '高危人群', referral: true },
                    { type: 'assess', category: '慢病分级加重 ', assessType: '高血压分级评估 ', assessDate: '2024-01-08', result: '三级管理 ', referral: false },
                    // 危险因素异常 - 2条
                    { type: 'risk', category: '危险因素新增', riskFactor: '低高密度脂蛋白', disease: '高血压', date: '2024-01-12', referral: false },
                    { type: 'risk', category: '危险因素新增', riskFactor: 'BMI≥28或者腰围≥90cm', disease: '糖尿病', date: '2024-01-12', referral: false },
                    // 未及时复诊 - 1条
                    { type: 'visit', category: '未及时复诊', expectedDate: '2024-01-15', lastDate: '2023-12-15', referral: false }
                ]
            },
            {
                id: 2, name: '李秀英', gender: 'female', age: 72, phone: '13911115678',
                idCard: '310111111111115678', grid: '第二网格', address: '幸福社区2号楼305室',
                anomalies: [
                    // 体征异常 - 2条
                    { type: 'vital', category: '血压异常', indicator: '收缩压', value: '162mmHg', date: '2024-01-14', referral: true },
                    { type: 'vital', category: '血糖异常', indicator: '餐后2h血糖', value: '14.2mmol/L', date: '2024-01-13', referral: true },
                    // 合/并发症异常 - 2条
                    { type: 'complication', category: '合/并发症新增 ', occurDate: '2024-01-08', disease: '糖尿病', complication: '糖尿病肾病III期', referral: true },
                    { type: 'complication', category: '合/并发症新增', occurDate: '2024-01-05', disease: '糖尿病', complication: '视网膜病变II期', referral: false },
                    // 未及时复诊 - 1条
                    { type: 'visit', expectedDate: '2024-01-10', lastDate: '2023-12-01', referral: false },
                    // 其他异常 - 1条
                    { type: 'other', category: '用药依从性差', occurDate: '2024-01-06', result: '依从性评分55分', referral: false }
                ]
            },
            {
                id: 3, name: '张大山', gender: 'male', age: 65, phone: '13711119012',
                idCard: '310111111111119012', grid: '第一网格', address: '大洋街道1001',
                anomalies: [
                    // 体征异常 - 1条
                    { type: 'vital', category: '血脂异常', indicator: '总胆固醇', value: '6.8mmol/L', date: '2024-01-12', referral: false },
                    // 危险因素异常 - 1条
                    { type: 'risk', category: '危险因素新增', riskFactor: '吸烟或被动吸烟', disease: '冠心病', date: '2024-01-10', referral: false },
                    // 其他异常 - 1条
                    { type: 'other', category: '特殊疾病诊断 ', occurDate: '2024-01-10', result: '糖尿病肾病', referral: false }
                ]
            }
        ];

        const anomalyTypeConfig = {
            'vital': { name: '体征异常' },
            'assess': { name: '评估异常' },
            'risk': { name: '危险因素异常' },
            'complication': { name: '合/并发症异常' },
            'visit': { name: '未及时复诊' },
            'other': { name: '其他异常' }
        };

        let currentPatient = null;

        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function init() {
            const patientId = getUrlParam('id') || 1;
            currentPatient = mockPatients.find(p => p.id == patientId) || mockPatients[0];
            document.getElementById('anomalySectionTitle').textContent = currentPatient.name + '的异常信息';
            renderAnomalyGroups();
        }

        function renderAnomalyGroups() {
            const container = document.getElementById('anomalyGroups');
            container.innerHTML = '';
            const grouped = {};
            Object.keys(anomalyTypeConfig).forEach(type => { grouped[type] = []; });
            currentPatient.anomalies.forEach(anomaly => {
                if (grouped[anomaly.type]) { grouped[anomaly.type].push(anomaly); }
            });
            Object.keys(anomalyTypeConfig).forEach(type => {
                const anomalies = grouped[type];
                if (anomalies.length === 0) return;
                const config = anomalyTypeConfig[type];
                const groupEl = document.createElement('div');
                groupEl.className = 'anomaly-group';
                container.appendChild(groupEl);

                // 异常类型分组复用通用分组信息卡片，标题、数量和展开状态由组件统一承载。
                const groupCard = GroupedInfoCard.render(groupEl, {
                    title: config.name,
                    titleIcon: 'assets/icons/exclamation-circle.svg',
                    showDivider: true,
                    subtitle: anomalies.length + '条',
                    collapsible: true,
                    collapsed: false
                });
                groupCard.classList.add('anomaly-type-card');

                const cardList = document.createElement('div');
                cardList.className = 'anomaly-card-list';
                anomalies.forEach(anomaly => {
                    cardList.appendChild(createAnomalyDetailItem(anomaly));
                });
                groupCard.appendChild(cardList);
            });
        }

        function createAnomalyDetailItem(anomaly) {
            let infoRows = '';
            switch (anomaly.type) {
                case 'vital':
                    infoRows = '<div class="info-row"><span class="info-label">指标</span><span class="info-value">' + anomaly.indicator + '</span></div><div class="info-row"><span class="info-label">数值</span><span class="info-value">' + anomaly.value + '</span></div><div class="info-row"><span class="info-label">记录日期</span><span class="info-value">' + anomaly.date + '</span></div>';
                    break;
                case 'assess':
                    infoRows = '<div class="info-row"><span class="info-label">评估日期</span><span class="info-value">' + anomaly.assessDate + '</span></div><div class="info-row"><span class="info-label">评估项目 </span><span class="info-value" font-weight: 600;">' + anomaly.assessType + '</div><div class="info-row"><span class="info-label">评估结果</span><span class="info-value" style="color: var(--red-6); font-weight: 600;">' + anomaly.result + '</span></div>';
                    break;
                case 'risk':
                    infoRows = '<div class="info-row"><span class="info-label">危险因素</span><span class="info-value">' + anomaly.riskFactor + '</span></div><div class="info-row"><span class="info-label"> 针对疾病 </span><span class="info-value">' + anomaly.disease + '</span></div><div class="info-row"><span class="info-label">记录日期</span><span class="info-value">' + anomaly.date + '</span></div>';
                    break;
                case 'complication':
                    infoRows = '<div class="info-row"><span class="info-label">针对病种</span><span class="info-value">' + anomaly.disease + '</span></div><div class="info-row"><span class="info-label">合/并发症</span><span class="info-value">' + anomaly.complication + '</span></div><div class="info-row"><span class="info-label">发生日期</span><span class="info-value">' + anomaly.occurDate + '</span></div>';
                    break;
                case 'visit':
                    infoRows = '<div class="info-row"><span class="info-label">应复诊日期</span><span class="info-value">' + anomaly.expectedDate + '</span></div><div class="info-row"><span class="info-label">上次就诊</span><span class="info-value">' + anomaly.lastDate + '</span></div>';
                    break;
                case 'other':
                    infoRows = '<div class="info-row"><span class="info-label">异常结果</span><span class="info-value">' + anomaly.result + '</span></div><div class="info-row"><span class="info-label">发生日期</span><span class="info-value">' + anomaly.occurDate + '</span></div>';
                    break;
            }

            const item = document.createElement('div');
            item.className = 'anomaly-detail-item';

            const header = document.createElement('div');
            header.className = 'anomaly-detail-header';

            const title = document.createElement('div');
            title.className = 'anomaly-detail-title';
            title.textContent = anomaly.category || anomalyTypeConfig[anomaly.type]?.name || '异常信息';
            header.appendChild(title);

            if (anomaly.referral) {
                const status = document.createElement('status-tag');
                status.setAttribute('color', 'red');
                status.setAttribute('size', 'medium');
                status.setAttribute('label', '建议转诊');
                status.textContent = '建议转诊';
                header.appendChild(status);
            }

            const body = document.createElement('div');
            body.innerHTML = infoRows;
            item.appendChild(header);
            item.appendChild(body);
            return item;
        }

        function goBack() { history.back(); }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
