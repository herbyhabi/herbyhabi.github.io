    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --arcoblue-6: #165DFF;
            --arcoblue-1: #E8F3FF;
            --green-6: #00B42A;
            --green-1: #E8FFEA;
            --orange-6: #FF7D00;
            --orange-1: #FFF7E8;
            --red-6: #F53F3F;
            --red-1: #FFECE8;
            --pink-6: #F5319D;
            --pink-1: #FFE8F1;
            --purple-6: #722ED1;
            --purple-1: #F9F0FF;
            --text-1: #1D2129;
            --text-2: #4E5969;
            --text-3: #86909C;
            --text-4: #C9CDD4;
            --bg-1: #F8FAFC;
            --bg-2: #FFFFFF;
            --border: #E5E6EB;
            --radius-small: 4px;
            --radius-medium: 8px;
            --radius-large: 12px;
            --radius-xlarge: 20px;
            --font-size-caption: 12px;
            --font-size-body-1: 14px;
            --font-size-title-1: 16px;
            --font-size-title-2: 18px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-1);
            color: var(--text-1);
            min-height: 100vh;
            padding-bottom: 70px;
        }

        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, var(--arcoblue-6) 0%, #4080FF 100%);
            padding: 8px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: var(--radius-medium);
        }

        .navbar-title {
            flex: 1;
            font-size: var(--font-size-title-2);
            font-weight: 600;
            color: white;
        }

        /* 查询筛选区域：对齐随访任务列表的轻量搜索与条件入口 */
        .quick-filter-section {
            padding: 12px 16px 0;
        }

        .filter-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .filter-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-xlarge);
            font-size: var(--font-size-caption);
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tag.active {
            background: var(--arcoblue-1);
            border-color: var(--arcoblue-6);
            color: var(--arcoblue-6);
        }

        .filter-tag i {
            font-size: 10px;
        }

        /* 患者列表 */
        .patient-list {
            padding: 12px 16px;
            display: grid;
            gap: 12px;
        }

        .patient-count {
            font-size: var(--font-size-caption);
            color: var(--text-3);
            margin-bottom: 12px;
        }

        .patient-count span {
            color: var(--arcoblue-6);
            font-weight: 600;
        }

        .phone-btn {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0;
            background: var(--green-1);
            color: var(--green-6);
            border: none;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .patient-call-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 2;
            border-radius: 50% !important;
        }

        .phone-btn:active {
            background: var(--green-6);
            color: white;
        }

        .patient-list .grouped-info-card {
            position: relative;
        }

        .patient-list .grouped-info-card__title {
            padding-left: 18px;
        }

        .patient-card-body {
            padding: 12px 16px 4px;
        }

        .patient-card-items {
            display: grid;
            gap: 2px;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            font-size: var(--font-size-body-1);
        }

        .detail-label {
            flex: 0 0 auto;
            color: var(--text-3);
            min-width: 60px;
            line-height: 26px;
        }

        .detail-value {
            min-width: 0;
            flex: 1;
            color: var(--text-2);
            line-height: 26px;
            word-break: break-all;
        }

        /* 在管病种标签：复用“我的患者”的左侧病种圆标 + 右侧等级胶囊 */
        .manage-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            padding-top: 1px;
        }

        .manage-tag {
            display: inline-flex;
            align-items: center;
            min-width: 42px;
            height: 20px;
            border-radius: 999px;
            background: #f3f6ff;
            color: #5a78d8;
            font-size: 13px;
            font-weight: 800;
            line-height: 1;
            overflow: hidden;
            letter-spacing: 0;
        }

        .manage-tag__icon {
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex: 0 0 auto;
            border-radius: 50%;
            background: #5a84ff;
            color: #ffffff;
        }

        .manage-tag__level {
            min-width: 18px;
            padding: 0 6px 0 4px;
            color: currentColor;
            text-align: center;
        }

        .manage-tag.high-risk {
            background: #ffeef0;
            color: #ff6b7c;
        }

        .manage-tag.high-risk .manage-tag__icon {
            background: #ff6f82;
        }

        .manage-tag.disease-hypertension .manage-tag__icon {
            background: #ff6f82;
        }

        .manage-tag.disease-diabetes {
            background: #ede8ff;
            color: #9b85df;
        }

        .manage-tag.disease-diabetes .manage-tag__icon {
            background: #9b85df;
        }

        .manage-tag.disease-heart {
            background: #e9f1ff;
            color: #5a84ff;
        }

        .manage-tag.disease-heart .manage-tag__icon {
            background: #5a84ff;
        }

        .manage-tag.disease-risk {
            background: #fff2e8;
            color: #d25f00;
        }

        .manage-tag.disease-risk .manage-tag__icon {
            background: #ff9f40;
        }

        /* 异常类型状态标签：外层只负责排布，视觉由通用 status-tag 组件承载 */
        .anomaly-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(29, 33, 41, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-medium);
            font-size: var(--font-size-body-1);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
        }

        .toast.show { opacity: 1; }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .empty-icon i { font-size: 36px; color: var(--text-4); }
        .empty-text { font-size: var(--font-size-body-1); color: var(--text-3); }

        /* 筛选弹窗 */
        .filter-popup {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .filter-popup.show { opacity: 1; visibility: visible; }

        .filter-content {
            position: absolute;
            bottom: 0;
            left: 0; right: 0;
            background: var(--bg-2);
            border-radius: 24px 24px 0 0;
            max-height: 70vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .filter-popup.show .filter-content { transform: translateY(0); }

        .filter-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .filter-title { font-size: var(--font-size-title-1); font-weight: 600; }
        .filter-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--text-3); cursor: pointer; }

        .filter-body { padding: 20px; }

        .filter-group { margin-bottom: 24px; }
        .filter-group-title { font-size: var(--font-size-body-1); font-weight: 600; margin-bottom: 12px; }

        .filter-options { display: flex; flex-wrap: wrap; gap: 10px; }
        .filter-option {
            padding: 8px 16px;
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-medium);
            font-size: var(--font-size-body-1);
            color: var(--text-2);
            cursor: pointer;
        }

        .filter-option.selected { background: var(--arcoblue-1); border-color: var(--arcoblue-6); color: var(--arcoblue-6); }

        .filter-footer {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }

        .filter-btn {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-medium);
            font-size: var(--font-size-body-1);
            font-weight: 500;
            cursor: pointer;
        }

        .filter-btn.reset { background: var(--bg-1); border: 1px solid var(--border); color: var(--text-2); }
        .filter-btn.confirm { background: var(--arcoblue-6); border: 1px solid var(--arcoblue-6); color: white; }

            currentFilterType = 'anomaly';
            document.getElementById('filterTitle').textContent = '选择异常类型';
            let html = '<div class="filter-group"><div class="filter-group-title">异常类型（单选）</div><div class="filter-options">';
            anomalyTypeOptions.forEach(a => {
                html += `<div class="filter-option ${selectedAnomalyType === a.type ? 'selected' : ''}" onclick="toggleAnomaly('${a.type}')">${a.label}</div>`;
            });
            html += '</div></div>';
            document.getElementById('filterBody').innerHTML = html;
            document.getElementById('filterPopup').classList.add('show');
        }

        function toggleAnomaly(type) {
            selectedAnomalyType = selectedAnomalyType === type ? '' : type;
            showAnomalyFilter();
        }

        function closeFilterPopup() {
            document.getElementById('filterPopup').classList.remove('show');
        }

        function resetFilter() {
            selectedAnomalyType = '';
            confirmFilter();
        }

        function confirmFilter() {
            closeFilterPopup();
            renderList();
            // 更新标签状态
            const anomalyTag = document.getElementById('anomalyFilter');
            if (selectedAnomalyType) {
                anomalyTag.classList.add('active');
                anomalyTag.querySelector('span').textContent = anomalyTypeMap[selectedAnomalyType];
            } else {
                anomalyTag.classList.remove('active');
                anomalyTag.querySelector('span').textContent = '异常类型';
            }
        }

        // 渲染异常患者列表，卡片头部复用通用分组信息卡片组件
        function renderList() {
            const data = anomalyPatientData.filter(p => {
                if (searchKeyword) {
                    if (!p.name.toLowerCase().includes(searchKeyword) &&
                        !p.phone.includes(searchKeyword) &&
                        !p.idCard.includes(searchKeyword)) return false;
                }
                // 异常类型筛选（单选）
                if (selectedAnomalyType) {
                    if (!p.anomalies.some(a => a.type === selectedAnomalyType)) return false;
                }
                return true;
            });

            const container = document.getElementById('patientList');
            if (data.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon"><i class="fas fa-check-circle"></i></div><div class="empty-text">暂无异常患者</div></div>';
                return;
            }

            container.innerHTML = `<div class="patient-count">共有 <span>${data.length}</span> 个异常患者</div>`;
            data.forEach(patient => renderPatientCard(container, patient));
        }

        // 渲染单个患者卡片，保留原有呼叫、健康画像、异常详情操作
        function renderPatientCard(container, patient) {
            const genderText = patient.gender === 'female' ? '女' : '男';
            const card = GroupedInfoCard.render(container, {
                title: patient.name,
                status: {
                    label: `${genderText}·${patient.age}岁`,
                    size: 'small',
                    color: 'default'
                },
                keyword: searchKeyword,
                highlightFields: ['title'],
                showDivider: true,
                actions: [
                    {
                        label: '健康画像',
                        icon: 'fas fa-user-circle',
                        onClick: () => viewHealthProfile(patient.id)
                    },
                    {
                        label: '异常信息',
                        icon: 'fas fa-exclamation-circle',
                        primary: true,
                        onClick: () => viewAnomalyDetail(patient.id)
                    }
                ]
            });

            const callButton = document.createElement('button');
            callButton.className = 'phone-btn patient-call-btn';
            callButton.type = 'button';
            callButton.setAttribute('aria-label', `呼叫${patient.name}`);
            callButton.innerHTML = '<i class="fas fa-phone"></i>';
            callButton.addEventListener('click', () => callPatient(patient.phone, patient.name));
            card.appendChild(callButton);

            const content = document.createElement('div');
            content.className = 'patient-card-body';
            content.innerHTML = `
                <div class="patient-card-items">
                    <div class="detail-item">
                        <span class="detail-label">证件号码</span>
                        <span class="detail-value">${patient.idCard}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">联系电话</span>
                        <span class="detail-value">${patient.phone}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">在管病种</span>
                        <span class="detail-value">
                            <span class="manage-tags">${renderDiseaseTags(patient.diseases)}</span>
                        </span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">异常类型</span>
                        <span class="detail-value">
                            <span class="anomaly-tags">${renderAnomalyTags(patient.anomalies)}</span>
                        </span>
                    </div>
                </div>
            `;
            const actions = card.querySelector('.grouped-info-card__actions');
            card.insertBefore(content, actions);
        }

        // 渲染在管病种标签，复用“我的患者”列表的病种圆标样式
        function renderDiseaseTags(diseases) {
            return diseases.map(disease => {
                const tagClass = `manage-tag ${getDiseaseBadgeClass(disease.name)} ${disease.level === '高危' ? 'high-risk' : ''}`.trim();
                return `
                    <span class="${tagClass}" title="${disease.name} · ${disease.level}">
                        <span class="manage-tag__icon">${getDiseaseBadgeText(disease.name)}</span>
                        <span class="manage-tag__level">${getDiseaseLevelText(disease.level)}</span>
                    </span>
                `;
            }).join('');
        }

        // 根据病种生成圆形短标文字
        function getDiseaseBadgeText(diseaseName) {
            const badgeTextMap = {
                '高血压': '高',
                '糖尿病': '糖',
                '冠心病': '冠',
                '脑卒中': '脑',
                '肾病': '肾',
                '高血脂': '脂',
            };
            return badgeTextMap[diseaseName] || diseaseName.slice(0, 1);
        }

        // 根据病种分级生成右侧短标
        function getDiseaseLevelText(level) {
            const levelTextMap = {
                '高危': '危',
                '一级': '1',
                '二级': '2',
                '常规': '常'
            };
            return levelTextMap[level] || level;
        }

        // 根据病种生成颜色类名
        function getDiseaseBadgeClass(diseaseName) {
            if (diseaseName.includes('高血压')) return 'disease-hypertension';
            if (diseaseName.includes('糖尿病')) return 'disease-diabetes';
            if (diseaseName.includes('冠心病') || diseaseName.includes('心')) return 'disease-heart';
            if (diseaseName.includes('脑卒中') || diseaseName.includes('高血脂')) return 'disease-risk';
            return '';
        }

        // 渲染异常类型状态标签，优先使用通用 status-tag 组件
        function renderAnomalyTags(anomalies) {
            return anomalies.map(anomaly => {
                const color = getAnomalyTagColor(anomaly.type);
                return `<status-tag color="${color}" size="small" label="${anomaly.label}"></status-tag>`;
            }).join('');
        }

        // 将异常类型映射到通用状态标签现有色板
        function getAnomalyTagColor(type) {
            const colorMap = {
                vital: 'orange',
                assess: 'blue',
                risk: 'red',
                complication: 'red',
                visit: 'cyan',
                skipVisit: 'orange',
                other: 'gray'
            };
            return colorMap[type] || 'gray';
        }

        function callPatient(phone, name) { showToast(`正在呼叫 ${name}`); }
        function viewHealthProfile(id) { window.location.href = `patient-health-profile.html?id=${id}`; }
        function viewAnomalyDetail(id) { window.location.href = `abnormal-patient-detail.html?id=${id}`; }
        function goBack() { window.location.href = 'medical-staff-home.html'; }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 500);
        }
        document.getElementById('filterPopup').addEventListener('click', e => {
            if (e.target === document.getElementById('filterPopup')) closeFilterPopup();
        });
    </script>
</body>
</html>
