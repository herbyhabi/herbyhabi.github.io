<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>患者异常</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@arco-design/mobile-react/dist/arco.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --arcoblue-6: #165DFF;
            --arcoblue-1: #E8F3FF;
            --green-6: #00B42A;
            --green-1: #E8FFEA;
            --orange-6: #FF7D00;
            --orange-1: #FFF7E8;
            --red-6: #F53F3F;
            --red-1: #FFECE8;
            --pink-6: #F5319D;
            --pink-1: #FFE8F1;
            --purple-6: #722ED1;
            --purple-1: #F9F0FF;
            --text-1: #1D2129;
            --text-2: #4E5969;
            --text-3: #86909C;
            --text-4: #C9CDD4;
            --bg-1: #F2F3F5;
            --bg-2: #FFFFFF;
            --border: #E5E6EB;
            --radius-small: 4px;
            --radius-medium: 8px;
            --radius-large: 12px;
            --radius-xlarge: 20px;
            --font-size-caption: 12px;
            --font-size-body-1: 14px;
            --font-size-title-1: 16px;
            --font-size-title-2: 18px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-1);
            color: var(--text-1);
            min-height: 100vh;
            padding-bottom: 20px;
        }

        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, var(--arcoblue-6) 0%, #4080FF 100%);
            padding: 44px 16px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: var(--radius-medium);
        }

        .navbar-title {
            flex: 1;
            font-size: var(--font-size-title-2);
            font-weight: 600;
            color: white;
        }

        /* 搜索和筛选区域 */
        .filter-section {
            background: var(--bg-2);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-1);
            padding: 10px 14px;
            border-radius: var(--radius-xlarge);
            margin-bottom: 12px;
        }

        .search-box i {
            color: var(--text-3);
            font-size: 16px;
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: var(--font-size-body-1);
            color: var(--text-1);
        }

        .filter-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-xlarge);
            font-size: var(--font-size-caption);
            color: var(--text-2);
            cursor: pointer;
        }

        .filter-tag.active {
            background: var(--arcoblue-1);
            border-color: var(--arcoblue-6);
            color: var(--arcoblue-6);
        }

        .filter-tag i {
            font-size: 10px;
        }

        /* 患者列表 */
        .patient-list {
            padding: 12px 16px;
        }

        .patient-count {
            font-size: var(--font-size-caption);
            color: var(--text-3);
            margin-bottom: 12px;
        }

        .patient-count span {
            color: var(--arcoblue-6);
            font-weight: 600;
        }

        .patient-card {
            background: var(--bg-2);
            border-radius: var(--radius-large);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .patient-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .patient-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .patient-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            background: var(--arcoblue-1);
            color: var(--arcoblue-6);
        }

        .patient-avatar.female {
            background: var(--pink-1);
            color: var(--pink-6);
        }

        .patient-name {
            font-size: var(--font-size-title-1);
            font-weight: 600;
        }

        .patient-name.male { color: var(--arcoblue-6); }
        .patient-name.female { color: var(--pink-6); }
        .patient-name.other { color: var(--arcoblue-6); }

        .patient-age {
            font-size: var(--font-size-caption);
            color: var(--text-3);
            background: var(--bg-1);
            padding: 2px 8px;
            border-radius: var(--radius-small);
        }

        .phone-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: var(--green-1);
            color: var(--green-6);
            border: none;
            border-radius: var(--radius-medium);
            font-size: var(--font-size-caption);
            cursor: pointer;
        }

        .patient-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px dashed var(--border);
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: var(--font-size-body-1);
        }

        .detail-label {
            color: var(--text-3);
            min-width: 60px;
        }

        .detail-value {
            color: var(--text-2);
        }

        /* 在管信息 */
        .manage-info {
            margin-bottom: 12px;
        }

        .manage-label {
            font-size: var(--font-size-caption);
            color: var(--text-3);
            margin-bottom: 6px;
        }

        .manage-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .manage-tag {
            padding: 4px 10px;
            font-size: var(--font-size-caption);
            border-radius: var(--radius-small);
            border: 0;
            background: var(--orange-1);
            color: var(--orange-6);
        }

        .manage-tag.high-risk {
            border-color: transparent;
            color: var(--orange-6);
            background: var(--orange-1);
        }

        .manage-tag.patient {
            border-color: transparent;
            color: var(--orange-6);
            background: var(--orange-1);
        }

        /* 异常类型标签 - 填充色块 */
        .anomaly-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .anomaly-tag {
            padding: 4px 10px;
            font-size: var(--font-size-caption);
            border-radius: var(--radius-small);
            color: white;
        }

        .anomaly-tag.vital { background: var(--orange-6); }
        .anomaly-tag.assess { background: var(--purple-6); }
        .anomaly-tag.risk { background: var(--red-6); }
        .anomaly-tag.complication { background: #E8473F; }
        .anomaly-tag.visit { background: #0FC6C2; }
        .anomaly-tag.skipVisit { background: #8B5CF6; }
        .anomaly-tag.other { background: var(--text-3); }

        /* 卡片操作 */
        .card-actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-medium);
            background: var(--bg-2);
            font-size: var(--font-size-body-1);
            color: var(--text-2);
            cursor: pointer;
        }

        .action-btn.primary {
            background: var(--arcoblue-6);
            border-color: var(--arcoblue-6);
            color: white;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(29, 33, 41, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-medium);
            font-size: var(--font-size-body-1);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
        }

        .toast.show { opacity: 1; }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .empty-icon i { font-size: 36px; color: var(--text-4); }
        .empty-text { font-size: var(--font-size-body-1); color: var(--text-3); }

        /* 筛选弹窗 */
        .filter-popup {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .filter-popup.show { opacity: 1; visibility: visible; }

        .filter-content {
            position: absolute;
            bottom: 0;
            left: 0; right: 0;
            background: var(--bg-2);
            border-radius: 24px 24px 0 0;
            max-height: 70vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .filter-popup.show .filter-content { transform: translateY(0); }

        .filter-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .filter-title { font-size: var(--font-size-title-1); font-weight: 600; }
        .filter-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--text-3); cursor: pointer; }

        .filter-body { padding: 20px; }

        .filter-group { margin-bottom: 24px; }
        .filter-group-title { font-size: var(--font-size-body-1); font-weight: 600; margin-bottom: 12px; }

        .filter-options { display: flex; flex-wrap: wrap; gap: 10px; }
        .filter-option {
            padding: 8px 16px;
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-medium);
            font-size: var(--font-size-body-1);
            color: var(--text-2);
            cursor: pointer;
        }

        .filter-option.selected { background: var(--arcoblue-1); border-color: var(--arcoblue-6); color: var(--arcoblue-6); }

        .filter-footer {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }

        .filter-btn {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-medium);
            font-size: var(--font-size-body-1);
            font-weight: 500;
            cursor: pointer;
        }

        .filter-btn.reset { background: var(--bg-1); border: 1px solid var(--border); color: var(--text-2); }
        .filter-btn.confirm { background: var(--arcoblue-6); border: 1px solid var(--arcoblue-6); color: white; }

                    { type: 'complication', label: '合/并发症异常' }
                ]
            },
            {
                id: 3,
                name: '张大山',
                gender: 'male',
                age: 65,
                phone: '137****9012',
                idCard: '310***********9012',
                grid: '第一网格',
                address: '幸福社区3号楼102室',
                diseases: [
                    { name: '冠心病', level: '中危' },
                    { name: '高血脂', level: '一般' }
                ],
                anomalies: [
                    { type: 'visit', label: '未及时复诊' }
                ]
            },
            {
                id: 4,
                name: '陈美丽',
                gender: 'female',
                age: 58,
                phone: '136****3456',
                idCard: '310***********3456',
                grid: '第三网格',
                diseases: [
                    { name: '糖尿病', level: '高危' }
                ],
                anomalies: [
                    { type: 'vital', label: '体征异常' },
                    { type: 'risk', label: '危险因素异常' },
                    { type: 'other', label: '其他异常' }
                ]
            },
            {
                id: 5,
                name: '刘志强',
                gender: 'male',
                age: 70,
                phone: '135****7890',
                idCard: '310***********7890',
                grid: '第二网格',
                diseases: [
                    { name: '脑卒中', level: '高危' },
                    { name: '高血压', level: '高危' }
                ],
                anomalies: [
                    { type: 'complication', label: '合/并发症异常' },
                    { type: 'skipVisit', label: '越级就诊' }
                ]
            }
        ];

        const anomalyTypeOptions = [
            { type: 'vital', label: '体征异常' },
            { type: 'assess', label: '评估异常' },
            { type: 'risk', label: '危险因素异常' },
            { type: 'complication', label: '合/并发症异常' },
            { type: 'visit', label: '未及时复诊' },
            { type: 'skipVisit', label: '越级就诊' },
            { type: 'other', label: '其他异常' }
        ];

        window.addEventListener('load', () => renderList());

        function handleSearch() {
            searchKeyword = document.getElementById('searchInput').value.toLowerCase();
            renderList();
        }

        function showAnomalyFilter() {
            currentFilterType = 'anomaly';
            document.getElementById('filterTitle').textContent = '选择异常类型';
            let html = '<div class="filter-group"><div class="filter-group-title">异常类型（单选）</div><div class="filter-options">';
            anomalyTypeOptions.forEach(a => {
                html += `<div class="filter-option ${selectedAnomalyType === a.type ? 'selected' : ''}" onclick="toggleAnomaly('${a.type}')">${a.label}</div>`;
            });
            html += '</div></div>';
            document.getElementById('filterBody').innerHTML = html;
            document.getElementById('filterPopup').classList.add('show');
        }

        function toggleAnomaly(type) {
            selectedAnomalyType = selectedAnomalyType === type ? '' : type;
            showAnomalyFilter();
        }

        function closeFilterPopup() {
            document.getElementById('filterPopup').classList.remove('show');
        }

        function resetFilter() {
            selectedAnomalyType = '';
            confirmFilter();
        }

        function confirmFilter() {
            closeFilterPopup();
            renderList();
            // 更新标签状态
            const anomalyTag = document.getElementById('anomalyFilter');
            if (selectedAnomalyType) {
                anomalyTag.classList.add('active');
                anomalyTag.querySelector('span').textContent = anomalyTypeMap[selectedAnomalyType];
            } else {
                anomalyTag.classList.remove('active');
                anomalyTag.querySelector('span').textContent = '异常类型';
            }
        }

        function renderList() {
            let data = anomalyPatientData.filter(p => {
                if (searchKeyword) {
                    if (!p.name.toLowerCase().includes(searchKeyword) &&
                        !p.phone.includes(searchKeyword) &&
                        !p.idCard.includes(searchKeyword)) return false;
                }
                // 异常类型筛选（单选）
                if (selectedAnomalyType) {
                    if (!p.anomalies.some(a => a.type === selectedAnomalyType)) return false;
                }
                return true;
            });

            const container = document.getElementById('patientList');
            if (data.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon"><i class="fas fa-check-circle"></i></div><div class="empty-text">暂无异常患者</div></div>';
                return;
            }

            let html = `<div class="patient-count">共有 <span>${data.length}</span> 个异常患者</div>`;
            data.forEach(p => {
                const genderClass = p.gender === 'female' ? 'female' : 'male';
                const avatarIcon = p.gender === 'female' ? 'fa-female' : 'fa-male';
                const diseaseTags = p.diseases.map(d => {
                    const cls = d.level === '高危' ? 'high-risk' : 'patient';
                    return `<span class="manage-tag ${cls}">${d.name}（${d.level}）</span>`;
                }).join('');
                const anomalyTags = p.anomalies.map(a => `<span class="anomaly-tag ${a.type}">${a.label}</span>`).join('');

                html += `
                    <div class="patient-card">
                        <div class="patient-header">
                            <div class="patient-info">
                                <div class="patient-avatar ${genderClass}">
                                    <i class="fas ${avatarIcon}"></i>
                                </div>
                                <span class="patient-name ${genderClass}">${p.name}</span>
                                <span class="patient-age">${p.age}岁</span>
                            </div>
                            <button class="phone-btn" onclick="callPatient('${p.phone}', '${p.name}')">
                                <i class="fas fa-phone"></i><span>呼叫</span>
                            </button>
                        </div>
                        <div class="patient-details">
                            <div class="detail-item"><span class="detail-label">身份证</span><span class="detail-value">${p.idCard}</span></div>
                        </div>
                        <div class="manage-info">
                            <div class="manage-label">在管</div>
                            <div class="manage-tags">${diseaseTags}</div>
                        </div>
                        <div class="anomaly-tags">${anomalyTags}</div>
                        <div class="card-actions">
                            <button class="action-btn" onclick="viewHealthProfile(${p.id})">
                                <i class="fas fa-user-circle"></i><span>健康画像</span>
                            </button>
                            <button class="action-btn primary" onclick="viewAnomalyDetail(${p.id})">
                                <i class="fas fa-exclamation-circle"></i><span>异常信息</span>
                            </button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function callPatient(phone, name) { showToast(`正在呼叫 ${name}`); }
        function viewHealthProfile(id) { window.location.href = `patient-health-profile.html?id=${id}`; }
        function viewAnomalyDetail(id) { window.location.href = `abnormal-patient-detail.html?id=${id}`; }
        function goBack() { window.location.href = 'medical-staff-home.html'; }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
        document.getElementById('filterPopup').addEventListener('click', e => {
            if (e.target === document.getElementById('filterPopup')) closeFilterPopup();
        });
    </script>
</body>
</html>
