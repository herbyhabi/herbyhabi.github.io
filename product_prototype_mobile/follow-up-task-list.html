<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>随访任务</title>
    <script src="../assets/vendor/tailwind-browser@4.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@arco-design/mobile-react/dist/arco.css">
    <style type="text/tailwindcss">
        @layer base {
            * {
                @apply box-border;
            }

            body {
                @apply min-h-screen bg-[#F8FAFC] pb-[70px] font-sans text-[#1D2129] antialiased;
            }
        }

        @layer components {
            /* 页面页签与查询区域 */
            .tabs-section {
                @apply px-4 pt-3;
            }

            .quick-filter-section {
                @apply px-4 pt-3;
            }

            .filter-tags {
                @apply mt-3 flex flex-wrap gap-2;
            }

            .filter-tag {
                @apply flex cursor-pointer items-center gap-1 rounded-full border border-[#E5E6EB] bg-[#F8FAFC] px-3 py-1.5 text-xs text-[#4E5969] transition-colors;
            }

            .filter-tag.active {
                @apply border-[#165DFF] bg-[#E8F3FF] text-[#165DFF];
            }

            .filter-tag i {
                @apply text-[10px];
            }

            /* 任务列表与通用信息卡扩展 */
            .task-list {
                @apply grid gap-3 px-4 py-3;
            }

            .task-list .grouped-info-card {
                @apply relative shadow-[0_2px_8px_rgb(29_33_41_/_0.03)];
            }

            .task-list .grouped-info-card__title {
                @apply pl-[18px];
            }

            .task-card-body {
                @apply px-4 pb-1 pt-3;
            }

            .task-card-items {
                @apply grid gap-0.5;
            }

            .phone-btn {
                @apply inline-flex h-7 w-7 cursor-pointer items-center justify-center gap-1 rounded-full border-0 bg-[#E8FFEA] p-0 text-sm text-[#00B42A] transition-colors active:bg-[#00B42A] active:text-white;
            }

            .task-call-btn {
                @apply absolute right-3 top-3 z-[2] rounded-full;
            }

            .detail-item {
                @apply flex items-start gap-1.5 text-sm;
            }

            .detail-label {
                @apply shrink-0 basis-auto leading-[26px] text-[#86909C] min-w-[60px];
            }

            .detail-value {
                @apply min-w-0 flex-1 break-all leading-[26px] text-[#4E5969];
            }

            /* 随访任务标签：左侧类型标签 + 右侧业务状态 */
            .follow-tags {
                @apply flex flex-wrap items-center gap-1.5 pt-0.5;
            }

            .follow-tag {
                @apply inline-flex min-h-5 items-center rounded-full bg-[#F3F6FF] px-2 py-[3px] text-xs font-bold leading-none tracking-normal text-[#5A78D8];
            }

            .follow-tag.disease-hypertension {
                @apply bg-[#FFE7EC] text-[#FF6F82];
            }

            .follow-tag.disease-diabetes {
                @apply bg-[#EDE8FF] text-[#9B85DF];
            }

            .follow-tag.disease-heart {
                @apply bg-[#E9F1FF] text-[#5A84FF];
            }

            .follow-tag.disease-risk {
                @apply bg-[#FFF2E8] text-[#D25F00];
            }

            .follow-type {
                @apply inline-flex h-[22px] items-center rounded-full bg-[#E8F3FF] px-2 text-xs font-bold leading-[22px] text-[#165DFF];
            }

            .follow-type.warning {
                @apply bg-[#FFF7E8] text-[#D25F00];
            }

            .follow-type.danger {
                @apply bg-[#FFECE8] text-[#C9352B];
            }

            /* Toast 与空状态 */
            .toast {
                @apply pointer-events-none fixed left-1/2 top-1/2 z-[9999] -translate-x-1/2 -translate-y-1/2 rounded-lg bg-[#1D2129]/90 px-6 py-3 text-sm text-white opacity-0 transition-opacity duration-300;
            }

            .toast.show {
                @apply opacity-100;
            }

            .empty-state {
                @apply flex flex-col items-center justify-center px-5 py-[60px] text-center;
            }

            .empty-icon {
                @apply mb-4 flex h-20 w-20 items-center justify-center rounded-full bg-[#F8FAFC];
            }

            .empty-icon i {
                @apply text-4xl text-[#C9CDD4];
            }

            .empty-text {
                @apply text-sm text-[#86909C];
            }
        }
    </style>
    <script src="../components/mobile/mobile-title-bar.js" defer></script>
    <script src="../components/mobile/mobile-tabs.js"></script>
    <script src="../components/mobile/mobile-search.js"></script>
    <script src="../components/shared/status-tag.js"></script>
    <script src="../components/mobile/grouped-info-card.js"></script>
</head>
<body class="mx-auto min-h-screen w-full min-w-[320px] max-w-[768px] bg-[#F8FAFC] pb-24 pt-[env(safe-area-inset-top)]">
    <!-- 导航栏 -->
    <mobile-title-bar title="随访任务"></mobile-title-bar>
    <script>
        customElements.whenDefined('mobile-title-bar').then(function bindMobileTitleBar() {
            const titleBar = document.querySelector('mobile-title-bar');
            if (!titleBar) return;
            titleBar.onBack = goBack;
        });
    </script>

    <!-- 页签 -->
    <div class="tabs-section">
        <mobile-tabs id="followUpTabs"></mobile-tabs>
    </div>

    <!-- 搜索和筛选 -->
    <div class="quick-filter-section">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜索姓名、身份证、手机号" oninput="handleSearch()">
        </div>
        <div class="filter-tags">
            <div class="filter-tag " data-date="all" onclick="selectDateFilter('all')">
                <span>全部</span>
            </div>
            <div class="filter-tag active" data-date="month" onclick="selectDateFilter('month')">
                <span>本月</span>
            </div>
            <div class="filter-tag" data-date="week" onclick="selectDateFilter('week')">
                <span>本周</span>
            </div>
            <div class="filter-tag" data-date="today" onclick="selectDateFilter('today')">
                <span>今日</span>
            </div>
        </div>
    </div>

    <!-- 任务列表 -->
    <div class="task-list" id="taskList">
        <!-- 动态生成 -->
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // 当前页签
        let currentTab = 'patient';
        // 当前日期筛选
        let currentDateFilter = 'all';
        // 搜索关键词
        let searchKeyword = '';

        // 动态生成日期（基于当前日期）
        function getDateStr(daysFromNow) {
            const date = new Date();
            date.setDate(date.getDate() + daysFromNow);
            return date.toISOString().split('T')[0];
        }

        // 模拟患者随访数据
        const patientFollowUpData = [
            {
                id: 1,
                name: '王建国',
                gender: 'male',
                age: 68,
                phone: '13811111234',
                idCard: '310111111111111234',
                diseases: ['高' , '糖'],
                followUpType: '常规随访',
                nextDate: getDateStr(0) // 今天
            },
            {
                id: 2,
                name: '李秀英',
                gender: 'female',
                age: 72,
                phone: '13911115678',
                idCard: '310111111111115678',
                diseases: ['糖'],
                followUpType: '控制不满意随访',
                nextDate: getDateStr(2) // 后天
            },
            {
                id: 3,
                name: '张大山',
                gender: 'male',
                age: 65,
                phone: '13711119012',
                idCard: '310111111111119012',
                diseases: ['冠', '高'],
                followUpType: '常规随访',
                nextDate: getDateStr(5) // 5天后
            },
            {
                id: 4,
                name: '陈美丽',
                gender: 'female',
                age: 58,
                phone: '13611113456',
                idCard: '310111111111113456',
                diseases: ['高'],
                followUpType: '常规随访',
                nextDate: getDateStr(7) // 7天后
            },
            {
                id: 5,
                name: '刘志强',
                gender: 'male',
                age: 70,
                phone: '13511117890',
                idCard: '310111111111117890',
                diseases: ['糖', '高血脂'],
                followUpType: '控制不满意随访',
                nextDate: getDateStr(10) // 10天后
            },
            {
                id: 6,
                name: '周明华',
                gender: 'male',
                age: 62,
                phone: '13411115555',
                idCard: '310111111111115555',
                diseases: ['高血脂'],
                followUpType: '常规随访',
                nextDate: getDateStr(15) // 15天后
            },
            {
                id: 7,
                name: '吴秀兰',
                gender: 'female',
                age: 66,
                phone: '13311116666',
                idCard: '310111111111116666',
                diseases: ['高', '糖', '冠'],
                followUpType: '常规随访',
                nextDate: getDateStr(20) // 20天后
            },
            {
                id: 8,
                name: '郑国强',
                gender: 'male',
                age: 73,
                phone: '13211117777',
                idCard: '310111111111117777',
                diseases: ['糖'],
                followUpType: '控制不满意随访',
                nextDate: getDateStr(25) // 25天后
            }
        ];

        // 模拟高危随访数据（随访类型固定为"高危随访"）
        const highRiskFollowUpData = [
            {
                id: 101,
                name: '赵明华',
                gender: 'male',
                age: 75,
                phone: '13311111111',
                idCard: '310111111111111111',
                diseases: ['高', '冠'],
                followUpType: '高危随访',
                nextDate: getDateStr(1) // 明天
            },
            {
                id: 102,
                name: '孙丽娟',
                gender: 'female',
                age: 68,
                phone: '13211112222',
                idCard: '310111111111112222',
                diseases: ['糖', '糖'],
                followUpType: '高危随访',
                nextDate: getDateStr(3) // 3天后
            },
            {
                id: 103,
                name: '周国强',
                gender: 'male',
                age: 72,
                phone: '13111113333',
                idCard: '310111111111113333',
                diseases: ['脑'],
                followUpType: '高危随访',
                nextDate: getDateStr(6) // 6天后
            },
            {
                id: 104,
                name: '钱秀英',
                gender: 'female',
                age: 70,
                phone: '13011114444',
                idCard: '310111111111114444',
                diseases: ['冠', '心力衰竭'],
                followUpType: '高危随访',
                nextDate: getDateStr(8) // 8天后
            },
            {
                id: 105,
                name: '李国华',
                gender: 'male',
                age: 78,
                phone: '12911115555',
                idCard: '310111111111115555',
                diseases: ['心力衰竭', '心律失常'],
                followUpType: '高危随访',
                nextDate: getDateStr(12) // 12天后
            }
        ];

        // 初始化
        window.addEventListener('load', () => {
            initFollowUpTabs();
            renderTaskList();
        });

        // 初始化通用页签组件
        function initFollowUpTabs() {
            const tabs = document.getElementById('followUpTabs');
            tabs.tabs = [
                { label: '患者随访', value: 'patient', count: patientFollowUpData.length },
                { label: '高危随访', value: 'highRisk', count: highRiskFollowUpData.length }
            ];
            tabs.value = currentTab;
            tabs.addEventListener('change', (event) => {
                switchTab(event.detail.value);
            });
        }

        // 切换页签
        function switchTab(tab) {
            currentTab = tab === 'highRisk' ? 'highRisk' : 'patient';
            document.getElementById('followUpTabs').value = currentTab;
            renderTaskList();
        }

        // 选择日期筛选
        function selectDateFilter(date) {
            currentDateFilter = date;
            // 更新筛选标签样式
            document.querySelectorAll('.filter-tag').forEach(tag => {
                if (tag.dataset.date === date) {
                    tag.classList.add('active');
                } else {
                    tag.classList.remove('active');
                }
            });
            renderTaskList();
        }

        // 搜索
        function handleSearch() {
            searchKeyword = document.getElementById('searchInput').value.toLowerCase();
            renderTaskList();
        }

        // 渲染任务列表
        function renderTaskList() {
            const container = document.getElementById('taskList');
            const sourceData = currentTab === 'patient' ? patientFollowUpData : highRiskFollowUpData;
            let data = getFilteredTaskData(sourceData);
            
            // 按下次随访日期排序
            data.sort((a, b) => new Date(a.nextDate) - new Date(b.nextDate));
            
            updateFollowUpTabCounts(data.length);

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-clipboard-list"></i>
                        </div>
                        <div class="empty-text">暂无随访任务</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';

            data.forEach(task => {
                renderTaskCard(container, task);
            });
        }

        // 更新页签计数，计数跟随当前搜索和日期筛选结果变化
        function updateFollowUpTabCounts(currentCount) {
            const patientCount = currentTab === 'patient' ? currentCount : getFilteredTaskData(patientFollowUpData).length;
            const highRiskCount = currentTab === 'highRisk' ? currentCount : getFilteredTaskData(highRiskFollowUpData).length;
            const tabs = document.getElementById('followUpTabs');
            tabs.tabs = [
                { label: '患者随访', value: 'patient', count: patientCount },
                { label: '高危随访', value: 'highRisk', count: highRiskCount }
            ];
            tabs.value = currentTab;
        }

        // 复用当前查询条件计算任务数据
        function getFilteredTaskData(sourceData) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            return sourceData.filter(item => {
                const nextDate = new Date(item.nextDate);
                nextDate.setHours(0, 0, 0, 0);

                let matchDate = true;
                if (currentDateFilter === 'all') {
                    matchDate = true;
                } else if (currentDateFilter === 'today') {
                    matchDate = nextDate.getTime() === today.getTime();
                } else if (currentDateFilter === 'week') {
                    const weekEnd = new Date(today);
                    weekEnd.setDate(weekEnd.getDate() + 7);
                    matchDate = nextDate >= today && nextDate <= weekEnd;
                } else {
                    const monthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
                    matchDate = nextDate >= today && nextDate <= monthEnd;
                }

                const matchKeyword = !searchKeyword ||
                    item.name.toLowerCase().includes(searchKeyword) ||
                    item.phone.includes(searchKeyword) ||
                    item.idCard.includes(searchKeyword);

                return matchDate && matchKeyword;
            });
        }

        // 渲染单个随访任务卡片，卡片头部复用“我的患者”同款通用组件
        function renderTaskCard(container, task) {
            const typeText = currentTab === 'patient' ? '患者随访' : '高危随访';
            const genderText = task.gender === 'female' ? '女' : '男';

            const card = GroupedInfoCard.render(container, {
                title: task.name,
                status: {
                    label: `${genderText}·${task.age}岁`,
                    size: 'small',
                    color: 'default'
                },
                keyword: searchKeyword,
                highlightFields: ['title'],
                showDivider: true,
                actions: [
                    {
                        label: '健康画像',
                        icon: 'fas fa-user-circle',
                        onClick: () => viewHealthProfile(task.id)
                    },
                    {
                        label: '随访记录',
                        icon: 'fas fa-history',
                        onClick: () => viewFollowUpRecords(task.id, typeText)
                    },
                    {
                        label: '预随访',
                        icon: 'fas fa-clipboard-check',
                        primary: true,
                        onClick: () => preFollowUp(task.id)
                    }
                ]
            });

            const callButton = document.createElement('button');
            callButton.className = 'phone-btn task-call-btn';
            callButton.type = 'button';
            callButton.setAttribute('aria-label', `呼叫${task.name}`);
            callButton.innerHTML = '<i class="fas fa-phone"></i>';
            callButton.addEventListener('click', () => callPatient(task.phone, task.name));
            card.appendChild(callButton);

            const content = document.createElement('div');
            content.className = 'task-card-body';
            content.innerHTML = `
                <div class="task-card-items">
                    <div class="detail-item">
                        <span class="detail-label">证件号码</span>
                        <span class="detail-value">${task.idCard}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">联系电话</span>
                        <span class="detail-value">${task.phone}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">随访病种</span>
                        <span class="detail-value">
                            <span class="follow-tags">${renderDiseaseTags(task.diseases)}</span>
                        </span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">随访类型</span>
                        <span class="detail-value">
                            <span class="detail-value">${task.followUpType}</span>
                        </span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">计划日期</span>
                        <span class="detail-value">${task.nextDate}</span>
                    </div>
                </div>
            `;

            const actions = card.querySelector('.grouped-info-card__actions');
            card.insertBefore(content, actions);
        }

        // 生成病种标签
        function renderDiseaseTags(diseases) {
            return diseases.map(disease => (
                `<span class="follow-tag ${getDiseaseTagClass(disease)}">${disease}</span>`
            )).join('');
        }

        // 根据病种生成标签色
        function getDiseaseTagClass(disease) {
            if (disease.includes('高')) return 'disease-hypertension';
            if (disease.includes('糖')) return 'disease-diabetes';
            if (disease.includes('冠') || disease.includes('心')) return 'disease-heart';
            return disease.includes('高危') || disease.includes('并发') || disease.includes('后遗') ? 'disease-risk' : '';
        }

        // 呼叫患者
        function callPatient(phone, name) {
            showToast(`正在呼叫 ${name}: ${phone}`);
        }

        // 查看随访记录
        function viewFollowUpRecords(id, type) {
            window.location.href = `patient-follow-up-records.html?id=${id}&type=${encodeURIComponent(type)}`;
        }

        // 查看健康画像
        function viewHealthProfile(id) {
            window.location.href = `patient-health-profile.html?id=${id}`;
        }

        // 预随访
        function preFollowUp(id) {
            window.location.href = `patient-pre-follow-up.html?id=${id}`;
        }

        // 返回
        function goBack() {
            window.location.href = 'medical-staff-home.html';
        }

        // Toast提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
