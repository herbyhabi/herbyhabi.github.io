<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>随访任务</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@arco-design/mobile-react/dist/arco.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --arcoblue-6: #165DFF;
            --arcoblue-1: #E8F3FF;
            --green-6: #00B42A;
            --green-1: #E8FFEA;
            --orange-6: #FF7D00;
            --orange-1: #FFF7E8;
            --red-6: #F53F3F;
            --pink-6: #F5319D;
            --pink-1: #FFE8F1;
            --text-1: #1D2129;
            --text-2: #4E5969;
            --text-3: #86909C;
            --text-4: #C9CDD4;
            --bg-1: #F2F3F5;
            --bg-2: #FFFFFF;
            --border: #E5E6EB;
            --radius-small: 4px;
            --radius-medium: 8px;
            --radius-large: 12px;
            --radius-xlarge: 20px;
            --font-size-caption: 12px;
            --font-size-body-1: 14px;
            --font-size-title-1: 16px;
            --font-size-title-2: 18px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-1);
            color: var(--text-1);
            min-height: 100vh;
            padding-bottom: 20px;
        }

        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, var(--arcoblue-6) 0%, #4080FF 100%);
            padding: 8px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: var(--radius-medium);
            transition: background 0.2s;
        }

        .back-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .navbar-title {
            flex: 1;
            font-size: var(--font-size-title-2);
            font-weight: 600;
            color: white;
        }

        /* 页签 */
        .tabs-container {
            background: var(--bg-2);
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
        }

        .tabs {
            display: flex;
        }

        .tab-item {
            flex: 1;
            padding: 14px 0;
            text-align: center;
            font-size: var(--font-size-body-1);
            color: var(--text-2);
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .tab-item.active {
            color: var(--arcoblue-6);
            font-weight: 600;
        }

        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: var(--arcoblue-6);
            border-radius: 2px;
        }

        .tab-count {
            display: inline-block;
            margin-left: 4px;
            padding: 2px 6px;
            background: var(--bg-1);
            border-radius: 10px;
            font-size: var(--font-size-caption);
            color: var(--text-3);
        }

        .tab-item.active .tab-count {
            background: var(--arcoblue-1);
            color: var(--arcoblue-6);
        }

        /* 搜索和筛选区域 */
        .filter-section {
            background: var(--bg-2);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .filter-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-xlarge);
            font-size: var(--font-size-caption);
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tag.active {
            background: var(--arcoblue-1);
            border-color: var(--arcoblue-6);
            color: var(--arcoblue-6);
        }

        .filter-tag i {
            font-size: 10px;
        }

        /* 任务列表 */
        .task-list {
            padding: 12px 16px;
        }

        .task-count {
            font-size: var(--font-size-caption);
            color: var(--text-3);
            margin-bottom: 12px;
        }

        .task-count span {
            color: var(--arcoblue-6);
            font-weight: 600;
        }

        .task-card {
            background: var(--bg-2);
            border-radius: var(--radius-large);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .patient-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .patient-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            background: var(--arcoblue-1);
            color: var(--arcoblue-6);
        }

        .patient-avatar.female {
            background: var(--pink-1);
            color: var(--pink-6);
        }

        .patient-name {
            font-size: var(--font-size-title-1);
            font-weight: 600;
        }

        .patient-name.male {
            color: var(--arcoblue-6);
        }

        .patient-name.female {
            color: var(--pink-6);
        }

        .patient-name.other {
            color: var(--arcoblue-6);
        }

        .patient-age {
            font-size: var(--font-size-caption);
            color: var(--text-3);
            background: var(--bg-1);
            padding: 2px 8px;
            border-radius: var(--radius-small);
        }

        .phone-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: var(--green-1);
            color: var(--green-6);
            border: none;
            border-radius: var(--radius-medium);
            font-size: var(--font-size-caption);
            cursor: pointer;
            transition: all 0.2s;
        }

        .phone-btn:active {
            background: var(--green-6);
            color: white;
        }

        .task-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px dashed var(--border);
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: var(--font-size-body-1);
        }

        .detail-label {
            color: var(--text-3);
            min-width: 60px;
        }

        .detail-value {
            color: var(--text-2);
        }

        .tag-group {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            min-height: 26px;
            padding: 4px 9px;
            font-size: var(--font-size-caption);
            line-height: 1.2;
            border-radius: 999px;
            white-space: nowrap;
        }

        .tag.disease {
            min-height: auto;
            padding: 4px 10px;
            background: var(--orange-1);
            color: var(--orange-6);
            border: 0;
            border-radius: var(--radius-small);
            font-weight: 400;
        }

        .tag.type {
            min-height: 28px;
            padding: 5px 11px;
            background: #e8f3ff;
            color: #165dff;
            border: 1px solid rgba(22, 93, 255, 0.2);
            font-weight: 700;
            margin-left: auto;
        }

        .tag.type::before {
            padding: 2px 5px;
            border-radius: 999px;
            background: rgba(22, 93, 255, 0.1);
            font-size: 10px;
            line-height: 1;
            font-weight: 700;
        }

        .tag.type.warning {
            background: #fff7e8;
            color: #d25f00;
            border-color: rgba(255, 125, 0, 0.24);
        }

        .tag.type.warning::before {
            background: rgba(255, 125, 0, 0.12);
        }

        .tag.type.danger {
            background: #ffece8;
            color: #c9352b;
            border-color: rgba(245, 63, 63, 0.22);
        }

        .tag.type.danger::before {
            background: rgba(245, 63, 63, 0.12);
        }

        .next-date {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: var(--font-size-caption);
            color: var(--text-3);
            margin-bottom: 12px;
        }

        .next-date i {
            color: var(--arcoblue-6);
        }

        .next-date span {
            color: var(--arcoblue-6);
            font-weight: 500;
        }

        .card-actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-medium);
            background: var(--bg-2);
            font-size: var(--font-size-body-1);
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn.primary {
            background: var(--arcoblue-6);
            border-color: var(--arcoblue-6);
            color: white;
        }

        .action-btn:active {
            opacity: 0.8;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(29, 33, 41, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-medium);
            font-size: var(--font-size-body-1);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .empty-icon i {
            font-size: 36px;
            color: var(--text-4);
        }

        .empty-text {
            font-size: var(--font-size-body-1);
            color: var(--text-3);
        }

                name: '周国强',
                gender: 'male',
                age: 72,
                phone: '131****3333',
                idCard: '310111111111113333',
                diseases: ['脑卒中后遗症'],
                followUpType: '高危随访',
                nextDate: getDateStr(6) // 6天后
            },
            {
                id: 104,
                name: '钱秀英',
                gender: 'female',
                age: 70,
                phone: '130****4444',
                idCard: '310111111111114444',
                diseases: ['冠心病', '心力衰竭'],
                followUpType: '高危随访',

                followUpType: '高危随访',
                nextDate: getDateStr(12) // 12天后
            }
        ];

        // 初始化
        window.addEventListener('load', () => {
            renderTaskList();
        });

        // 切换页签
        function switchTab(tab) {
            currentTab = tab;
            // 更新页签样式
            document.querySelectorAll('.tab-item').forEach(item => {
                if (item.dataset.tab === tab) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            renderTaskList();
        }

        // 选择日期筛选
        function selectDateFilter(date) {
            currentDateFilter = date;
            // 更新筛选标签样式
            document.querySelectorAll('.filter-tag').forEach(tag => {
                if (tag.dataset.date === date) {
                    tag.classList.add('active');
                } else {
                    tag.classList.remove('active');
                }
            });
            renderTaskList();
        }

        // 搜索
        function handleSearch() {
            searchKeyword = document.getElementById('searchInput').value.toLowerCase();
            renderTaskList();
        }

        // 渲染任务列表
        function renderTaskList() {
            const container = document.getElementById('taskList');
            let data = currentTab === 'patient' ? patientFollowUpData : highRiskFollowUpData;
            
            // 日期筛选
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            data = data.filter(item => {
                const nextDate = new Date(item.nextDate);
                nextDate.setHours(0, 0, 0, 0);
                
                if (currentDateFilter === 'today') {
                    return nextDate.getTime() === today.getTime();
                } else if (currentDateFilter === 'week') {
                    const weekEnd = new Date(today);
                    weekEnd.setDate(weekEnd.getDate() + 7);
                    return nextDate >= today && nextDate <= weekEnd;
                } else {
                    // 本月
                    const monthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
                    return nextDate >= today && nextDate <= monthEnd;
                }
            });
            
            // 搜索筛选
            if (searchKeyword) {
                data = data.filter(item => {
                    return item.name.toLowerCase().includes(searchKeyword) ||
                           item.phone.includes(searchKeyword) ||
                           item.idCard.includes(searchKeyword);
                });
            }
            
            // 按下次随访日期排序
            data.sort((a, b) => new Date(a.nextDate) - new Date(b.nextDate));
            
            // 更新计数
            if (currentTab === 'patient') {
                document.getElementById('patientCount').textContent = data.length;
            } else {
                document.getElementById('highRiskCount').textContent = data.length;
            }

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-clipboard-list"></i>
                        </div>
                        <div class="empty-text">暂无随访任务</div>
                    </div>
                `;
                return;
            }

            let html = `<div class="task-count">共有 <span>${data.length}</span> 个随访任务</div>`;
            
            data.forEach(task => {
                const genderClass = task.gender === 'female' ? 'female' : (task.gender === 'male' ? 'male' : 'other');
                const avatarIcon = task.gender === 'female' ? 'fa-female' : 'fa-male';
                const typeText = currentTab === 'patient' ? '患者随访' : '高危随访';
                const typeClass = task.followUpType.includes('高危') ? 'danger' : (task.followUpType.includes('控制不满意') ? 'warning' : '');
                
                // 生成多个病种标签
                const diseaseTags = task.diseases.map(d => `<span class="tag disease">${d}</span>`).join('');
                
                html += `
                    <div class="task-card">
                        <div class="task-header">
                            <div class="patient-info">
                                <div class="patient-avatar ${genderClass}">
                                    <i class="fas ${avatarIcon}"></i>
                                </div>
                                <span class="patient-name ${genderClass}">${task.name}</span>
                                <span class="patient-age">${task.age}岁</span>
                            </div>
                            <button class="phone-btn" onclick="callPatient('${task.phone}', '${task.name}')">
                                <i class="fas fa-phone"></i>
                                <span>呼叫</span>
                            </button>
                        </div>
                        <div class="task-details">
                            <div class="detail-item">
                                <span class="detail-label">身份证</span>
                                <span class="detail-value">${task.idCard}</span>
                            </div>
                        </div>
                        <div class="tag-group">
                            ${diseaseTags}
                            <span class="tag type ${typeClass}">${task.followUpType}</span>
                        </div>
                        <div class="next-date">
                            <i class="fas fa-calendar-alt"></i>
                            计划日期 <span>${task.nextDate}</span>
                        </div>
                        <div class="card-actions">
                            <button class="action-btn" onclick="viewHealthProfile(${task.id})">
                                <i class="fas fa-user-circle"></i>
                                <span>健康画像</span>
                            </button>
                            <button class="action-btn" onclick="viewFollowUpRecords(${task.id}, '${typeText}')">
                                <i class="fas fa-history"></i>
                                <span>随访记录</span>
                            </button>
                            <button class="action-btn primary" onclick="preFollowUp(${task.id})">
                                <i class="fas fa-edit"></i>
                                <span>预随访</span>
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 呼叫患者
        function callPatient(phone, name) {
            showToast(`正在呼叫 ${name}: ${phone}`);
        }

        // 查看随访记录
        function viewFollowUpRecords(id, type) {
            window.location.href = `patient-follow-up-records.html?id=${id}&type=${encodeURIComponent(type)}`;
        }

        // 查看健康画像
        function viewHealthProfile(id) {
            window.location.href = `patient-health-profile.html?id=${id}`;
        }

        // 预随访
        function preFollowUp(id) {
            window.location.href = `patient-pre-follow-up.html?id=${id}`;
        }

        // 返回
        function goBack() {
            window.location.href = 'medical-staff-home.html';
        }

        // Toast提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
