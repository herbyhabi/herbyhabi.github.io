<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>随访任务</title>
    <script src="../assets/vendor/tailwind-browser@4.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/@arco-design/mobile-react/dist/arco.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --arcoblue-6: #165DFF;
            --arcoblue-1: #E8F3FF;
            --green-6: #00B42A;
            --green-1: #E8FFEA;
            --orange-6: #FF7D00;
            --orange-1: #FFF7E8;
            --red-6: #F53F3F;
            --pink-6: #F5319D;
            --pink-1: #FFE8F1;
            --text-1: #1D2129;
            --text-2: #4E5969;
            --text-3: #86909C;
            --text-4: #C9CDD4;
            --bg-1: #F8FAFC;
            --bg-2: #FFFFFF;
            --border: #E5E6EB;
            --radius-small: 4px;
            --radius-medium: 8px;
            --radius-large: 12px;
            --radius-xlarge: 20px;
            --font-size-caption: 12px;
            --font-size-body-1: 14px;
            --font-size-title-1: 16px;
            --font-size-title-2: 18px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-1);
            color: var(--text-1);
            min-height: 100vh;
            padding-bottom: 70px;
        }

        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, var(--arcoblue-6) 0%, #4080FF 100%);
            padding: 8px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: var(--radius-medium);
            transition: background 0.2s;
        }

        .back-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .navbar-title {
            flex: 1;
            font-size: var(--font-size-title-2);
            font-weight: 600;
            color: white;
        }

        /* 通用页签区域 */
        .tabs-section {
            padding: 12px 16px 0;
        }

        /* 搜索和筛选区域 */
        .quick-filter-section {
            padding: 12px 16px 0;
        }

        .filter-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .filter-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-xlarge);
            font-size: var(--font-size-caption);
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tag.active {
            background: var(--arcoblue-1);
            border-color: var(--arcoblue-6);
            color: var(--arcoblue-6);
        }

        .filter-tag i {
            font-size: 10px;
        }

        /* 任务列表 */
        .task-list {
            padding: 12px 16px;
            display: grid;
            gap: 12px;
        }

        .task-list .grouped-info-card {
            position: relative;
        }

        .task-list .grouped-info-card__title {
            padding-left: 18px;
        }

        .task-card-body {
            padding: 12px 16px 4px;
        }

        .task-card-items {
            display: grid;
            gap: 2px;
        }

        .phone-btn {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0;
            background: var(--green-1);
            color: var(--green-6);
            border: none;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-call-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 2;
            border-radius: 50% !important;
        }

        .phone-btn:active {
            background: var(--green-6);
            color: white;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            font-size: var(--font-size-body-1);
        }

        .detail-label {
            flex: 0 0 auto;
            color: var(--text-3);
            min-width: 60px;
            line-height: 26px;
        }

        .detail-value {
            min-width: 0;
            flex: 1;
            color: var(--text-2);
            line-height: 26px;
            word-break: break-all;
        }

        /* 随访任务标签：左侧类型标签 + 右侧业务状态 */
        .follow-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            padding-top: 2px;
        }

        .follow-tag {
            display: inline-flex;
            align-items: center;
            min-height: 20px;
            padding: 3px 8px;
            border-radius: 999px;
            background: #f3f6ff;
            color: #5a78d8;
            font-size: 12px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0;
        }

        .follow-tag.disease-hypertension {
            background: #ffe7ec;
            color: #ff6f82;
        }

        .follow-tag.disease-diabetes {
            background: #ede8ff;
            color: #9b85df;
        }

        .follow-tag.disease-heart {
            background: #e9f1ff;
            color: #5a84ff;
        }

        .follow-tag.disease-risk {
            background: #fff2e8;
            color: #d25f00;
        }

        .follow-type {
            display: inline-flex;
            align-items: center;
            height: 22px;
            padding: 0 8px;
            border-radius: 999px;
            background: #e8f3ff;
            color: #165dff;
            font-size: 12px;
            font-weight: 700;
            line-height: 22px;
        }

        .follow-type.warning {
            background: #fff7e8;
            color: #d25f00;
        }

        .follow-type.danger {
            background: #ffece8;
            color: #c9352b;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(29, 33, 41, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-medium);
            font-size: var(--font-size-body-1);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .empty-icon i {
            font-size: 36px;
            color: var(--text-4);
        }

        .empty-text {
            font-size: var(--font-size-body-1);
            color: var(--text-3);
        }

<body>
    <!-- 导航栏 -->
    <mobile-title-bar title="随访任务" back-action="goBack()"></mobile-title-bar>

    <!-- 页签 -->
    <div class="tabs-section">
        <mobile-tabs id="followUpTabs"></mobile-tabs>
    </div>

    <!-- 搜索和筛选 -->
    <div class="quick-filter-section">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜索姓名、身份证、手机号" oninput="handleSearch()">
        </div>
        <div class="filter-tags">
            <div class="filter-tag active" data-date="month" onclick="selectDateFilter('month')">
                <span>本月</span>
            </div>
            <div class="filter-tag" data-date="week" onclick="selectDateFilter('week')">
                <span>本周</span>
            </div>
            <div class="filter-tag" data-date="today" onclick="selectDateFilter('today')">
                <span>今日</span>
            </div>
        </div>
    </div>

    <!-- 任务列表 -->
    <div class="task-list" id="taskList">
        <!-- 动态生成 -->
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // 当前页签
        let currentTab = 'patient';
        // 当前日期筛选
        let currentDateFilter = 'month';
        // 搜索关键词
        let searchKeyword = '';

        // 动态生成日期（基于当前日期）
        function getDateStr(daysFromNow) {
            const date = new Date();
            date.setDate(date.getDate() + daysFromNow);
            return date.toISOString().split('T')[0];
        }

        // 模拟患者随访数据
        const patientFollowUpData = [
            {

                name: '王建国',

                age: 68,
                phone: '13811111234',
                idCard: '310111111111111234',

                nextDate: getDateStr(0) // 今天
            },
            {
                id: 2,
                name: '李秀英',
                gender: 'female',
                age: 72,
                phone: '13911115678',
                idCard: '310111111111115678',
                diseases: ['糖'],
                followUpType: '控制不满意随访',
                nextDate: getDateStr(2) // 后天
            },
            {
                id: 3,
                name: '张大山',

                age: 65,
                phone: '13711119012',
                idCard: '310111111111119012',
                diseases: ['冠', '高'],
                followUpType: '常规随访',
                nextDate: getDateStr(5) // 5天后
            },
            {
                id: 4,
                name: '陈美丽',
                gender: 'female',
                age: 58,
                phone: '13611113456',
                idCard: '310111111111113456',
                diseases: ['高'],
                followUpType: '常规随访',
                nextDate: getDateStr(7) // 7天后
            },
            {
                id: 5,
                name: '刘志强',
                gender: 'male',
                age: 70,
                phone: '13511117890',
                idCard: '310111111111117890',
                diseases: ['糖', '高血脂'],
                followUpType: '控制不满意随访',
                nextDate: getDateStr(10) // 10天后
            },
            {
                id: 6,
                name: '周明华',
                gender: 'male',
                age: 62,
                phone: '13411115555',
                idCard: '310111111111115555',
                diseases: ['高血脂'],
                followUpType: '常规随访',
                nextDate: getDateStr(15) // 15天后
            },
            {
                id: 7,
                name: '吴秀兰',
                gender: 'female',
                age: 66,
                phone: '13311116666',
                idCard: '310111111111116666',
                diseases: ['高', '糖', '冠'],
                followUpType: '常规随访',
                nextDate: getDateStr(20) // 20天后
            },
            {
                id: 8,
                name: '郑国强',
                gender: 'male',
                age: 73,
                phone: '13211117777',
                idCard: '310111111111117777',
                diseases: ['糖'],
                followUpType: '控制不满意随访',
                nextDate: getDateStr(25) // 25天后
            }
        ];

        // 模拟高危随访数据（随访类型固定为"高危随访"）
        const highRiskFollowUpData = [
            {
                id: 101,
                name: '赵明华',
                gender: 'male',
                age: 75,
                phone: '13311111111',
                idCard: '310111111111111111',
                diseases: ['高', '冠'],
                followUpType: '高危随访',
                nextDate: getDateStr(1) // 明天
            },
            {
                id: 102,
                name: '孙丽娟',
                gender: 'female',
                age: 68,
                phone: '13211112222',
                idCard: '310111111111112222',
                diseases: ['糖', '糖'],
                followUpType: '高危随访',
                nextDate: getDateStr(3) // 3天后
            },
            {
                id: 103,
                name: '周国强',
                gender: 'male',
                age: 72,
                phone: '13111113333',
                idCard: '310111111111113333',
                diseases: ['脑'],
                followUpType: '高危随访',
                nextDate: getDateStr(6) // 6天后
            },
            {
                id: 104,
                name: '钱秀英',
                gender: 'female',
                age: 70,
                phone: '13011114444',
                idCard: '310111111111114444',
                diseases: ['冠', '心力衰竭'],
                followUpType: '高危随访',
                nextDate: getDateStr(8) // 8天后
            },
            {
                id: 105,
                name: '李国华',
                gender: 'male',
                age: 78,
                phone: '12911115555',
                idCard: '310111111111115555',
                diseases: ['心力衰竭', '心律失常'],
                followUpType: '高危随访',
                nextDate: getDateStr(12) // 12天后
            }
        ];

        // 初始化
        window.addEventListener('load', () => {
            initFollowUpTabs();
            renderTaskList();
        });

        // 初始化通用页签组件
        function initFollowUpTabs() {
            const tabs = document.getElementById('followUpTabs');
            tabs.tabs = [
                { label: '患者随访', value: 'patient', count: patientFollowUpData.length },
                { label: '高危随访', value: 'highRisk', count: highRiskFollowUpData.length }
            ];
            tabs.value = currentTab;
            tabs.addEventListener('change', (event) => {
                switchTab(event.detail.value);
            });
        }

        // 切换页签
        function switchTab(tab) {
            currentTab = tab === 'highRisk' ? 'highRisk' : 'patient';
            document.getElementById('followUpTabs').value = currentTab;
            renderTaskList();
        }

        // 选择日期筛选
        function selectDateFilter(date) {
            currentDateFilter = date;
            // 更新筛选标签样式
            document.querySelectorAll('.filter-tag').forEach(tag => {
                if (tag.dataset.date === date) {
                    tag.classList.add('active');
                } else {
                    tag.classList.remove('active');
                }
            });
            renderTaskList();
        }

        // 搜索
        function handleSearch() {
            searchKeyword = document.getElementById('searchInput').value.toLowerCase();
            renderTaskList();
        }

        // 渲染任务列表
        function renderTaskList() {
            const container = document.getElementById('taskList');
            const sourceData = currentTab === 'patient' ? patientFollowUpData : highRiskFollowUpData;
            let data = getFilteredTaskData(sourceData);
            
            // 按下次随访日期排序
            data.sort((a, b) => new Date(a.nextDate) - new Date(b.nextDate));
            
            updateFollowUpTabCounts(data.length);

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-clipboard-list"></i>
                        </div>
                        <div class="empty-text">暂无随访任务</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';

            data.forEach(task => {
                renderTaskCard(container, task);
            });
        }

        // 更新页签计数，计数跟随当前搜索和日期筛选结果变化
        function updateFollowUpTabCounts(currentCount) {
            const patientCount = currentTab === 'patient' ? currentCount : getFilteredTaskData(patientFollowUpData).length;
            const highRiskCount = currentTab === 'highRisk' ? currentCount : getFilteredTaskData(highRiskFollowUpData).length;
            const tabs = document.getElementById('followUpTabs');
            tabs.tabs = [
                { label: '患者随访', value: 'patient', count: patientCount },
                { label: '高危随访', value: 'highRisk', count: highRiskCount }
            ];
            tabs.value = currentTab;
        }

        // 复用当前查询条件计算任务数据
        function getFilteredTaskData(sourceData) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            return sourceData.filter(item => {
                const nextDate = new Date(item.nextDate);
                nextDate.setHours(0, 0, 0, 0);

                let matchDate = true;
                if (currentDateFilter === 'today') {
                    matchDate = nextDate.getTime() === today.getTime();
                } else if (currentDateFilter === 'week') {
                    const weekEnd = new Date(today);
                    weekEnd.setDate(weekEnd.getDate() + 7);
                    matchDate = nextDate >= today && nextDate <= weekEnd;
                } else {
                    const monthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
                    matchDate = nextDate >= today && nextDate <= monthEnd;
                }

                const matchKeyword = !searchKeyword ||
                    item.name.toLowerCase().includes(searchKeyword) ||
                    item.phone.includes(searchKeyword) ||
                    item.idCard.includes(searchKeyword);

                return matchDate && matchKeyword;
            });
        }

        // 渲染单个随访任务卡片，卡片头部复用“我的患者”同款通用组件
        function renderTaskCard(container, task) {
            const typeText = currentTab === 'patient' ? '患者随访' : '高危随访';
            const genderText = task.gender === 'female' ? '女' : '男';

            const card = GroupedInfoCard.render(container, {
                title: task.name,
                status: {
                    label: `${genderText}·${task.age}岁`,
                    size: 'small',
                    color: 'default'
                },
                keyword: searchKeyword,
                highlightFields: ['title'],
                showDivider: true,
                actions: [
                    {
                        label: '健康画像',
                        icon: 'fas fa-user-circle',
                        onClick: () => viewHealthProfile(task.id)
                    },
                    {
                        label: '随访记录',
                        icon: 'fas fa-history',
                        onClick: () => viewFollowUpRecords(task.id, typeText)
                    },
                    {
                        label: '预随访',
                        icon: 'fas fa-clipboard-check',
                        primary: true,
                        onClick: () => preFollowUp(task.id)
                    }
                ]
            });

            const callButton = document.createElement('button');
            callButton.className = 'phone-btn task-call-btn';
            callButton.type = 'button';
            callButton.setAttribute('aria-label', `呼叫${task.name}`);
            callButton.innerHTML = '<i class="fas fa-phone"></i>';
            callButton.addEventListener('click', () => callPatient(task.phone, task.name));
            card.appendChild(callButton);

            const content = document.createElement('div');
            content.className = 'task-card-body';
            content.innerHTML = `
                <div class="task-card-items">
                    <div class="detail-item">
                        <span class="detail-label">证件号码</span>
                        <span class="detail-value">${task.idCard}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">联系电话</span>
                        <span class="detail-value">${task.phone}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">随访病种</span>
                        <span class="detail-value">
                            <span class="follow-tags">${renderDiseaseTags(task.diseases)}</span>
                        </span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">随访类型</span>
                        <span class="detail-value">
                            <span class="detail-value">${task.followUpType}</span>
                        </span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">计划日期</span>
                        <span class="detail-value">${task.nextDate}</span>
                    </div>
                </div>
            `;

            const actions = card.querySelector('.grouped-info-card__actions');
            card.insertBefore(content, actions);
        }

        // 生成病种标签
        function renderDiseaseTags(diseases) {
            return diseases.map(disease => (
                `<span class="follow-tag ${getDiseaseTagClass(disease)}">${disease}</span>`
            )).join('');
        }

        // 根据病种生成标签色
        function getDiseaseTagClass(disease) {
            if (disease.includes('高')) return 'disease-hypertension';
            if (disease.includes('糖')) return 'disease-diabetes';
            if (disease.includes('冠') || disease.includes('心')) return 'disease-heart';
            return disease.includes('高危') || disease.includes('并发') || disease.includes('后遗') ? 'disease-risk' : '';
        }

        // 呼叫患者
        function callPatient(phone, name) {
            showToast(`正在呼叫 ${name}: ${phone}`);
        }

        // 查看随访记录
        function viewFollowUpRecords(id, type) {
            window.location.href = `patient-follow-up-records.html?id=${id}&type=${encodeURIComponent(type)}`;
        }

        // 查看健康画像
        function viewHealthProfile(id) {
            window.location.href = `patient-health-profile.html?id=${id}`;
        }

        // 预随访
        function preFollowUp(id) {
            window.location.href = `patient-pre-follow-up.html?id=${id}`;
        }

        // 返回
        function goBack() {
            window.location.href = 'medical-staff-home.html';
        }

        // Toast提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
