    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --arcoblue-6: #165DFF;
            --arcoblue-1: #E8F3FF;
            --green-6: #00B42A;
            --green-1: #E8FFEA;
            --orange-6: #FF7D00;
            --orange-1: #FFF7E8;
            --text-1: #1D2129;
            --text-2: #4E5969;
            --text-3: #86909C;
            --text-4: #C9CDD4;
            --bg-1: #F2F3F5;
            --bg-2: #FFFFFF;
            --border: #E5E6EB;
            --radius-small: 4px;
            --radius-medium: 8px;
            --radius-large: 12px;
            --font-size-caption: 12px;
            --font-size-body-1: 14px;
            --font-size-title-1: 16px;
            --font-size-title-2: 18px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-1);
            color: var(--text-1);
            min-height: 100vh;
            padding-bottom: 20px;
        }

        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, var(--arcoblue-6) 0%, #4080FF 100%);
            padding: 8px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: var(--radius-medium);
        }

        .back-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .navbar-title {
            flex: 1;
            font-size: var(--font-size-title-2);
            font-weight: 600;
            color: white;
        }

        /* 记录列表 */
        .record-list {
            padding: 0 16px;
        }

        .section-title {
            font-size: var(--font-size-body-1);
            font-weight: 600;
            color: var(--text-2);
            margin: 16px 0 12px;
            padding-left: 12px;
            border-left: 3px solid var(--arcoblue-6);
        }

        .year-group {
            margin-bottom: 20px;
        }

        .year-header {
            position: sticky;
            top: 56px;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 2px 10px 0;
            margin-bottom: 8px;
            /* background: linear-gradient(180deg, var(--bg-1) 70%, rgba(247, 248, 250, 0)); */
        }

        .year-title {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-1);
        }

        .year-title span {
            font-size: var(--font-size-caption);
            font-weight: 500;
            color: var(--text-3);
        }

        .year-count {
            padding: 3px 8px;
            border-radius: 999px;
            background: rgba(47, 122, 246, 0.1);
            color: var(--arcoblue-6);
            font-size: var(--font-size-caption);
            font-weight: 600;
        }

        .year-records {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .record-card {
            background: var(--bg-2);
            border-radius: var(--radius-large);
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .record-date {
            font-size: var(--font-size-title-1);
            font-weight: 600;
            color: var(--text-1);
        }

        .record-type {
            padding: 4px 10px;
            background: var(--arcoblue-1);
            color: var(--arcoblue-6);
            font-size: var(--font-size-caption);
            border-radius: var(--radius-small);
        }

        .record-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .record-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: var(--font-size-body-1);
        }

        .record-label {
            color: var(--text-3);
            min-width: 60px;
        }

        .record-value {
            color: var(--text-2);
        }

        .tag-disease {
            display: inline-block;
            padding: 4px 10px;
            background: var(--orange-1);
            color: var(--orange-6);
            font-size: var(--font-size-caption);
            border-radius: var(--radius-small);
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .empty-icon i {
            font-size: 36px;
            color: var(--text-4);
        }

        .empty-text {
            font-size: var(--font-size-body-1);
            color: var(--text-3);
        }

    <!-- 导航栏 -->
    <mobile-title-bar id="navbarTitle" title="随访记录" back-action="goBack()" right-text="预随访" right-action="preFollowUp()"></mobile-title-bar>

    <!-- 记录列表 -->
    <div class="record-list">
        <div class="section-title">随访记录</div>
        <div id="recordList">
            <!-- 动态生成 -->
        </div>
    </div>

    <script>
        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const patientId = getUrlParam('id') || 1;
        const followUpType = getUrlParam('type') || '患者随访';

        // 模拟患者数据
        const patientData = {
            1: { name: '王建国', gender: 'male', age: 68, phone: '138****1234' },
            2: { name: '李秀英', gender: 'female', age: 72, phone: '139****5678' },
            3: { name: '张大山', gender: 'male', age: 65, phone: '137****9012' },
            4: { name: '陈美丽', gender: 'female', age: 58, phone: '136****3456' },
            5: { name: '刘志强', gender: 'male', age: 70, phone: '135****7890' },
            6: { name: '周明华', gender: 'male', age: 62, phone: '134****5555' },
            7: { name: '吴秀兰', gender: 'female', age: 66, phone: '133****6666' },
            8: { name: '郑国强', gender: 'male', age: 73, phone: '132****7777' },
            101: { name: '赵明华', gender: 'male', age: 75, phone: '133****1111' },
            102: { name: '孙丽娟', gender: 'female', age: 68, phone: '132****2222' },
            103: { name: '周国强', gender: 'male', age: 72, phone: '131****3333' },
            104: { name: '钱秀英', gender: 'female', age: 70, phone: '130****4444' },
            105: { name: '李国华', gender: 'male', age: 78, phone: '129****5555' }
        };

        // 生成动态日期
        function getPastDateStr(daysAgo) {
            const date = new Date();
            date.setDate(date.getDate() - daysAgo);
            return date.toISOString().split('T')[0];
        }

        function getYearDateStr(year, month, day) {
            return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        // 模拟随访记录数据（使用动态日期）
        const followUpRecords = {
            1: [
                { date: getPastDateStr(5), type: '常规随访', disease: '高血压', doctor: '张医生' },
                { date: getPastDateStr(35), type: '常规随访', disease: '高血压', doctor: '张医生' },
                { date: getPastDateStr(65), type: '控制不满意随访', disease: '高血压', doctor: '李医生' },
                { date: getPastDateStr(95), type: '常规随访', disease: '高血压', doctor: '张医生' },
                { date: getYearDateStr(2025, 11, 18), type: '常规随访', disease: '高血压', doctor: '张医生' },
                { date: getYearDateStr(2025, 8, 20), type: '控制不满意随访', disease: '高血压', doctor: '李医生' },
                { date: getYearDateStr(2025, 4, 12), type: '常规随访', disease: '高血压', doctor: '张医生' },
                { date: getYearDateStr(2024, 12, 9), type: '常规随访', disease: '高血压', doctor: '张医生' },
                { date: getYearDateStr(2024, 7, 15), type: '常规随访', disease: '高血压', doctor: '李医生' }
            ],
            2: [
                { date: getPastDateStr(10), type: '常规随访', disease: '糖尿病', doctor: '王医生' },
                { date: getPastDateStr(40), type: '常规随访', disease: '糖尿病', doctor: '王医生' },
                { date: getPastDateStr(70), type: '常规随访', disease: '糖尿病', doctor: '王医生' },
                { date: getYearDateStr(2025, 10, 22), type: '常规随访', disease: '糖尿病', doctor: '王医生' },
                { date: getYearDateStr(2025, 6, 18), type: '常规随访', disease: '糖尿病', doctor: '王医生' },
                { date: getYearDateStr(2024, 11, 6), type: '常规随访', disease: '糖尿病', doctor: '王医生' }
            ],
            3: [
                { date: getPastDateStr(12), type: '常规随访', disease: '冠心病', doctor: '刘医生' },
                { date: getPastDateStr(42), type: '常规随访', disease: '冠心病', doctor: '刘医生' },
                { date: getYearDateStr(2025, 9, 8), type: '常规随访', disease: '冠心病', doctor: '刘医生' },
                { date: getYearDateStr(2024, 10, 16), type: '常规随访', disease: '冠心病', doctor: '刘医生' }
            ],
            4: [
                { date: getPastDateStr(8), type: '常规随访', disease: '高血压', doctor: '张医生' },
                { date: getPastDateStr(38), type: '常规随访', disease: '高血压', doctor: '张医生' }
            ],
            5: [
                { date: getPastDateStr(15), type: '常规随访', disease: '糖尿病', doctor: '王医生' },
                { date: getPastDateStr(45), type: '常规随访', disease: '糖尿病', doctor: '王医生' }
            ],
            6: [
                { date: getPastDateStr(20), type: '常规随访', disease: '高血脂', doctor: '李医生' },
                { date: getPastDateStr(50), type: '常规随访', disease: '高血脂', doctor: '李医生' }
            ],
            7: [
                { date: getPastDateStr(25), type: '常规随访', disease: '高血压', doctor: '张医生' },
                { date: getPastDateStr(55), type: '常规随访', disease: '高血压', doctor: '张医生' }
            ],
            8: [
                { date: getPastDateStr(30), type: '常规随访', disease: '糖尿病', doctor: '王医生' },
                { date: getPastDateStr(60), type: '常规随访', disease: '糖尿病', doctor: '王医生' }
            ],
            101: [
                { date: getPastDateStr(3), type: '高危随访', disease: '高血压3级', doctor: '张医生' },
                { date: getPastDateStr(17), type: '高危随访', disease: '高血压3级', doctor: '张医生' },
                { date: getPastDateStr(31), type: '高危随访', disease: '高血压3级', doctor: '张医生' }
            ],
            102: [
                { date: getPastDateStr(7), type: '高危随访', disease: '糖尿病并发症', doctor: '王医生' },
                { date: getPastDateStr(21), type: '高危随访', disease: '糖尿病并发症', doctor: '王医生' }
            ],
            103: [
                { date: getPastDateStr(4), type: '高危随访', disease: '脑卒中后遗症', doctor: '刘医生' },
                { date: getPastDateStr(18), type: '高危随访', disease: '脑卒中后遗症', doctor: '刘医生' }
            ],
            104: [
                { date: getPastDateStr(6), type: '高危随访', disease: '冠心病', doctor: '张医生' },
                { date: getPastDateStr(20), type: '高危随访', disease: '冠心病', doctor: '张医生' }
            ],
            105: [
                { date: getPastDateStr(2), type: '高危随访', disease: '心力衰竭', doctor: '王医生' },
                { date: getPastDateStr(16), type: '高危随访', disease: '心力衰竭', doctor: '王医生' }
            ]
        };

        // 初始化
        window.addEventListener('load', () => {
            const patient = patientData[patientId] || patientData[1];
            renderNavbarTitle(patient);
            renderRecordList();
        });

        // 渲染页面标题
        function renderNavbarTitle(patient) {
            const genderText = patient.gender === 'female' ? '女' : '男';
            document.getElementById('navbarTitle').innerHTML = `${patient.name}<span class="title-meta">${patient.age}岁 · ${genderText}</span>`;
        }

        // 渲染记录列表
        function renderRecordList() {
            const container = document.getElementById('recordList');
            const records = followUpRecords[patientId] || [];
            
            if (records.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-history"></i>
                        </div>
                        <div class="empty-text">暂无随访记录</div>
                    </div>
                `;
                return;
            }
            
            // 按日期倒序排序
            const sortedRecords = [...records].sort((a, b) => new Date(b.date) - new Date(a.date));
            const groupedRecords = sortedRecords.reduce((groups, record) => {
                const year = new Date(record.date).getFullYear();
                if (!groups[year]) {
                    groups[year] = [];
                }
                groups[year].push(record);
                return groups;
            }, {});
            
            let html = '';
            Object.keys(groupedRecords)
                .sort((a, b) => Number(b) - Number(a))
                .forEach(year => {
                    const yearRecords = groupedRecords[year];
                    const typeCountText = Object.entries(yearRecords.reduce((counts, record) => {
                        const typeName = record.type.replace('随访', '');
                        counts[typeName] = (counts[typeName] || 0) + 1;
                        return counts;
                    }, {})).map(([type, count]) => `${type} ${count} 次`).join('，');
                    html += `
                        <div class="year-group">
                            <div class="year-header">
                                <div class="year-title">${year}<span>年</span></div>
                                <div class="year-count">${typeCountText}</div>
                            </div>
                            <div class="year-records">
                    `;

                    yearRecords.forEach(record => {
                        html += `
                            <div class="record-card">
                                <div class="record-header">
                                    <span class="record-date">${record.date}</span>
                                    <span class="record-type">${record.type}</span>
                                </div>
                                <div class="record-body">
                                    <div class="record-item">
                                        <span class="record-label">随访病种</span>
                                        <span class="tag-disease">${record.disease}</span>
                                    </div>
                                    <div class="record-item">
                                        <span class="record-label">随访医生</span>
                                        <span class="record-value">${record.doctor}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    html += `
                            </div>
                        </div>
                    `;
                });
            
            container.innerHTML = html;
        }

        // 返回
        function goBack() {
            window.history.back();
        }

        // 预随访
        function preFollowUp() {
            window.location.href = `patient-pre-follow-up.html?id=${patientId}`;
        }
    </script>
</body>
</html>
