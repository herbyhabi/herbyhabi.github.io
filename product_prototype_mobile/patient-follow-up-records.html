        .record-item {

            align-items: center;

        }

        .record-label {
            color: var(--text-3);

        }

        .record-value {

        }

    <script>
        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const patientId = getUrlParam('id') || 1;
        const followUpType = getUrlParam('type') || '患者随访';

        // 模拟患者数据
        const patientData = {
            1: { name: '王建国', gender: 'male', age: 68, phone: '13811111234' },
            2: { name: '李秀英', gender: 'female', age: 72, phone: '13911115678' },

            4: { name: '陈美丽', gender: 'female', age: 58, phone: '13611113456' },
            5: { name: '刘志强', gender: 'male', age: 70, phone: '13511117890' },
            6: { name: '周明华', gender: 'male', age: 62, phone: '13411115555' },
            7: { name: '吴秀兰', gender: 'female', age: 66, phone: '13311116666' },
            8: { name: '郑国强', gender: 'male', age: 73, phone: '13211117777' },
            101: { name: '赵明华', gender: 'male', age: 75, phone: '13311111111' },
            102: { name: '孙丽娟', gender: 'female', age: 68, phone: '13211112222' },
            103: { name: '周国强', gender: 'male', age: 72, phone: '13111113333' },
            104: { name: '钱秀英', gender: 'female', age: 70, phone: '13011114444' },
            105: { name: '李国华', gender: 'male', age: 78, phone: '12911115555' }
        };

        // 生成动态日期
        function getPastDateStr(daysAgo) {
            const date = new Date();
            date.setDate(date.getDate() - daysAgo);
            return date.toISOString().split('T')[0];
        }

        function getYearDateStr(year, month, day) {
            return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        // 模拟随访记录数据（使用动态日期）
        const followUpRecords = {
            1: [
                { date: getPastDateStr(5), type: '常规随访', disease: '高', doctor: '张大伟' },
                { date: getPastDateStr(35), type: '常规随访', disease: '高', doctor: '张大伟' },
                { date: getPastDateStr(65), type: '控制不满意随访', disease: '高', doctor: '李医生' },
                { date: getPastDateStr(95), type: '常规随访', disease: '高', doctor: '张大伟' },
                { date: getYearDateStr(2025, 11, 18), type: '常规随访', disease: '高', doctor: '张大伟' },
                { date: getYearDateStr(2025, 8, 20), type: '控制不满意随访', disease: '高', doctor: '李医生' },
                { date: getYearDateStr(2025, 4, 12), type: '常规随访', disease: '高', doctor: '张大伟' },
                { date: getYearDateStr(2024, 12, 9), type: '常规随访', disease: '高', doctor: '张大伟' },
                { date: getYearDateStr(2024, 7, 15), type: '常规随访', disease: '高', doctor: '李医生' }
            ],
            2: [
                { date: getPastDateStr(10), type: '常规随访', disease: '糖', doctor: '王海燕' },
                { date: getPastDateStr(40), type: '常规随访', disease: '糖', doctor: '王海燕' },
                { date: getPastDateStr(70), type: '常规随访', disease: '糖', doctor: '王海燕' },
                { date: getYearDateStr(2025, 10, 22), type: '常规随访', disease: '糖', doctor: '王海燕' },
                { date: getYearDateStr(2025, 6, 18), type: '常规随访', disease: '糖', doctor: '王海燕' },
                { date: getYearDateStr(2024, 11, 6), type: '常规随访', disease: '糖', doctor: '王海燕' }
            ],
            3: [
                { date: getPastDateStr(12), type: '常规随访', disease: '冠', doctor: '刘医生' },
                { date: getPastDateStr(42), type: '常规随访', disease: '冠', doctor: '刘医生' },
                { date: getYearDateStr(2025, 9, 8), type: '常规随访', disease: '冠', doctor: '刘医生' },
                { date: getYearDateStr(2024, 10, 16), type: '常规随访', disease: '冠', doctor: '刘医生' }
            ],
            4: [
                { date: getPastDateStr(8), type: '常规随访', disease: '高', doctor: '张大伟' },
                { date: getPastDateStr(38), type: '常规随访', disease: '高', doctor: '张大伟' }
            ],
            5: [
                { date: getPastDateStr(15), type: '常规随访', disease: '糖', doctor: '王海燕' },
                { date: getPastDateStr(45), type: '常规随访', disease: '糖', doctor: '王海燕' }
            ],
            6: [
                { date: getPastDateStr(20), type: '常规随访', disease: '高血脂', doctor: '李医生' },
                { date: getPastDateStr(50), type: '常规随访', disease: '高血脂', doctor: '李医生' }
            ],
            7: [
                { date: getPastDateStr(25), type: '常规随访', disease: '高', doctor: '张大伟' },
                { date: getPastDateStr(55), type: '常规随访', disease: '高', doctor: '张大伟' }
            ],
            8: [
                { date: getPastDateStr(30), type: '常规随访', disease: '糖', doctor: '王海燕' },
                { date: getPastDateStr(60), type: '常规随访', disease: '糖', doctor: '王海燕' }
            ],
            101: [
                { date: getPastDateStr(3), type: '高危随访', disease: '高', doctor: '张大伟' },
                { date: getPastDateStr(17), type: '高危随访', disease: '高', doctor: '张大伟' },
                { date: getPastDateStr(31), type: '高危随访', disease: '高', doctor: '张大伟' }
            ],
            102: [
                { date: getPastDateStr(7), type: '高危随访', disease: '糖', doctor: '王海燕' },
                { date: getPastDateStr(21), type: '高危随访', disease: '糖', doctor: '王海燕' }
            ],
            103: [
                { date: getPastDateStr(4), type: '高危随访', disease: '脑', doctor: '刘医生' },
                { date: getPastDateStr(18), type: '高危随访', disease: '脑', doctor: '刘医生' }
            ],
            104: [
                { date: getPastDateStr(6), type: '高危随访', disease: '冠', doctor: '张大伟' },

            ],
            105: [
                { date: getPastDateStr(2), type: '高危随访', disease: '高血压', doctor: '王海燕' },
                { date: getPastDateStr(16), type: '高危随访', disease: '高血压', doctor: '王海燕' }
            ]
        };

        // 初始化
        window.addEventListener('load', () => {
            const patient = patientData[patientId] || patientData[1];
            renderRecordSectionTitle(patient);
            renderRecordList();
        });

        // 渲染记录列表表头
        function renderRecordSectionTitle(patient) {
            document.getElementById('recordSectionTitle').textContent = `${patient.name}的随访记录`;
        }

        // 渲染记录列表
        function renderRecordList() {
            const container = document.getElementById('recordList');
            const records = followUpRecords[patientId] || [];
            
            if (records.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-history"></i>
                        </div>
                        <div class="empty-text">暂无随访记录</div>
                    </div>
                `;
                return;
            }
            
            // 按日期倒序排序
            const sortedRecords = [...records].sort((a, b) => new Date(b.date) - new Date(a.date));
            const groupedRecords = sortedRecords.reduce((groups, record) => {
                const year = new Date(record.date).getFullYear();
                if (!groups[year]) {
                    groups[year] = [];
                }
                groups[year].push(record);
                return groups;
            }, {});
            
            let html = '';
            Object.keys(groupedRecords)
                .sort((a, b) => Number(b) - Number(a))
                .forEach(year => {
                    const yearRecords = groupedRecords[year];
                    const typeCountText = Object.entries(yearRecords.reduce((counts, record) => {
                        const typeName = record.type.replace('随访', '');
                        counts[typeName] = (counts[typeName] || 0) + 1;
                        return counts;
                    }, {})).map(([type, count]) => `${type} ${count} 次`).join('，');
                    html += `
                        <div class="year-group">
                            <div class="year-header">
                                <div class="year-title">${year}</div>
                                <div class="year-count">${typeCountText}</div>
                            </div>
                            <div class="year-records" data-record-year="${year}">
                    `;

                    html += `
                            </div>
                        </div>
                    `;
                });
            
            container.innerHTML = html;

            Object.keys(groupedRecords)
                .sort((a, b) => Number(b) - Number(a))
                .forEach(year => {
                    const yearRecordsContainer = container.querySelector(`[data-record-year="${year}"]`);
                    if (!yearRecordsContainer) return;
                    groupedRecords[year].forEach(record => renderRecordCard(yearRecordsContainer, record));
                });
        }

        // 渲染单条随访记录，卡片头部复用通用分组组件
        function renderRecordCard(container, record) {
            const card = GroupedInfoCard.render(container, {
                title: record.date,
                subtitle: record.type,
                showDivider: true
            });

            const content = document.createElement('div');
            content.className = 'record-card-body';
            content.innerHTML = `
                <div class="record-card-items">
                    <div class="record-item">
                        <span class="record-label">随访病种</span>
                        <span class="record-value">
                            <span class="follow-tags">${renderDiseaseTags([record.disease])}</span>
                        </span>
                    </div>
                    <div class="record-item">
                        <span class="record-label">随访项目</span>
                        <span class="record-value">${followUpType}</span>
                    </div>
                    <div class="record-item">
                        <span class="record-label">随访医生</span>
                        <span class="record-value">${record.doctor}</span>
                    </div>
                </div>
            `;

            card.appendChild(content);
        }

        // 生成随访病种标签，样式与“随访任务”页面保持一致
        function renderDiseaseTags(diseases) {
            return diseases.map(disease => (
                `<span class="follow-tag ${getDiseaseTagClass(disease)}">${disease}</span>`
            )).join('');
        }

        // 根据病种生成标签色
        function getDiseaseTagClass(disease) {
            if (disease.includes('高')) return 'disease-hypertension';
            if (disease.includes('糖')) return 'disease-diabetes';
            if (disease.includes('冠') || disease.includes('心')) return 'disease-heart';
            return disease.includes('高危') || disease.includes('并发') || disease.includes('后遗') ? 'disease-risk' : '';
        }

        // 返回
        function goBack() {
            window.history.back();
        }

    </script>
</body>
</html>
