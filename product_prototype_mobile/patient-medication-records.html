<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>用药记录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../components/mobile/mobile-title-bar.js" defer></script>
    <script src="../components/mobile/mobile-search.js"></script>
    <script src="../components/mobile/grouped-info-card.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen bg-slate-50 text-[#333333] antialiased">
    <mobile-title-bar title="用药记录" back-action="goBack()"></mobile-title-bar>

    <main class="space-y-3 p-3 pb-24">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜索诊断名称或药品名称" oninput="handleSearch()">
        </div>
        <div class="space-y-3" id="recordList"></div>
    </main>

    <script>
        // 近一年用药记录示例数据，按就诊记录聚合展示
        const medicationRecords = [
            {
                visitDate: '2026-01-13',
                visitType: '门诊',
                diagnoses: ['2型糖尿病', '高血压','慢性阻塞性肺疾病伴急性加重','骨质疏松','胃食管反流病'],
                medicines: [
                    { name: '二甲双胍缓释片', dose: '0.5g', frequency: '2次/日' },
                    { name: '阿卡波糖片', dose: '50mg', frequency: '3次/日' },
                    { name: '氨氯地平片', dose: '5mg', frequency: '1次/日' }
                ]
            },
            {
                visitDate: '2025-09-19',
                visitType: '门诊',
                diagnoses: ['高血压', '血脂异常'],
                medicines: [
                    { name: '苯磺酸氨氯地平片', dose: '5mg', frequency: '1次/日' },
                    { name: '阿托伐他汀钙片', dose: '20mg', frequency: '1次/晚' }
                ]
            },
            {
                visitDate: '2025-06-08',
                visitType: '住院',
                diagnoses: ['2型糖尿病', '糖尿病周围神经病变'],
                medicines: [
                    { name: '盐酸二甲双胍片', dose: '0.5g', frequency: '2次/日' },
                    { name: '苯磺酸氨氯地平片', dose: '5mg', frequency: '1次/日' },
                    { name: '甲钴胺片', dose: '0.5mg', frequency: '3次/日' }
                ]
            }
        ];

        let searchKeyword = '';

        function goBack() {
            window.history.back();
        }

        function handleSearch() {
            searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
            renderMedicationRecords(getFilteredMedicationRecords());
        }

        // 根据诊断名称或药品名称过滤用药记录，命中后展示该就诊分组全部用药
        function getFilteredMedicationRecords() {
            if (!searchKeyword) return medicationRecords;

            return medicationRecords.filter((record) => {
                const matchDiagnosis = record.diagnoses.some((diagnosis) =>
                    diagnosis.toLowerCase().includes(searchKeyword)
                );
                const matchMedicine = record.medicines.some((medicine) =>
                    medicine.name.toLowerCase().includes(searchKeyword)
                );

                return matchDiagnosis || matchMedicine;
            });
        }

        function createMedicineExtra(medicine) {
            const extra = document.createElement('div');
            extra.className = 'flex items-center gap-2 text-sm text-[#666666]';

            const dose = document.createElement('span');
            dose.className = 'min-w-[58px] text-right';
            dose.textContent = medicine.dose;

            const frequency = document.createElement('span');
            frequency.className = 'min-w-[58px] text-right';
            frequency.textContent = medicine.frequency;

            extra.append(dose, frequency);
            return extra;
        }

        function appendHighlightedText(target, text) {
            const value = String(text || '');
            const keyword = searchKeyword.toLowerCase();
            target.innerHTML = '';

            if (!keyword) {
                target.textContent = value;
                return;
            }

            const lowerValue = value.toLowerCase();
            let startIndex = 0;
            let matchIndex = lowerValue.indexOf(keyword, startIndex);

            while (matchIndex !== -1) {
                if (matchIndex > startIndex) {
                    target.appendChild(document.createTextNode(value.slice(startIndex, matchIndex)));
                }

                const highlight = document.createElement('span');
                highlight.className = 'rounded bg-[#FFE7BA] px-0.5 font-extrabold text-[#FA8C16]';
                highlight.textContent = value.slice(matchIndex, matchIndex + keyword.length);
                target.appendChild(highlight);

                startIndex = matchIndex + keyword.length;
                matchIndex = lowerValue.indexOf(keyword, startIndex);
            }

            if (startIndex < value.length) {
                target.appendChild(document.createTextNode(value.slice(startIndex)));
            }
        }

        function createMedicineRow(medicine) {
            const row = document.createElement('div');
            row.className = 'flex min-h-[42px] items-center gap-2 border-t border-slate-100 py-2';

            const icon = document.createElement('img');
            icon.className = 'h-3.5 w-3.5 shrink-0 object-contain';
            icon.src = 'assets/icons/pill.svg';
            icon.alt = '';
            icon.setAttribute('aria-hidden', 'true');

            const name = document.createElement('div');
            name.className = 'min-w-0 flex-1 text-[14px] font-bold leading-5 text-[#333333]';
            appendHighlightedText(name, medicine.name);

            row.append(icon, name, createMedicineExtra(medicine));
            return row;
        }

        function createMedicationCardContent(record) {
            const content = document.createElement('div');
            content.className = 'px-4 pb-4';

            record.medicines.forEach((medicine) => {
                content.appendChild(createMedicineRow(medicine));
            });

            return content;
        }

        // 渲染近一年用药记录；无数据时展示缺省文案
        function renderMedicationRecords(records) {
            const container = document.getElementById('recordList');

            container.innerHTML = '';

            if (!records.length) {
                const emptyText = searchKeyword ? '未搜索到相关用药记录' : '近一年无用药记录';
                container.innerHTML = `
                    <section class="flex min-h-[180px] items-center justify-center rounded-2xl border border-dashed border-slate-200 bg-white p-6 text-sm font-medium text-[#999999]">
                        ${emptyText}
                    </section>
                `;
                return;
            }

            records.forEach((record) => {
                const card = GroupedInfoCard.render(container, {
                    title: record.visitDate,
                    subtitle: record.visitType,
                    description: record.diagnoses.join(','),
                    keyword: searchKeyword,
                    highlightFields: ['title', 'description'],
                    emptyText: '近一年无用药记录'
                });
                card.appendChild(createMedicationCardContent(record));
            });
        }

        renderMedicationRecords(medicationRecords);
    </script>
</body>

</html>
