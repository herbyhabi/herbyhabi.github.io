<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聊天</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --arcoblue-6: #165DFF;
            --arcoblue-1: #E8F3FF;
            --text-1: #1D2129;
            --text-2: #4E5969;
            --text-3: #86909C;
            --text-4: #C9CDD4;
            --bg-1: #F2F3F5;
            --bg-2: #FFFFFF;
            --border: #E5E6EB;
            --radius-medium: 8px;
            --radius-large: 12px;
            --font-size-caption: 12px;
            --font-size-body-1: 14px;
            --font-size-title-1: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-1);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, var(--arcoblue-6) 0%, #4080FF 100%);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .navbar-title {
            flex: 1;
            font-size: var(--font-size-title-1);
            font-weight: 600;
            color: white;
            text-align: center;
            margin-right: 36px;
        }

        /* 聊天消息区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 140px;
        }

        .message-item {
            display: flex;
            margin-bottom: 16px;
        }

        .message-item.receive {
            justify-content: flex-start;
        }

        .message-item.send {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: var(--radius-large);
            font-size: var(--font-size-body-1);
            line-height: 1.5;
            word-break: break-word;
        }

        .message-item.receive .message-bubble {
            background: var(--bg-2);
            color: var(--text-1);
            border-top-left-radius: 4px;
        }

        .message-item.send .message-bubble {
            background: var(--arcoblue-6);
            color: white;
            border-top-right-radius: 4px;
        }

        .message-time {
            font-size: var(--font-size-caption);
            color: var(--text-3);
            text-align: center;
            margin-bottom: 8px;
        }

        /* 输入框区域 */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-2);
            border-top: 1px solid var(--border);
        }

        .quick-actions {
            padding: 10px 16px;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid var(--border);
        }

        .quick-action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .quick-action-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--arcoblue-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--arcoblue-6);
        }

        .quick-action-text {
            font-size: 11px;
            color: var(--text-2);
        }

        .input-row {
            padding: 10px 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .image-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-2);
            font-size: 24px;
            cursor: pointer;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-1);
            padding: 10px 14px;
            border-radius: 20px;
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: var(--font-size-body-1);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--arcoblue-6);
            color: white;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
        }

        .send-btn.disabled {
            background: var(--text-4);
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        /* 首页风格统一覆盖 */
        body {
            color: #0f1f33;
            background:
                radial-gradient(circle at 82% 2%, rgba(181, 213, 255, 0.8) 0 110px, transparent 220px),
                linear-gradient(180deg, #d9ebff 0%, #f4faff 28%, #f7fbff 68%, #ffffff 100%) !important;
            -webkit-font-smoothing: antialiased;
        }

        .navbar {
            position: sticky;
            top: 0;
            overflow: hidden;
            background: rgba(217, 235, 255, 0.82) !important;
            border-bottom: 1px solid rgba(118, 140, 165, 0.12);
            box-shadow: 0 10px 26px rgba(60, 101, 145, 0.08);
            backdrop-filter: blur(14px);
        }

        .navbar::before {
            content: "";
            position: absolute;
            top: -58px;
            right: -34px;
            width: 170px;
            height: 150px;
            border-radius: 34px;
            background: linear-gradient(135deg, rgba(67, 142, 255, 0.2), rgba(255, 255, 255, 0.06));
            transform: rotate(-12deg);
            pointer-events: none;
        }

        .navbar-content,
        .navbar-title,
        .back-btn,
        .search-btn,
        .navbar-count {
            position: relative;
            z-index: 1;
        }

        .navbar-title,
        .back-btn,
        .search-btn,
        .navbar-count {
            color: #0f1f33 !important;
        }

        .navbar-title {
            font-weight: 800 !important;
        }

        .tabs,
        .search-section,
        .stats-bar,
        .page-container,
        .session-list,
        .system-list {
            background: transparent !important;
        }

        .tab-item.active {
            color: #2f7af6 !important;
        }

        .tab-item.active::after {
            background: #2f7af6 !important;
        }

        .patient-card,
        .user-card,
        .org-card,
        .menu-list,
        .info-card,
        .detail-card,
        .record-card,
        .task-card,
        .anomaly-card,
        .form-card,
        .card,
        .section-card,
        .profile-card,
        .health-card,
        .content-card,
        .result-item,
        .empty-icon,
        .modal-content {
            background: rgba(255, 255, 255, 0.92) !important;
            border: 1px solid rgba(123, 147, 176, 0.14) !important;
            border-radius: 16px !important;
            box-shadow: 0 12px 32px rgba(60, 101, 145, 0.12) !important;
            backdrop-filter: blur(12px);
        }

        .session-item,
        .system-item,
        .menu-item,
        .list-item,
        .record-item,
        .info-row {
            border-color: rgba(119, 140, 166, 0.18) !important;
        }
        input,
        select,
        textarea {
            border-color: rgba(122, 150, 184, 0.13) !important;
            box-shadow: inset 0 0 0 1px rgba(122, 150, 184, 0.08);
        }

        .action-btn.primary,
        .submit-btn,
        .filter-btn.confirm,
        .modal-btn.confirm,
        .login-btn,
        .code-btn:not(:disabled) {
            background: linear-gradient(145deg, #4b9bff, #2f7af6) !important;
            color: #fff !important;
            border: 0 !important;
            box-shadow: 0 8px 16px rgba(45, 101, 170, 0.13);
        }

        .action-btn,
        .filter-btn.reset,
        .modal-btn.cancel,
        .popup-option,
        .phone-btn,
        .call-btn {
            border-color: rgba(123, 147, 176, 0.14) !important;
        }

        .toast,
        .arco-toast {
            background: rgba(12, 20, 34, 0.82) !important;
            border-radius: 8px !important;
        }

        /* 首页风格补充覆盖 */
        .info-section,
        .info-list,
        .app-section,
        .form-section,
        .form-item,
        .filter-section,
        .disease-card,
        .indicator-item,
        .quick-action-item {
            background: rgba(255, 255, 255, 0.92) !important;
            border: 1px solid rgba(123, 147, 176, 0.14) !important;
            border-radius: 16px !important;
            box-shadow: 0 12px 32px rgba(60, 101, 145, 0.12) !important;
            backdrop-filter: blur(12px);
        }

        .patient-list,
        .task-list,
        .record-list,
        .search-results {
            position: relative;
            z-index: 1;
        }

        .action-btn,
        .submit-btn,
        .code-btn,
        .filter-btn,
        .modal-btn,
        .phone-btn,
        .call-btn {
            border-radius: 10px !important;
            font-weight: 700;
        }

        .navbar+.tabs,
        .tabs {
            border-bottom-color: rgba(118, 140, 165, 0.16) !important;
            backdrop-filter: blur(10px);
        }


        /* 全局顶部与查询框统一 */
        .navbar {
            position: sticky !important;
            top: 0 !important;
            min-height: 52px;
            padding: 8px 16px !important;
            z-index: 100 !important;
        }

        .navbar-content {
            position: relative !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            min-height: 36px;
            padding-bottom: 0 !important;
        }

        .navbar-content .back-btn {
            position: absolute !important;
            left: 0 !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            margin: 0 !important;
            z-index: 2 !important;
        }

        .navbar>.back-btn {
            position: absolute !important;
            left: 16px !important;
            bottom: 12px !important;
            margin: 0 !important;
            z-index: 2 !important;
        }

        .navbar-title,
        .navbar-content .navbar-title,
        .navbar>.navbar-title {
            position: absolute !important;
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%) !important;
            width: calc(100% - 128px) !important;
            margin: 0 !important;
            padding: 0 !important;
            text-align: center !important;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            z-index: 1 !important;
        }

        .navbar>.navbar-title {
            top: auto !important;
            bottom: 19px !important;
            transform: translateX(-50%) !important;
        }

        .search-btn,
        .navbar-count {
            position: absolute !important;
            right: 0 !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            margin: 0 !important;
            z-index: 2 !important;
        }

        .navbar>.search-btn,
        .navbar>.navbar-count {
            right: 16px !important;
            top: auto !important;
            bottom: 12px !important;
            transform: none !important;
        }

        .search-section,
        .filter-section,
        .search-header {
            background: transparent !important;
        }
    </style>
    <script src="../components/mobile/mobile-title-bar.js" defer></script>
    <script src="../components/mobile/mobile-search.js"></script>
</head>

<body>
    <!-- 导航栏 -->
    <mobile-title-bar id="chatTitle" title="患者姓名"></mobile-title-bar>
    <script>
        customElements.whenDefined('mobile-title-bar').then(function bindMobileTitleBar() {
            const titleBar = document.querySelector('mobile-title-bar');
            if (!titleBar) return;
            titleBar.onBack = goBack;
        });
    </script>

    <!-- 聊天消息区域 -->
    <div class="chat-container" id="chatContainer"></div>

    <!-- 输入框区域 -->
    <div class="input-area">
        <div class="quick-actions">
            <div class="quick-action-item" onclick="openHealthProfile()">
                <div class="quick-action-icon">
                    <i class="fas fa-heartbeat"></i>
                </div>
                <span class="quick-action-text">健康画像</span>
            </div>
            <div class="quick-action-item" onclick="openAIAssistant()">
                <div class="quick-action-icon">
                    <i class="fas fa-robot"></i>
                </div>
                <span class="quick-action-text">智能医助</span>
            </div>
            <div class="quick-action-item" onclick="openChatMaterials()">
                <div class="quick-action-icon">
                    <i class="fas fa-folder-open"></i>
                </div>
                <span class="quick-action-text">聊天素材</span>
            </div>
        </div>
        <div class="input-row">
            <div class="image-btn" onclick="selectImage()">
                <i class="fas fa-image"></i>
            </div>
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="请输入消息..." onkeypress="handleKeyPress(event)">
            </div>
            <div class="send-btn disabled" id="sendBtn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast" id="toast"></div>

    <script>
        // Toast 提示函数
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        // Mock数据
        let messages = [
            { id: 1, type: 'receive', content: '医生，我最近感觉头晕', time: '10:00' },
            { id: 2, type: 'send', content: '血压测量了吗？', time: '10:05' },
            { id: 3, type: 'receive', content: '测了，158/95', time: '10:10' },
            { id: 4, type: 'send', content: '有点偏高，建议按时服药', time: '10:15' }
        ];

        let residentId = null;
        let residentName = '';

        // 初始化
        document.addEventListener('DOMContentLoaded', function () {
            // 获取URL参数
            const urlParams = new URLSearchParams(window.location.search);
            residentId = urlParams.get('residentId');
            residentName = decodeURIComponent(urlParams.get('name') || '患者');

            // 设置标题
            document.getElementById('chatTitle').title = residentName;

            // 渲染消息
            renderMessages();

            // 输入框监听
            document.getElementById('messageInput').addEventListener('input', function () {
                const sendBtn = document.getElementById('sendBtn');
                if (this.value.trim()) {
                    sendBtn.classList.remove('disabled');
                } else {
                    sendBtn.classList.add('disabled');
                }
            });
        });

        // 渲染消息列表
        function renderMessages() {
            const container = document.getElementById('chatContainer');
            let lastTime = '';

            container.innerHTML = messages.map(msg => {
                let timeHtml = '';
                if (msg.time !== lastTime) {
                    timeHtml = `<div class="message-time">${msg.time}</div>`;
                    lastTime = msg.time;
                }

                return `
                    ${timeHtml}
                    <div class="message-item ${msg.type}">
                        <div class="message-content">
                            <div class="message-bubble">${escapeHtml(msg.content)}</div>
                        </div>
                    </div>
                `;
            }).join('');

            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content) return;

            // 添加新消息
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            messages.push({
                id: messages.length + 1,
                type: 'send',
                content: content,
                time: timeStr
            });

            // 清空输入框
            input.value = '';
            document.getElementById('sendBtn').classList.add('disabled');

            // 重新渲染
            renderMessages();

            // 模拟对方回复
            setTimeout(() => {
                messages.push({
                    id: messages.length + 1,
                    type: 'receive',
                    content: '收到，谢谢医生！',
                    time: timeStr
                });
                renderMessages();
            }, 1500);
        }

        // 处理回车键
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        // 返回上一页
        function goBack() {
            window.history.back();
        }

        // 打开健康画像
        function openHealthProfile() {
            showToast('敬请期待');
        }

        // 打开智能医助
        function openAIAssistant() {
            showToast('敬请期待');
        }

        // 打开聊天素材
        function openChatMaterials() {
            showToast('敬请期待');
        }

        // 选择图片
        function selectImage() {
            showToast('敬请期待');
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>

</html>
