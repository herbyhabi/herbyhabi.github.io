<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>绑定手机号</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2F6BFF;
            --page-bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --border: #E5E6EB;
            --divider: #ECEEF2;
            --text-main: #1D2129;
            --text-sub: #4E5969;
            --text-light: #86909C;
            --shadow-card: 0 2px 10px rgba(0, 0, 0, 0.04);
        }

        html {
            min-width: 320px;
            background: var(--page-bg);
        }

        body {
            min-height: 100vh;
            background: var(--page-bg);
            color: var(--text-main);
            font-family: system-ui, "PingFang SC", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        mobile-title-bar {
            --mobile-title-bar-height: 48px;
            --mobile-title-bar-bg: #FFFFFF;
            --mobile-title-bar-color: #1D2129;
            --mobile-title-bar-shadow: none;
            --mobile-title-bar-border: #E5E6EB;
            --mobile-title-bar-title-size: 18px;
            padding-top: env(safe-area-inset-top, 0px) !important;
            border-bottom: 1px solid var(--border) !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }

        mobile-title-bar::before {
            display: none !important;
        }

        mobile-title-bar .mobile-title-bar__title {
            font-weight: 600 !important;
        }

        mobile-title-bar .mobile-title-bar__back {
            color: var(--text-main) !important;
        }

        button,
        input {
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        .page {
            width: 100%;
            min-width: 320px;
            max-width: 768px;
            min-height: 100vh;
            margin: 0 auto;
            background: var(--page-bg);
        }

        .content {
            width: 100%;
            padding: 16px 16px 28px;
        }

        .tips {
            margin-bottom: 12px;
            padding: 0 4px;
            color: var(--text-light);
            font-size: 13px;
            line-height: 1.5;
        }

        .form-card {
            width: 100%;
            overflow: hidden;
            border-radius: 16px;
            background: var(--card-bg);
            box-shadow: var(--shadow-card);
        }

        .input-host {
            width: 100%;
        }

        .form-card .mobile-input-field {
            min-height: 64px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            border-bottom: 0;
            background: #FFFFFF;
            color: var(--text-main);
            font-family: system-ui, "PingFang SC", sans-serif;
        }

        .input-host + .input-host .mobile-input-field {
            border-top: 1px solid var(--divider);
        }

        .form-card .mobile-input-field__label {
            width: 72px;
            flex-shrink: 0;
            color: var(--text-main);
            font-size: 14px;
            line-height: 1.45;
            font-weight: 400;
            padding-top: 0;
        }

        .form-card .mobile-input-field__content {
            min-width: 0;
            flex: 1;
            text-align: left;
        }

        .form-card .mobile-input-inline {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .form-card .mobile-input-control {
            min-width: 0;
            flex: 1;
            width: 100%;
            height: 48px;
            border: 0;
            border-radius: 0;
            outline: none;
            padding: 0;
            background: #FFFFFF;
            color: var(--text-main);
            font-size: 14px;
            line-height: 48px;
            text-align: left;
        }

        .form-card .mobile-input-control::placeholder {
            color: #C9CDD4;
        }

        .form-card .mobile-input-control:focus {
            border-color: transparent;
        }

        .form-card .mobile-input-clear {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            border: 0;
            border-radius: 50%;
            background: #C9CDD4;
            color: #FFFFFF;
            font-size: 14px;
            line-height: 22px;
            cursor: pointer;
        }

        .form-card .mobile-input-clear.is-hidden,
        .form-card .is-hidden {
            display: none;
        }

        .code-btn {
            min-width: 96px;
            height: 40px;
            flex-shrink: 0;
            border: 0;
            border-radius: 10px;
            background: var(--primary);
            color: #FFFFFF;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }

        .code-btn:disabled {
            background: #C9CDD4;
            cursor: default;
        }

        .submit-btn {
            width: 100%;
            height: 48px;
            margin-top: 24px;
            border: 0;
            border-radius: 12px;
            background: var(--primary);
            color: #FFFFFF;
            font-size: 16px;
            line-height: 48px;
            font-weight: 500;
            cursor: pointer;
        }

        .submit-btn:disabled {
            background: #C9CDD4;
            cursor: default;
        }

        .submit-btn:active,
        .code-btn:active {
            opacity: 0.86;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            z-index: 1000;
            max-width: calc(100% - 64px);
            padding: 10px 18px;
            border-radius: 8px;
            transform: translate(-50%, -50%);
            background: rgba(29, 33, 41, 0.88);
            color: #FFFFFF;
            font-size: 14px;
            line-height: 1.4;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .toast.show {
            opacity: 1;
        }

        @media (max-width: 360px) {
            .form-card .mobile-input-field {
                gap: 8px;
                padding-right: 12px;
                padding-left: 12px;
            }

            .form-card .mobile-input-field__label {
                width: 64px;
            }

            .code-btn {
                min-width: 88px;
                padding: 0 10px;
            }
        }
    </style>
    <script src="../components/mobile/mobile-title-bar.js" defer></script>
    <script src="../components/mobile/mobile-search.js"></script>
    <script src="../components/mobile/input/index.js"></script>
</head>

<body>
    <div class="page">
        <div class="toast" id="toast"></div>

        <mobile-title-bar title="绑定手机号" back-action="goBack()"></mobile-title-bar>

        <main class="content">
            <div class="tips">请确保输入的手机号能正常收到短信</div>

            <section class="form-card">
                <div class="input-host" id="phoneField"></div>
                <div class="input-host" id="codeField"></div>
            </section>

            <button class="submit-btn" id="submitBtn" type="button" onclick="confirmBind()">确认</button>
        </main>
    </div>

    <script>
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        function goBack() {
            window.history.back();
        }

        let phoneFieldNode = null;
        let codeFieldNode = null;

        function getPhoneValue() {
            return phoneFieldNode ? phoneFieldNode.value : '';
        }

        function getCodeValue() {
            return codeFieldNode ? codeFieldNode.value : '';
        }

        function renderInputs() {
            if (!window.MobileInputComponents || !window.PhoneInput || !window.TextInput) return;

            phoneFieldNode = window.PhoneInput.render(document.getElementById('phoneField'), {
                label: '手机号',
                placeholder: '请输入手机号码',
                maxLength: 11,
                autocomplete: 'tel'
            });
            phoneFieldNode.input.id = 'phoneInput';
            phoneFieldNode.input.addEventListener('input', handlePhoneInput);

            codeFieldNode = window.TextInput.render(document.getElementById('codeField'), {
                label: '验证码',
                placeholder: '请输入验证码',
                maxLength: 6,
                inputClass: 'code-input'
            });
            codeFieldNode.input.id = 'codeInput';
            codeFieldNode.input.inputMode = 'numeric';
            codeFieldNode.input.autocomplete = 'one-time-code';
            codeFieldNode.input.addEventListener('input', () => {
                codeFieldNode.input.value = codeFieldNode.input.value.replace(/\D/g, '').slice(0, 6);
                codeFieldNode.value = codeFieldNode.input.value;
            });

            const codeBtn = document.createElement('button');
            codeBtn.className = 'code-btn';
            codeBtn.id = 'codeBtn';
            codeBtn.type = 'button';
            codeBtn.disabled = true;
            codeBtn.textContent = '获取验证码';
            codeBtn.addEventListener('click', sendCode);
            codeFieldNode.querySelector('.mobile-input-inline').appendChild(codeBtn);
        }

        function handlePhoneInput() {
            const phone = getPhoneValue();
            const codeBtn = document.getElementById('codeBtn');
            if (codeBtn.dataset.counting === 'true') return;

            codeBtn.disabled = !isValidPhone(phone);
        }

        function isValidPhone(phone) {
            return /^1[3-9]\d{9}$/.test(phone);
        }

        let countdown = 0;
        function sendCode() {
            const phone = getPhoneValue();
            if (!isValidPhone(phone)) {
                showToast('请输入正确的手机号');
                return;
            }

            const codeBtn = document.getElementById('codeBtn');
            codeBtn.dataset.counting = 'true';
            codeBtn.disabled = true;
            countdown = 60;
            codeBtn.textContent = `${countdown}s`;

            showToast('验证码已发送');

            const timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    codeBtn.textContent = '获取验证码';
                    codeBtn.disabled = !isValidPhone(getPhoneValue());
                    codeBtn.dataset.counting = 'false';
                } else {
                    codeBtn.textContent = `${countdown}s`;
                }
            }, 1000);
        }

        function confirmBind() {
            const phone = getPhoneValue();
            const code = getCodeValue();

            if (!isValidPhone(phone)) {
                showToast('请输入正确的手机号');
                return;
            }

            if (code.length !== 6) {
                showToast('请输入6位验证码');
                return;
            }

            localStorage.setItem('userPhone', phone);
            showToast('绑定成功');

            setTimeout(() => {
                window.location.href = 'medical-staff-personal-info.html';
            }, 1000);
        }

        document.addEventListener('DOMContentLoaded', function () {
            window.MobileInputComponents.ready.then(renderInputs);
        });
    </script>
</body>
</html>
