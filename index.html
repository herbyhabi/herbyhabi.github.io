<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧医疗平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --arcoblue-1: #E8F3FF;
            --arcoblue-2: #BEDAFF;
            --arcoblue-3: #94BFFF;
            --arcoblue-4: #6AA1FF;
            --arcoblue-5: #4080FF;
            --arcoblue-6: #165DFF;
            --arcoblue-7: #0E42D2;

            --gray-1: #F7F8FA;
            --gray-2: #F2F3F5;
            --gray-3: #E5E6EB;
            --gray-4: #C9CDD4;
            --gray-5: #A9AEB8;
            --gray-6: #86909C;
            --gray-7: #6B7785;
            --gray-8: #4E5969;
            --gray-9: #272E3B;
            --gray-10: #1D2129;

            --green-6: #00B42A;
            --orange-6: #FF7D00;
            --purple-6: #722ED1;

            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --font-size-body-1: 13px;
            --font-size-body-2: 14px;
            --font-size-body-3: 16px;
            --font-size-title-1: 18px;
            --font-size-title-2: 20px;
            --font-size-title-3: 24px;

            --border-radius-medium: 8px;
            --border-radius-large: 12px;
            --border-radius-xlarge: 16px;

            --spacing-2: 8px;
            --spacing-3: 12px;
            --spacing-4: 16px;
            --spacing-5: 20px;
            --spacing-6: 24px;
            --spacing-8: 32px;
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(180deg, #e8f4ff 0%, #f5f9ff 50%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            color: var(--gray-10);
        }

        /* ===== 背景装饰 ===== */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -10%;
            right: -15%;
            width: 320px;
            height: 320px;
            background: linear-gradient(135deg, rgba(22, 93, 255, 0.08), rgba(255, 255, 255, 0.02));
            border-radius: 50%;
        }

        .bg-decoration::after {
            content: '';
            position: absolute;
            bottom: 10%;
            left: -10%;
            width: 240px;
            height: 240px;
            background: linear-gradient(135deg, rgba(22, 93, 255, 0.05), rgba(255, 255, 255, 0.01));
            border-radius: 50%;
        }

        /* ===== 头部区域 ===== */
        .header-section {
            padding: 60px var(--spacing-8) 48px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--arcoblue-6), var(--arcoblue-5));
            border-radius: var(--border-radius-xlarge);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--spacing-6);
            box-shadow: 0 12px 32px rgba(22, 93, 255, 0.25);
            animation: logoEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes logoEnter {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .logo i {
            font-size: 40px;
            color: #fff;
        }

        .app-name {
            font-size: 28px;
            font-weight: 700;
            color: var(--gray-10);
            margin-bottom: var(--spacing-2);
            letter-spacing: 1px;
        }

        .app-slogan {
            font-size: var(--font-size-body-2);
            color: var(--gray-6);
            letter-spacing: 2px;
        }

        /* ===== 模块卡片区域 ===== */
        .modules-container {
            flex: 1;
            padding: 0 var(--spacing-6) var(--spacing-8);
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-4);
        }

        .module-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: var(--spacing-5);
            background: var(--gray-1);
            border-radius: var(--border-radius-large);
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1.5px solid var(--gray-3);
            animation: cardSlideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) backwards;
        }

        .module-card:nth-child(1) { animation-delay: 0.1s; }
        .module-card:nth-child(2) { animation-delay: 0.2s; }
        .module-card:nth-child(3) { animation-delay: 0.3s; }
        .module-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes cardSlideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .module-card:hover {
            background: #fff;
            border-color: var(--arcoblue-4);
            box-shadow: 0 8px 24px rgba(22, 93, 255, 0.12);
            transform: translateY(-2px);
        }

        .module-card:active {
            transform: scale(0.98);
        }

        .module-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--border-radius-medium);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--spacing-3);
            font-size: 24px;
            flex-shrink: 0;
        }

        .module-card.pc .module-icon {
            background: var(--arcoblue-1);
            color: var(--arcoblue-6);
        }

        .module-card.medical .module-icon {
            background: #E8FFEA;
            color: var(--green-6);
        }

        .module-card.resident .module-icon {
            background: #FFF3E8;
            color: var(--orange-6);
        }

        .module-card.dashboard .module-icon {
            background: #F5E8FF;
            color: var(--purple-6);
        }

        .module-info {
            flex: 1;
            min-width: 0;
        }

        .module-title {
            font-size: var(--font-size-body-3);
            font-weight: 600;
            color: var(--gray-10);
            margin-bottom: 4px;
        }

        .module-desc {
            font-size: var(--font-size-body-1);
            color: var(--gray-6);
            line-height: 1.5;
        }

        .module-info {
            flex: 1;
            min-width: 0;
        }
        .footer {
            text-align: center;
            padding: var(--spacing-5) var(--spacing-6) var(--spacing-8);
            font-size: 12px;
            color: var(--gray-5);
            position: relative;
            z-index: 1;
        }

        /* ===== Arco Design 风格 Toast ===== */
        .arco-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            background: rgba(29, 33, 41, 0.8);
            color: #fff;
            padding: var(--spacing-4) var(--spacing-6);
            border-radius: var(--border-radius-medium);
            font-size: var(--font-size-body-2);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            text-align: center;
            max-width: 70%;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .arco-toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .arco-toast .toast-icon {
            display: block;
            font-size: 32px;
            margin-bottom: var(--spacing-2);
        }

        .arco-toast .toast-text {
            display: block;
            line-height: 1.5;
        }

        /* ===== 响应式适配 ===== */
        /* 4列 - 默认 (>= 1024px) */
        @media (min-width: 1024px) {
            .header-section {
                padding: 80px var(--spacing-8) 56px;
            }

            .module-card {
                padding: var(--spacing-6);
            }

            .module-icon {
                width: 64px;
                height: 64px;
                font-size: 28px;
            }
        }

        /* 3列 - 768px ~ 1023px */
        @media (max-width: 1023px) and (min-width: 768px) {
            .modules-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 2列 - 540px ~ 767px */
        @media (max-width: 767px) and (min-width: 540px) {
            .modules-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 1列 - < 540px */
        @media (max-width: 539px) {
            .modules-grid {
                grid-template-columns: 1fr;
            }

            /* 小屏幕时恢复横向布局 */
            .module-card {
                flex-direction: row;
                align-items: center;
            }

            .module-icon {
                margin-bottom: 0;
                margin-right: var(--spacing-4);
            }
        }

        /* ===== 安全区域适配 ===== */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .footer {
                padding-bottom: calc(var(--spacing-8) + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration"></div>

    <!-- 头部区域 -->
    <div class="header-section">
        <div class="logo">
            <i class="fas fa-hospital-user"></i>
        </div>
        <h1 class="app-name">产品原型托管平台</h1>
        <p class="app-slogan">Stay hungry · stay foolish</p>
    </div>

    <!-- 模块入口区域 -->
    <div class="modules-container">
        <div class="modules-grid">
            <!-- PC端 -->
            <div class="module-card pc" onclick="handleModuleClick('pc')">
                <div class="module-icon">
                    <i class="fas fa-desktop"></i>
                </div>
                <div class="module-info">
                    <div class="module-title">PC端</div>
                    <div class="module-desc">医护与管理人员的综合业务工作台</div>
                </div>
            </div>

            <!-- 医护端H5 -->
            <div class="module-card medical" onclick="handleModuleClick('medical')">
                <div class="module-icon">
                    <i class="fas fa-user-md"></i>
                </div>
                <div class="module-info">
                    <div class="module-title">医护移动端</div>
                    <div class="module-desc">医生与基层医护的移动化工作平台</div>
                </div>
            </div>

            <!-- 居民端 -->
            <div class="module-card resident" onclick="handleModuleClick('resident')">
                <div class="module-icon">
                    <i class="fas fa-users"></i>
                </div>
                <div class="module-info">
                    <div class="module-title">居民移动端</div>
                    <div class="module-desc">居民与患者的健康服务入口</div>
                </div>
            </div>

            <!-- 数据大屏 -->
            <div class="module-card dashboard" onclick="handleModuleClick('dashboard')">
                <div class="module-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="module-info">
                    <div class="module-title">数据大屏</div>
                    <div class="module-desc">医疗数据可视化大屏，实时监控、数据统计</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部版权 -->
    <div class="footer">
        <p>&copy; 2026 北酱知识星球 版权所有</p>
    </div>

    <!-- Arco Design 风格 Toast -->
    <div class="arco-toast" id="arcoToast">
        <i class="toast-icon fas fa-info-circle"></i>
        <span class="toast-text"></span>
    </div>

    <script>
        // 模块配置
        const moduleConfig = {
            pc: {
                name: 'PC端',
                available: false,
                url: null
            },
            medical: {
                name: '医护端H5',
                available: true,
                url: 'product_prototype_mobile/medical-staff-login.html'
            },
            resident: {
                name: '居民端',
                available: false,
                url: null
            },
            dashboard: {
                name: '数据大屏',
                available: false,
                url: null
            }
        };

        // 处理模块点击
        function handleModuleClick(moduleKey) {
            const config = moduleConfig[moduleKey];
            
            if (config.available && config.url) {
                // 已开放的模块，跳转页面
                showToast(`正在进入${config.name}...`, 'fa-spinner fa-spin');
                setTimeout(() => {
                    window.location.href = config.url;
                }, 800);
            } else {
                // 未开放的模块，显示提示
                showToast('暂未开放', 'fa-clock');
            }
        }

        // Arco Design 风格 Toast 提示
        let toastTimer = null;
        const arcoToast = document.getElementById('arcoToast');

        function showToast(message, icon) {
            if (toastTimer) {
                clearTimeout(toastTimer);
                arcoToast.classList.remove('show');
            }

            const iconEl = arcoToast.querySelector('.toast-icon');
            const textEl = arcoToast.querySelector('.toast-text');

            iconEl.className = 'toast-icon fas ' + (icon || 'fa-info-circle');
            textEl.textContent = message;

            // 触发重绘后显示
            requestAnimationFrame(() => {
                arcoToast.classList.add('show');
            });

            toastTimer = setTimeout(() => {
                arcoToast.classList.remove('show');
                toastTimer = null;
            }, 2000);
        }
    </script>
</body>
</html>
