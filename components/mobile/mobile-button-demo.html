<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>移动端按钮组件预览</title>
    <script src="../../assets/vendor/tailwind-browser@4.js" defer></script>
</head>
<body class="min-h-screen bg-[#F8FAFC] font-sans text-[#1D2129] antialiased">
    <main class="mx-auto min-h-screen max-w-[768px] px-4 pt-4 pb-28">
        <header class="mb-4">
            <h1 class="text-xl font-semibold leading-7">移动端按钮组件</h1>
            <p class="mt-1 text-sm leading-5 text-[#4E5969]">原子化按钮，覆盖常见操作入口、状态和移动端触控反馈。</p>
        </header>

        <div class="space-y-4">
            <section class="rounded-2xl bg-white p-4 shadow-[0_2px_10px_rgba(0,0,0,0.04)]">
                <div class="mb-3">
                    <h2 class="text-base font-medium leading-6">按钮类型</h2>
                    <p class="mt-1 text-xs leading-5 text-[#86909C]">主按钮、次按钮、弱按钮、文字按钮和危险按钮。</p>
                </div>
                <div id="typeDemo" class="grid gap-3"></div>
            </section>

            <section class="rounded-2xl bg-white p-4 shadow-[0_2px_10px_rgba(0,0,0,0.04)]">
                <div class="mb-3">
                    <h2 class="text-base font-medium leading-6">按钮尺寸</h2>
                    <p class="mt-1 text-xs leading-5 text-[#86909C]">默认适配移动端触控区域，最小点击高度不低于 44px。</p>
                </div>
                <div id="sizeDemo" class="flex flex-wrap items-center gap-3"></div>
            </section>

            <section class="rounded-2xl bg-white p-4 shadow-[0_2px_10px_rgba(0,0,0,0.04)]">
                <div class="mb-3">
                    <h2 class="text-base font-medium leading-6">状态展示</h2>
                    <p class="mt-1 text-xs leading-5 text-[#86909C]">禁用和加载状态不可点击，避免重复提交。</p>
                </div>
                <div id="stateDemo" class="grid gap-3"></div>
            </section>

            <section class="rounded-2xl bg-white p-4 shadow-[0_2px_10px_rgba(0,0,0,0.04)]">
                <div class="mb-3">
                    <h2 class="text-base font-medium leading-6">图标与文本</h2>
                    <p class="mt-1 text-xs leading-5 text-[#86909C]">未配置图标时不占位，超长文本默认单行省略。</p>
                </div>
                <div id="iconDemo" class="grid gap-3"></div>
            </section>

            <section class="rounded-2xl bg-white p-4 shadow-[0_2px_10px_rgba(0,0,0,0.04)]">
                <div class="mb-3">
                    <h2 class="text-base font-medium leading-6">事件反馈</h2>
                    <p class="mt-1 text-xs leading-5 text-[#86909C]">点击后由外部回调或自定义事件处理业务逻辑。</p>
                </div>
                <div id="eventDemo" class="grid gap-3"></div>
                <div id="eventLog" class="mt-3 rounded-xl bg-[#F8FAFC] px-3 py-2 text-xs leading-5 text-[#4E5969]">等待点击</div>
            </section>
        </div>
    </main>

    <footer class="fixed inset-x-0 bottom-0 bg-white px-4 pt-3 shadow-[0_-2px_10px_rgba(0,0,0,0.04)]" style="padding-bottom: calc(12px + env(safe-area-inset-bottom));">
        <div id="footerDemo" class="mx-auto grid max-w-[768px] grid-cols-[1fr_2fr] gap-3"></div>
    </footer>

    <script src="./mobile-button.js"></script>
    <script>
        const checkIcon = '<svg viewBox="0 0 24 24" fill="none"><path d="M20 6 9 17l-5-5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        const arrowIcon = '<svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        const plusIcon = '<svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>';

        function renderButton(container, options) {
            return MobileButton.render(container, options);
        }

        renderButton('#typeDemo', { text: '主按钮', type: 'primary', block: true });
        renderButton('#typeDemo', { text: '次按钮', type: 'secondary', block: true });
        renderButton('#typeDemo', { text: '弱按钮', type: 'weak', block: true });
        renderButton('#typeDemo', { text: '文字按钮', type: 'text', block: true });
        renderButton('#typeDemo', { text: '危险按钮', type: 'danger', block: true });

        renderButton('#sizeDemo', { text: '大按钮', type: 'primary', size: 'large' });
        renderButton('#sizeDemo', { text: '中按钮', type: 'secondary', size: 'medium' });
        renderButton('#sizeDemo', { text: '小按钮', type: 'weak', size: 'small' });
        renderButton('#sizeDemo', { text: '圆角按钮', type: 'primary', size: 'small', round: true });

        renderButton('#stateDemo', { text: '默认态', type: 'primary', block: true });
        renderButton('#stateDemo', { text: '禁用态', type: 'primary', disabled: true, block: true });
        renderButton('#stateDemo', { text: '加载中', type: 'primary', loading: true, block: true });
        renderButton('#stateDemo', { text: '弱按钮禁用', type: 'weak', disabled: true, block: true });

        renderButton('#iconDemo', { text: '左侧图标', type: 'primary', icon: checkIcon, block: true });
        renderButton('#iconDemo', { text: '右侧图标', type: 'secondary', icon: arrowIcon, iconPosition: 'right', block: true });
        renderButton('#iconDemo', { text: '添加记录', type: 'weak', icon: plusIcon });
        renderButton('#iconDemo', {
            text: '这是一段用于验证超长按钮文本默认单行省略效果的按钮文案',
            type: 'secondary',
            block: true
        });
        renderButton('#iconDemo', {
            text: '允许换行的长文本按钮，可在特殊场景展示更多信息',
            type: 'weak',
            block: true,
            wrapText: true
        });

        const eventLog = document.getElementById('eventLog');
        const eventButton = renderButton('#eventDemo', {
            text: '触发点击事件',
            type: 'primary',
            block: true,
            onClick() {
                eventLog.textContent = `onClick 已触发：${new Date().toLocaleTimeString('zh-CN', { hour12: false })}`;
            }
        });
        eventButton.addEventListener('mobile-button-click', (event) => {
            eventLog.textContent += `，事件类型：${event.detail.type}`;
        });
        renderButton('#eventDemo', {
            text: '加载态不可重复点击',
            type: 'secondary',
            loading: true,
            block: true,
            onClick() {
                eventLog.textContent = '这条文案不应出现';
            }
        });

        renderButton('#footerDemo', { text: '取消', type: 'secondary', block: true });
        renderButton('#footerDemo', { text: '确认提交', type: 'primary', block: true });
    </script>
</body>
</html>
